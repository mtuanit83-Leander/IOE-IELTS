// [NEW v1.1] Di chuyển hàm chuẩn hóa (từ Block 5) về Utils để dùng chung
advancedNormalize: (str, langCode) => {
if (!str) return "";
let s = str.toLowerCase();
// 1. Đồng bộ từ đồng âm
if (langCode === 'vi') {
s = s.replace(/\blăm\b/g, 'năm').replace(/\bmốt\b/g, 'một').replace(/\btư\b/g, 'bốn');
} else if (langCode === 'zh') {
s = s.replace(/两/g, '二');
}
// 2. Chuyển đổi Số (Digit) sang Chữ (Word) từ 0-99
s = s.replace(/\d+/g, (match) => {
const num = parseInt(match, 10);
if (isNaN(num)) return match;
if (langCode === 'vi') {
const units = ['không', 'một', 'hai', 'ba', 'bốn', 'năm', 'sáu', 'bảy', 'tám', 'chín'];
if (num < 10) return units[num];
if (num === 10) return 'mười';
if (num < 20) return 'mười ' + units[num % 10];
if (num < 100) return units[Math.floor(num / 10)] + ' mươi ' + (num % 10 !== 0 ? units[num % 10] : '');
} else if (langCode === 'en') {
const units = ['zero', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine'];
const teens = ['ten', 'eleven', 'twelve', 'thirteen', 'fourteen', 'fifteen', 'sixteen', 'seventeen', 'eighteen', 'nineteen'];
const tens = ['', '', 'twenty', 'thirty', 'forty', 'fifty', 'sixty', 'seventy', 'eighty', 'ninety'];
if (num < 10) return units[num];
if (num < 20) return teens[num - 10];
if (num < 100) return tens[Math.floor(num / 10)] + (num % 10 !== 0 ? ' ' + units[num % 10] : '');
} else if (langCode === 'zh') {
const units = ['零', '一', '二', '三', '四', '五', '六', '七', '八', '九'];
if (num < 10) return units[num];
if (num === 10) return '十';
if (num < 20) return '十' + (num % 10 !== 0 ? units[num % 10] : '');
if (num < 100) return units[Math.floor(num / 10)] + '十' + (num % 10 !== 0 ? units[num % 10] : '');
}
return match;
});
// 3. Xóa toàn bộ khoảng trắng và ký tự đặc biệt
return s.replace(/[^\p{L}\p{N}]/gu, "").trim();
},
safeLocalStorageSet: (k, v) => { try { localStorage.setItem(k, typeof v === 'object' ? JSON.stringify(v) : v); } catch { } },
shuffleArray: (a) => { if (!Array.isArray(a)) return []; let r = [...a]; for (let i = r.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [r[i], r[j]] = [r[j], r[i]]; } return r; },
cleanText: (text) => {

return text.replace(/[\*#_`~]/g, '').replace(/^\s*-\s/gm, '• ').replace(/\n{3,}/g, '\n\n').trim();
},

// Gọi API Gemini tích hợp sẵn cơ chế Retry & Key Rotation
callGeminiApi: async (prompt, schema = null, apiKeyOverride = null) => {
let keyPool = window.Utils.safeJsonParse('fc_apikey_pool', []);
let currentKey = apiKeyOverride || localStorage.getItem('fc_apikey');
if (currentKey && !keyPool.includes(currentKey)) { keyPool.unshift(currentKey); } else if (currentKey) { keyPool = [currentKey, ...keyPool.filter(k => k !== currentKey)]; }
if (keyPool.length === 0) throw new Error("Chưa nhập API Key (Vui lòng cấu hình trong Settings)");
let resultText = null; let tokenMetadata = null; let successKey = null; let lastError = null;
for (let i = 0; i < keyPool.length; i++) {
const k = keyPool[i]; if (!k || k.length < 10) continue;
try {
const body = { contents: [{ parts: [{ text: prompt }] }] };
if (schema) { body.generationConfig = { responseMimeType: "application/json", responseSchema: schema }; }
// [FIXED] Chuyển đổi về model gemini-2.5-flash
const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${k}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
const d = await res.json();
if (d.error) throw new Error(d.error.message);
if (!d.candidates?.[0]?.content?.parts?.[0]?.text) throw new Error("API trả về rỗng");
resultText = d.candidates[0].content.parts[0].text;
if (d.usageMetadata) tokenMetadata = d.usageMetadata;
successKey = k; break;
} catch (e) { console.warn(`Key ...${k.slice(-5)} lỗi:`, e.message); lastError = e; }
}
if (!resultText) throw new Error(`Tất cả ${keyPool.length} API Key đều lỗi. (Lỗi cuối: ${lastError?.message})`);
if (successKey && successKey !== localStorage.getItem('fc_apikey')) { localStorage.setItem('fc_apikey', successKey); console.log("Updated primary API Key to working key."); }
return { text: resultText, tokenMetadata };
},
fetchWithFallback: async (url) => {
if (!url) throw new Error("URL is empty");
let finalUrl = url.includes('docs.google.com') ? url.replace(/\/edit.*$/, '/export?format=csv').replace(/gid=0/, `gid=${(url.match(/gid=(\d+)/) || ['', '0'])[1]}`) : url;
const strategies = [{ name: "Direct", url: finalUrl }, { name: "AllOrigins", url: `https://api.allorigins.win/raw?url=${encodeURIComponent(finalUrl)}` }];
let err; for (const s of strategies) { try { const res = await fetch(s.url); if (res.ok) return res; } catch (e) { err = e; } }
throw new Error("Lỗi tải dữ liệu");
},
// [FIXED] Phục hồi cấu trúc cú pháp chuẩn của hàm convertRawRowsToCards
convertRawRowsToCards: (rows) => {
if (!rows || rows.length === 0) return [];
return rows.slice(1).map(row => {
if (!row || row.length === 0 || !row[0]) return null;
return {
term: String(row[0] || "").trim(),
pronunciation: String(row[1] || "").trim(),
definition: String(row[2] || "").trim(),
analysis: String(row[3] || "").trim(),
sinoViet: String(row[4] || "").trim(),
example: String(row[5] || "").trim(),
image: String(row[6] || "").trim()
};
}).filter(card => card !== null);
},
parseAndMapCSV: (csvText) => {
if (!csvText || csvText.length < 5) return [];
const rows = csvText.split('\n').filter(l => l.trim()).map(line => line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(p => p.replace(/^"|"$/g, '').trim()));
return window.Utils.convertRawRowsToCards(rows);
},
sanitizeCards: (rawCards) => {
if (!Array.isArray(rawCards)) return [];
return rawCards.map(c => ({
term: String(c.term || ''), pronunciation: String(c.pronunciation || ''), definition: String(c.definition || ''),
sinoViet: String(c.sinoViet || ''), example: String(c.example || ''), image: String(c.image || '')
})).filter(c => c.term.trim() !== "");
},
detectSentence: (text) => {
if (!text) return false;
const str = text.trim();
return /[.?!。？！]/.test(str) || str.split(/\s+/).length > 4 || (str.length > 7 && /[\u4e00-\u9fa5]/.test(str));
},
jsonToTsv: (data) => {
if (!Array.isArray(data) || data.length === 0) return "";
const headers = ['term', 'pronunciation', 'definition', 'analysis', 'sinoViet', 'example', 'image'];
const rows = data.map(item => headers.map(key => { let val = item[key] || ''; val = String(val).replace(/(\r\n|\n|\r)/gm, " "); return val; }).join('\t'));
return rows.join('\n');
},
fillCardWithAi: async (term, lang, apiKey, targetFields = null) => {
let keyPool = window.Utils.safeJsonParse('fc_apikey_pool', []);
let currentKey = apiKey;
if (currentKey && !keyPool.includes(currentKey)) {
keyPool.unshift(currentKey);
} else if (currentKey) {
keyPool = [currentKey, ...keyPool.filter(k => k !== currentKey)];
}
if (keyPool.length === 0) throw new Error("Chưa nhập API Key (Thiếu Key Pool)");
const isSentence = window.Utils.detectSentence(term);
const typeLabel = isSentence ? "CÂU VĂN" : "TỪ VỰNG";
const fullProperties = {
term: { type: "STRING" },
pronunciation: { type: "STRING" },
definition: { type: "STRING" },
analysis: { type: "STRING" },
sinoViet: { type: "STRING" },
example: { type: "STRING" },
image_keyword: { type: "STRING" }
};
let propertiesToFetch = {};
let requiredFields = [];
let promptRequest = "";
if (targetFields && Array.isArray(targetFields) && targetFields.length > 0) {
targetFields.forEach(field => {
const schemaKey = (field === 'image') ? 'image_keyword' : field;
if (fullProperties[schemaKey]) {
propertiesToFetch[schemaKey] = fullProperties[schemaKey];
requiredFields.push(schemaKey);
}
});
promptRequest = `Chỉ phân tích và trả về thông tin cho các mục sau: ${requiredFields.join(", ")}. Các mục khác bỏ qua.`;
} else {
propertiesToFetch = fullProperties;
requiredFields = ["term", "pronunciation", "definition", "analysis", "sinoViet", "example", "image_keyword"];
promptRequest = "Phân tích đầy đủ tất cả các trường thông tin.";
}
const promptKey = isSentence ? 'enrich_sentence' : 'enrich_word';
const basePrompt = window.DEFAULT_PROMPTS[promptKey];
const userQuery = `Hãy phân tích ${typeLabel} này theo chuẩn JSON: "${term}" (Ngôn ngữ: ${lang}). ${promptRequest}`;
const payload = {
contents: [{ parts: [{ text: userQuery }] }],
systemInstruction: { parts: [{ text: basePrompt }] },
generationConfig: {
responseMimeType: "application/json",
responseSchema: {
type: "OBJECT",
properties: propertiesToFetch,
required: requiredFields
}
}
};
let finalResult = null;
let successKey = null;
let lastError = null;
for (const k of keyPool) {
if (!k || k.length < 10) continue;
try {
// [FIXED] Chuyển đổi về model gemini-2.5-flash
const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${k}`, {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify(payload)
});
const data = await res.json();
if (data.error) {
if (data.error.code === 429 || data.error.message.includes('quota') || data.error.message.includes('permission') || data.error.message.includes('API key')) {
throw new Error(data.error.message);
} else {
throw new Error(data.error.message);
}
}
finalResult = data;
successKey = k;
break;
} catch (e) {
console.warn(`SmartFill Key ...${k.slice(-5)} failed:`, e.message);
lastError = e;
}
}
if (!finalResult) throw new Error(`AI Error (Tất cả Key đều lỗi): ${lastError?.message}`);
if (successKey && successKey !== localStorage.getItem('fc_apikey')) {
localStorage.setItem('fc_apikey', successKey);
console.log("SmartFill: Auto-switched to working key:", successKey.slice(-5));
}
const text = finalResult.candidates?.[0]?.content?.parts?.[0]?.text;
if (!text) throw new Error("AI không trả về kết quả");
const parsed = JSON.parse(text);
let imgUrl = "";
if (parsed.image_keyword) {
imgUrl = `https://tse4.mm.bing.net/th?q=${encodeURIComponent(parsed.image_keyword)}&w=300&h=300&c=7&rs=1&p=0`;
}
const meta = finalResult.usageMetadata ? { _tokenUsage: finalResult.usageMetadata } : {};
return {
...parsed,
term: term,
image: imgUrl,
...meta
};
},

generateQuizQuestion: (cards, correctIndex, lang) => {
const correctCard = cards[correctIndex];
const options = [correctCard];
const pool = cards.filter((_, i) => i !== correctIndex && cards[i].term !== correctCard.term);
while (options.length < 5 && pool.length > 0) {
const rand = Math.floor(Math.random() * pool.length);
options.push(pool[rand]);
pool.splice(rand, 1);
}
return {
question: correctCard,
options: window.Utils.shuffleArray(options).map(opt => ({
definition: opt.definition,
isCorrect: opt.term === correctCard.term
}))
};
},
parseSrsTime: (str) => {
if (!str) return 0;
let d = 0, h = 0, m = 0;
const matchD = str.match(/(\d+)d/); if (matchD) d = parseInt(matchD[1]);
const matchH = str.match(/(\d+)h/); if (matchH) h = parseInt(matchH[1]);
const matchM = str.match(/(\d+)m/); if (matchM) m = parseInt(matchM[1]);
return d + (h / 24) + (m / 1440);
},
calculateSRS: (card, grade, settings) => {
let prevInterval = card.srs_interval || 0;
let prevRep = card.srs_repetition || 0;
let prevEase = card.srs_ease || 2.5;
let internalGrade = 0;
if (grade === 'again') internalGrade = 0;
else if (grade === 'hard') internalGrade = 3;
else if (grade === 'good') internalGrade = 4;
else if (grade === 'easy') internalGrade = 5;
let nextInterval, nextRep, nextEase;
if (internalGrade >= 3) {
if (prevRep === 0) {
if (grade === 'hard') nextInterval = window.Utils.parseSrsTime(settings?.srsHard) || 2;
else if (grade === 'good') nextInterval = window.Utils.parseSrsTime(settings?.srsGood) || 4;
else if (grade === 'easy') nextInterval = window.Utils.parseSrsTime(settings?.srsEasy) || 7;
else nextInterval = 1;
if (nextInterval <= 0) nextInterval = 1;
} else if (prevRep === 1) {
nextInterval = Math.round(prevInterval * prevEase);
} else {
nextInterval = Math.round(prevInterval * prevEase);
}
nextRep = prevRep + 1;
} else {
nextInterval = 0.007;
nextRep = 0;
}
nextEase = prevEase + (0.1 - (5 - internalGrade) * (0.08 + (5 - internalGrade) * 0.02));
if (nextEase < 1.3) nextEase = 1.3;
const now = new Date();
const dueDate = new Date(now.getTime() + nextInterval * 24 * 60 * 60 * 1000).getTime();
return {
srs_interval: nextInterval,
srs_repetition: nextRep,
srs_ease: parseFloat(nextEase.toFixed(2)),
srs_due: dueDate
};
},
getSrsTimeLabel: (days) => {
if (!days) return "New";
if (days < 1) {
const minutes = Math.round(days * 24 * 60);

const hours = Math.round(days * 24);
return `${hours}h`;
}
return `${Math.round(days)}d`;
},
generateTrickyVariant: (correctText, otherCards) => {
if (!correctText || !otherCards || otherCards.length === 0) return correctText;
let words = correctText.split(' ');
const isChinese = !correctText.includes(' ');
if (isChinese) words = correctText.split('');
if (words.length <= 1) {
const randomCard = otherCards[Math.floor(Math.random() * otherCards.length)];
const randomSource = isChinese ? randomCard.definition.split('') : randomCard.definition.split(' ');
const randomWord = randomSource[Math.floor(Math.random() * randomSource.length)];
return correctText + (isChinese ? "" : " ") + randomWord;
}
const strategy = Math.random();
const lastIdx = words.length - 1;
if (strategy < 0.33) {
[words[lastIdx], words[lastIdx - 1]] = [words[lastIdx - 1], words[lastIdx]];
}
else if (strategy < 0.66) {
const randomCard = otherCards[Math.floor(Math.random() * otherCards.length)];
const randomSource = isChinese ? randomCard.definition.split('') : randomCard.definition.split(' ');
const randomWord = randomSource[Math.floor(Math.random() * randomSource.length)];
words.push(randomWord);
}
else {
const randomCard = otherCards[Math.floor(Math.random() * otherCards.length)];
const randomSource = isChinese ? randomCard.definition.split('') : randomCard.definition.split(' ');
const randomWord = randomSource[Math.floor(Math.random() * randomSource.length)];
words[lastIdx] = randomWord;
}
return words.join(isChinese ? '' : ' ');
}
};

window.OfflineDistractorEngine = {
generate: (correctAnswer, deck, lang, askMode) => {
const distractors = new Set();
// Nhận diện Logographic (Trung/Nhật) chặt chẽ hơn:
// Phải chứa ký tự tượng hình VÀ KHÔNG chứa bất kỳ loại khoảng trắng nào (bao gồm non-breaking space).
const hasLogographic = /[\u4e00-\u9fa5]/.test(correctAnswer);
const hasSpace = /\s/.test(correctAnswer.trim());
const isLogographic = hasLogographic && !hasSpace;
const getTokens = (str) => isLogographic ? Array.from(str) : str.split(/\s+/); // Split bằng mọi loại space
const joinTokens = (arr) => isLogographic ? arr.join('') : arr.join(' ');
// Hàm trích xuất chữ/số thuần túy
const extractWord = (str) => str.replace(/[^\p{L}\p{N}]/gu, '');
const correctTokens = getTokens(correctAnswer);
// Bể chứa từ vựng (Pool)
const pool = [];
deck.forEach(c => {
const text = askMode === 'def' ? c.term : c.definition;
if (text && text !== correctAnswer) {
// Chỉ lấy những phần thực sự là chữ vào Pool
getTokens(text).forEach(t => {
const cleaned = extractWord(t);
if (cleaned.length > 0) pool.push(cleaned);
});
}
});
const validPool = pool;
const getRandToken = () => validPool.length > 0 ? validPool[Math.floor(Math.random() * validPool.length)] : (isLogographic ? "的" : "the");
// Xác định danh sách các Index thực sự chứa chữ
const validTargetIndices = [];
correctTokens.forEach((t, i) => {
if (extractWord(t).length > 0) validTargetIndices.push(i);
});
let attempts = 0;
// Cố gắng sinh ra 4 đáp án nhiễu
while(distractors.size < 4 && attempts < 100) {
attempts++;
let newD = "";
let method = Math.floor(Math.random() * 3) + 1; // Chọn ngẫu nhiên 1, 2 hoặc 3
let tokens = [...correctTokens];
if (validTargetIndices.length <= 1) {
// Câu quá ngắn -> Bốc từ ngẫu nhiên
newD = getRandToken();
} else {
// Thuật toán Anchor (Mỏ neo)
let anchorCount = validTargetIndices.length > 4 ? 2 : 1;
let mutableIndices = validTargetIndices.slice(anchorCount);
if (mutableIndices.length === 0) mutableIndices = validTargetIndices;
if (method === 1) {
// CÁCH #1: Cắt đuôi & Thay thế cụm từ (SMART LENGTH PADDING)
let startIdx = mutableIndices[0];
let removedLength = tokens.length - startIdx; // Tính độ dài phần bị cắt
tokens = tokens.slice(0, startIdx); // Cắt bỏ
// Bù đắp số lượng từ tương đương (+/- 1) để câu không bị cụt
let tokensToAdd = Math.max(1, removedLength + Math.floor(Math.random() * 3) - 1);
for(let k=0; k < tokensToAdd; k++) {
tokens.push(getRandToken());
}
newD = joinTokens(tokens);
} else if (method === 2) {
// CÁCH #2: Khuyết từ / Thế từ
let tIdx = mutableIndices[Math.floor(Math.random() * mutableIndices.length)];
if (Math.random() > 0.5) {
tokens.splice(tIdx, 1); // Xóa
} else {
tokens[tIdx] = getRandToken(); // Thế
}
newD = joinTokens(tokens);
} else {
// CÁCH #3: Sai chính tả (Typo)
let tIdx = mutableIndices[Math.floor(Math.random() * mutableIndices.length)];
let word = tokens[tIdx];
let cleanW = extractWord(word);
if (isLogographic) {
tokens[tIdx] = getRandToken();
} else {
if (cleanW && cleanW.length > 3) {
let arr = Array.from(cleanW);
let charIdx = Math.floor(Math.random() * (arr.length - 2)) + 1;
let temp = arr[charIdx]; arr[charIdx] = arr[charIdx+1]; arr[charIdx+1] = temp;
tokens[tIdx] = word.replace(cleanW, arr.join(''));
} else {
tokens[tIdx] = getRandToken();
}
}
newD = joinTokens(tokens);
}
}
newD = newD.trim();
// Đảm bảo không trùng và không rỗng
if (newD && newD !== correctAnswer && newD !== joinTokens(correctTokens)) {
distractors.add(newD);
}
}
// Dự phòng (Fallback)
const fallbackDeck = window.Utils.shuffleArray([...deck]).filter(c => {
const text = askMode === 'def' ? c.term : c.definition;
return text !== correctAnswer;
});
let fIdx = 0;
while(distractors.size < 4 && fIdx < fallbackDeck.length) {
const text = askMode === 'def' ? fallbackDeck[fIdx].term : fallbackDeck[fIdx].definition;
if (text && text.trim()) distractors.add(text.trim());
fIdx++;
}
return Array.from(distractors).slice(0, 4);
}
};

<div className="text-xs text-gray-500">{subtitle}</div>

</div>
<div className={`w-10 h-5 rounded-full p-0.5 transition-colors duration-300 flex-none ${active ? `bg-${color}-500` : 'bg-gray-300'}`}>

</div>
</div>
{active && extra && !disabled && extra}
</div>
);
// [QUAN TRỌNG] EXPORT GLOBAL
window.ErrorBoundary = ErrorBoundary;
window.Icons = Icons;
window.AiModeSwitch = AiModeSwitch;
window.MenuToggle = MenuToggle;
// Block3.2: TẦNG 3: GIAO DIỆN BỐ CỤC & ĐIỀU KHIỂN (Layout & Control Components) - Version 1.1
// Last Updated: 2026-03-31 11:05
// Nhiệm vụ: Chứa các Component định hình khung giao diện chính của ứng dụng (AppHeader, FlashcardDisplay, ControlBar, BottomNav).
// Quy tắc: Các component này đóng vai trò hiển thị (Presentational), chủ yếu nhận Props từ Tầng 6 (Logic) để render và phát ra sự kiện.
// ==================================================================================
const AppHeader = ({ lang, setLang, notebookCount, masteredCount, incorrectCount, onOpenNotebook, onOpenMastered, onOpenIncorrect, onOpenLinkManager, onOpenManual, onOpenHelp, onReload, t, studySourceName, onExitStudyMode, onOpenSaveLoad }) => {

{studySourceName && (
<div className="w-full bg-orange-100 border-l-4 border-orange-500 text-orange-700 p-3 rounded-r shadow-sm flex justify-between items-center animate-in fade-in slide-in-from-top-2">
<div className="flex items-center gap-2">
<Icons.BookOpen size={18} />

<button

className="bg-white text-orange-600 px-3 py-1.5 rounded border border-orange-200 text-xs font-bold hover:bg-orange-50 flex items-center gap-1 transition-colors shadow-sm"

>
<Icons.RotateCcw size={14} /> Thoát

</div>
)}
<div className="w-full flex flex-col sm:flex-row justify-between items-center gap-4">
<div className="flex items-center gap-2">
<h1 className={`text-xl font-bold truncate text-${mainColor}-700`}>Flashcard Lite</h1>
<button
onClick={() => setLang(l => l === 'zh' ? 'en' : (l === 'en' ? 'vi' : 'zh'))}
className="bg-white p-1.5 rounded-full shadow flex items-center gap-1 text-xs font-bold border"
>
<Icons.Globe size={18} className={`text-${mainColor}-600`} />
{lang === 'zh' ? 'CN' : (lang === 'vi' ? 'VN' : 'EN')}
</button>
<button
onClick={onOpenNotebook}
className="relative p-2 bg-white text-orange-500 rounded-full shadow border"
>
<Icons.BookOpen size={20} />

{/* Nút Sổ tay cần nhớ (Incorrect List) */}
<button

>
<Icons.Brain size={20} />
{incorrectCount > 0 && <span className="absolute -top-1 -right-1 w-4 h-4 bg-red-600 text-white text-[10px] flex items-center justify-center rounded-full font-bold">{incorrectCount}</span>}
</button>
<button
onClick={onReload}
className="p-2 bg-white text-blue-500 rounded-full shadow border hover:bg-blue-50 hover:rotate-180 transition-all duration-500"

>
<Icons.RefreshCw size={20} />

{masteredCount > 0 && (
<button
onClick={onOpenMastered}
className="relative p-2 bg-white text-green-600 rounded-full shadow border"
data-tooltip="Danh sách đã thuộc"
>
<Icons.CheckCircle size={20} />
<span className="absolute -top-1 -right-1 w-4 h-4 bg-green-500 text-white text-[10px] flex items-center justify-center rounded-full font-bold">{masteredCount}</span>

</div>
<div className="flex gap-2 flex-wrap justify-center">
<button onClick={onOpenLinkManager} className="p-2 bg-white text-green-600 rounded-full shadow" data-tooltip={t('ttImportLink')}><Icons.Link size={20} /></button>
<button onClick={onOpenManual} className="p-2 bg-white text-green-600 rounded-full shadow"><Icons.Upload size={20} /></button>
{/* Nút Save/Load */}
<button onClick={onOpenSaveLoad} className="p-2 bg-white text-blue-600 rounded-full shadow hover:bg-blue-50 transition-colors" title="Sao lưu & Phục hồi dữ liệu">
<Icons.Save size={20} />
</button>
{/* Nút Help */}
<button onClick={onOpenHelp} className="p-2 bg-white text-purple-600 rounded-full shadow" title="Hướng dẫn sử dụng"><Icons.HelpCircle size={20} /></button>

);
};
// [UPDATED] Nhận thêm prop lang và onOpenHanzi
const FlashcardDisplay = ({ isFlipped, setIsFlipped, isAutoPlaying, currentCardIndex, cards, settings, mainColor, speak, getCardStyle, isAiMode, setAiMode, t, onMissingKey, isLoading, AiModeSwitch, onEnrichCard, onNext, onPrev, onExplainGrammar, onSrsGrade, onResetSrs, isContentHidden, isMuted, onToggleMute, lang, onOpenHanzi }) => {
const currentCard = cards[currentCardIndex];
const hasImage = currentCard?.image && currentCard.image.trim() !== "";
const isDefFirst = settings.startSide === 'def';
const scale = settings.cardSize || 1;
const isSentence = currentCard ? window.Utils.detectSentence(currentCard.term) : false;
// [NEW] Typing Practice State & Ref
const [typingInput, setTypingInput] = useState('');
const [typingStatus, setTypingStatus] = useState('idle'); // idle, correct, wrong
const typingInputRef = useRef(null); // [NEW v1.7] Mỏ neo cho ô nhập liệu
// Reset Typing State when card changes
useEffect(() => {
setTypingInput('');
setTypingStatus('idle');
}, [currentCardIndex]);
// [NEW v1.7] Lắng nghe phím Delete toàn cục để xóa và focus lại ô gõ từ vựng
useEffect(() => {
const handleGlobalKeyDown = (e) => {
if (e.key === 'Delete') {
// Bỏ qua nếu người dùng đang nhập ở các ô input/textarea khác (ngoại trừ ô gõ từ vựng này)
if (e.target.tagName === 'TEXTAREA' || (e.target.tagName === 'INPUT' && e.target !== typingInputRef.current)) {
return;
}
e.preventDefault();
setTypingInput('');
setTypingStatus('idle');
setTimeout(() => {
typingInputRef.current?.focus();
}, 10);
}
};
window.addEventListener('keydown', handleGlobalKeyDown);
return () => window.removeEventListener('keydown', handleGlobalKeyDown);
}, []);
// Fix Glitch: Delay hiển thị nội dung
const [delayedHidden, setDelayedHidden] = useState(isContentHidden);
useEffect(() => {
if (isContentHidden) {
setDelayedHidden(true);
} else {
const timer = setTimeout(() => {
setDelayedHidden(false);
}, 200);
return () => clearTimeout(timer);
}
}, [isContentHidden, currentCardIndex]);
// Swipe Logic
const [touchStart, setTouchStart] = useState(null);
const [touchEnd, setTouchEnd] = useState(null);
const minSwipeDistance = 50;
const onTouchStart = (e) => {
setTouchEnd(null);
setTouchStart({ x: e.targetTouches[0].clientX, y: e.targetTouches[0].clientY });
};
const onTouchMove = (e) => {
setTouchEnd({ x: e.targetTouches[0].clientX, y: e.targetTouches[0].clientY });
};
const onTouchEnd = () => {
if (!touchStart || !touchEnd) return;
const distanceX = touchStart.x - touchEnd.x;
const distanceY = touchStart.y - touchEnd.y;
if (Math.abs(distanceY) > Math.abs(distanceX)) return;
if (distanceX > minSwipeDistance && onNext) onNext();
if (distanceX < -minSwipeDistance && onPrev) onPrev();
};
// Helper: Tính toán label thời gian cho nút SRS
const getSrsLabel = (grade) => {
if (!currentCard || !window.Utils?.calculateSRS) return "";
const result = window.Utils.calculateSRS(currentCard, grade, settings);
return window.Utils.getSrsTimeLabel(result.srs_interval);
};
// Helper: Lấy font family từ settings (Local)
const getFontFamily = () => {
const font = settings?.fontFamily || 'sans';
switch (font) {
case 'serif': return '"Noto Serif SC", serif';
case 'kaiti': return '"KaiTi", "STKaiti", "楷体", "LXGW WenKai Lite", serif';
case 'callig': return '"Long Cang", cursive';
case 'cn_kaiti': return '"KaiTi", "STKaiti", "楷体", serif';
default: return 'ui-sans-serif, system-ui, sans-serif';
}
};
// [UPDATED v1.6] Logic kiểm tra gõ phím - Chặn đọc nếu đang Auto-play
const handleCheckTyping = () => {
if (!currentCard) return;
const clean = (str) => str.toLowerCase().replace(/[^\p{L}\p{N}]/gu, "").trim();
const inputClean = clean(typingInput);
const targetClean = clean(currentCard.term);
if (inputClean === targetClean) {
setTypingStatus('correct');
if (speak && !isAutoPlaying) speak(currentCard.term); // Chỉ đọc thưởng nếu không bật Auto-play
} else {
setTypingStatus('wrong');
}
};
const isSrsEnabled = settings.srsEnabled !== false;
const sinoVietLabel = mainColor === 'sky' ? "Dịch chi tiết" : t('sinoVietLabel');
// Gộp dòng để tránh dấu nháy đơn
const cardStyle = { '--fc-scale': scale, transform: isFlipped ? 'rotateY(180deg)' : 'rotateY(0deg)' };
// Gộp dòng để tránh dấu nháy đơn
const inputGroupStyle = { '--fc-scale': scale };
return (
<div className="w-full flex flex-col items-center">
<style>{`
.fc-card {
display: grid;
width: calc(100% * var(--fc-scale));
max-width: 100%;
margin: 0 auto;
min-height: calc(40vh * var(--fc-scale));
height: auto;
will-change: transform;
transform-style: preserve-3d;
transition: transform 0.7s;
}
/* Fix layout shift & overflow */
.fc-input-group {
display: flex;
gap: 0.5rem;
margin-bottom: 1rem;
width: calc(100% * var(--fc-scale));
max-width: 100%;
margin-left: auto;
margin-right: auto;
box-sizing: border-box; /* Quan trọng */
}
.fc-card-image {
position: relative;
height: calc(120px * var(--fc-scale));
width: auto;
aspect-ratio: 1 / 1;
flex-shrink: 0;
margin-bottom: 0.5rem;
}
@media (min-width: 768px) {
.fc-card {
display: block;
width: calc(600px * var(--fc-scale)) !important;
height: calc(360px * var(--fc-scale)) !important;
min-height: 0 !important;
max-width: none;
flex-shrink: 0;
}
/* Đồng bộ width trên Desktop */
.fc-input-group {
width: calc(600px * var(--fc-scale)) !important;
}
.fc-card-image {
position: absolute;
right: 1rem;
top: 50%;
transform: translateY(-50%) rotate(6deg);
height: 8rem;
width: 8rem;
margin-bottom: 0;
}
.fc-card-image:hover {
transform: translateY(-50%) rotate(0deg) scale(1.1);
z-index: 50;
}
}
.fc-face {
backface-visibility: hidden;
-webkit-backface-visibility: hidden;
border-radius: 1rem;
box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
background-color: white;
}
.fc-front {
grid-area: 1 / 1;
position: relative;
width: 100%;
height: auto;
min-height: 100%;
}
.fc-back {
grid-area: 1 / 1;
position: absolute;
top: 0; left: 0; bottom: 0; right: 0;
overflow-y: auto;
}
@media (min-width: 768px) {
.fc-front, .fc-back {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
overflow: hidden;
}
.fc-back { overflow-y: auto; }
}
`}</style>
{/* GIỮ TYPING BAR: Thanh gõ từ vựng hiện ở cả mặt trước và mặt sau */}
<div className="fc-input-group" style={inputGroupStyle}>
<input
ref={typingInputRef}
value={typingInput}
onChange={(e) => { setTypingInput(e.target.value); setTypingStatus('idle'); }}
onKeyDown={(e) => {
if (e.key === 'Enter') {
handleCheckTyping();
e.target.blur(); // Thoát focus để dùng phím tắt (Space để lật thẻ)
}
}}
className={`flex-1 min-w-0 p-3 rounded-xl border-2 outline-none transition-all font-medium shadow-sm ${typingStatus === 'correct' ? 'border-green-500 bg-green-50 text-green-700' : typingStatus === 'wrong' ? 'border-red-500 bg-red-50 text-red-700' : 'border-white focus:border-blue-400 focus:ring-2 focus:ring-blue-100'}`}
placeholder={t('modeScramble').replace('Ghép Câu', 'Gõ lại từ vựng... (Phím Delete để xóa nhanh)')}
style={{ fontFamily: getFontFamily() }}
autoComplete="off"
autoCapitalize="off"
/>
<button
onClick={handleCheckTyping}
className={`px-4 rounded-xl font-bold text-white shadow transition-all active:scale-95 flex items-center justify-center flex-shrink-0 ${typingStatus === 'correct' ? 'bg-green-500' : typingStatus === 'wrong' ? 'bg-red-500' : `bg-${mainColor}-500 hover:bg-${mainColor}-600`}`}
>
{typingStatus === 'correct' ? <Icons.Check size={20} /> : (typingStatus === 'wrong' ? <Icons.X size={20} /> : <Icons.CheckCircle size={20} />)}
</button>
</div>
<div className="w-full flex justify-center perspective-1000" onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
{/* CARD CONTAINER */}
<div key={currentCardIndex} className="fc-card cursor-pointer" style={cardStyle} onClick={() => !isAutoPlaying && setIsFlipped(!isFlipped)}>
{/* MẶT TRƯỚC (Front Face) */}
<div className="fc-face fc-front flex flex-col items-center justify-between p-6 border-2 border-gray-100">
{!isFlipped && (

<span className="text-xs text-gray-400 self-start">{currentCardIndex + 1}/{cards.length}</span>
<div className={`flex-1 flex flex-col md:flex-row items-center justify-center w-full relative md:overflow-hidden`}>
{!delayedHidden ? (
<>
<div
className={`text-center break-words w-full order-2 md:order-1 ${hasImage ? 'md:pr-40' : 'px-4'} flex-1 flex flex-col justify-center md:overflow-y-auto md:custom-scrollbar`}
style={{ ...getCardStyle(false), fontWeight: settings?.fontWeight || 'bold', fontFamily: isDefFirst ? 'inherit' : getFontFamily() }}
>
{isDefFirst ? currentCard?.definition : currentCard?.term}
</div>
{hasImage && (
<div className="fc-card-image order-1 md:order-2 p-1 bg-white rounded-xl shadow-md border border-gray-100">
<img src={currentCard.image} alt="minh họa" className="w-full h-full object-contain rounded-lg" onError={(e) => { e.target.parentElement.style.display = 'none' }} />
</div>
)}
</>
) : (
<div className="flex flex-col items-center gap-3 animate-pulse text-gray-300">
<Icons.Eye size={64} className="opacity-20" />
<div className="flex flex-col items-center">
<span className="text-xs font-bold uppercase tracking-[0.2em] opacity-40">Kiểm tra trí nhớ</span>
<span className="text-[10px] italic opacity-30 mt-1">Vui lòng tự nhớ mặt chữ...</span>
</div>
</div>
)}
</div>
<div className="flex justify-center mt-2 gap-3">
{/* Nút Loa */}
<button
onClick={(e) => { e.stopPropagation(); speak(cards[currentCardIndex]?.term); }}
className={`p-3 rounded-full bg-white text-${mainColor}-500 shadow border-2 border-${mainColor}-100 hover:scale-105 disabled:opacity-20`}
disabled={isContentHidden}
>
<Icons.Volume2 size={24} />
</button>
{/* Nút Bút Lông (Chỉ hiện khi tiếng Trung) */}
{lang === 'zh' && (
<button
onClick={(e) => { e.stopPropagation(); if (onOpenHanzi) onOpenHanzi(cards[currentCardIndex]?.term); }}
className={`p-3 rounded-full bg-white text-red-600 shadow border-2 border-red-100 hover:scale-105 transition-transform`}
disabled={isContentHidden}
title="Tập viết chữ Hán"
>
<Icons.Brush size={24} />
</button>
)}
{/* Nút Tắt/Bật tiếng (Chỉ hiện khi Auto-play) */}
{isAutoPlaying && (
<button
onClick={(e) => { e.stopPropagation(); if (onToggleMute) onToggleMute(); }}
className={`p-3 rounded-full shadow border-2 hover:scale-105 transition-all ${isMuted ? 'bg-red-50 text-red-500 border-red-100' : 'bg-white text-gray-400 border-gray-200'}`}
title={isMuted ? "Bật tiếng" : "Tắt tiếng (Giữ thời gian đọc)"}
>
{isMuted ? <Icons.VolumeX size={24} /> : <Icons.Volume2 size={24} className="opacity-50" />}
</button>
)}
</div>
</div>
{/* MẶT SAU (Back Face) */}
<div className={`fc-face fc-back bg-${mainColor}-50 border-${mainColor}-100 flex flex-col items-center justify-between pt-6 px-6 pb-1 border-2`} style={{ transform: "rotateY(180deg)" }}>
{isSrsEnabled && (
<div className="absolute top-4 left-4 z-10 flex items-center gap-2">
{currentCard?.srs_interval ? (
<>
<span className={`text-[10px] font-bold px-2 py-1 rounded-full border bg-white shadow-sm ${currentCard.srs_interval > 3 ? 'text-green-600 border-green-200' : 'text-orange-600 border-orange-200'}`}>
Ôn tập: {window.Utils?.getSrsTimeLabel ? window.Utils.getSrsTimeLabel(currentCard.srs_interval) : `${currentCard.srs_interval}d`}
</span>
<button
onClick={(e) => { e.stopPropagation(); if (onResetSrs) onResetSrs(); }}
className="p-1 bg-white text-gray-400 rounded-full border border-gray-200 hover:text-red-500 hover:border-red-200 hover:bg-red-50 hover:rotate-180 transition-all shadow-sm"
title="Reset về trạng thái Mới"
>
<Icons.RotateCcw size={14} />
</button>
</>
) : (
<span className="text-[10px] font-bold px-2 py-1 rounded-full border bg-gray-100 text-gray-500 border-gray-200">
Mới
</span>
)}
</div>
)}
<div
className="flex flex-col items-center gap-2 overflow-y-auto custom-scrollbar w-full flex-1 justify-start mt-6"
style={{ ...getCardStyle(true), fontFamily: 'inherit' }}
>
<div className={`text-${mainColor}-600 font-medium`} style={{ fontSize: '1.1em' }}>{currentCard?.pronunciation}</div>
<div className="text-gray-800 text-center my-1" style={{ fontSize: '1em', marginTop: '8px', fontWeight: settings?.fontWeight || 'bold', fontFamily: isDefFirst ? getFontFamily() : 'inherit' }}>
{isDefFirst ? currentCard?.term : currentCard?.definition}
</div>
{currentCard?.analysis && (
<div className="text-gray-600 font-semibold bg-white/60 px-3 py-1 rounded-full border border-gray-100 mb-1 text-center" style={{ fontSize: '0.75em' }}>
{currentCard.analysis}
</div>
)}
{currentCard?.sinoViet && (
<div className="text-gray-500 italic bg-white/50 px-2 py-1 rounded text-center" style={{ fontSize: '0.85em' }}>
<span className="font-bold uppercase opacity-70 mr-1" style={{ fontSize: '0.9em' }}>{sinoVietLabel}:</span>
{currentCard?.sinoViet}
</div>
)}
{currentCard?.example && (<div className="text-gray-600 text-center italic w-full border-t border-gray-200 pt-2 whitespace-pre-wrap" style={{ fontSize: '0.85em' }}>{currentCard?.example}</div>)}
{!currentCard?.analysis && (
<button
onClick={(e) => { e.stopPropagation(); onExplainGrammar(); }}
className="mt-2 px-3 py-1 bg-blue-100 text-blue-700 font-bold rounded-full shadow-sm hover:bg-blue-200 transition-colors flex items-center gap-1"
style={{ fontSize: '0.75em' }}
>
<Icons.Sparkles size={12} /> {isSentence ? "Phân tích ngữ pháp" : "Phân tích từ loại"}
</button>
)}
</div>
{onSrsGrade && isSrsEnabled && (
<div className="w-full mt-1 pt-1 border-t border-gray-200/30 grid grid-cols-4 gap-1.5 z-20">
<button onClick={(e) => { e.stopPropagation(); onSrsGrade('again'); }} className="flex flex-row items-center justify-center gap-1 py-2 px-0.5 bg-red-100 text-red-700 rounded-lg hover:bg-red-200 active:scale-95 transition-all">
<span className="text-[10px] font-bold uppercase">{t('srsAgain')}</span>
<span className="text-[9px] opacity-70 font-mono">{getSrsLabel('again')}</span>
</button>
<button onClick={(e) => { e.stopPropagation(); onSrsGrade('hard'); }} className="flex flex-row items-center justify-center gap-1 py-2 px-0.5 bg-orange-100 text-orange-700 rounded-lg hover:bg-orange-200 active:scale-95 transition-all">
<span className="text-[10px] font-bold uppercase">{t('srsHard')}</span>
<span className="text-[9px] opacity-70 font-mono">{getSrsLabel('hard')}</span>
</button>
<button onClick={(e) => { e.stopPropagation(); onSrsGrade('good'); }} className="flex flex-row items-center justify-center gap-1 py-2 px-0.5 bg-blue-100 text-blue-700 rounded-lg hover:bg-blue-200 active:scale-95 transition-all">
<span className="text-[10px] font-bold uppercase">{t('srsGood')}</span>
<span className="text-[9px] opacity-70 font-mono">{getSrsLabel('good')}</span>

const parse = (str) => {
let d = 0, h = 0, m = 0;
if (!str) return { d, h, m };
const matchD = str.match(/(\d+)d/); if (matchD) d = parseInt(matchD[1]);
const matchH = str.match(/(\d+)h/); if (matchH) h = parseInt(matchH[1]);
const matchM = str.match(/(\d+)m/); if (matchM) m = parseInt(matchM[1]);
return { d, h, m };
};
const format = (obj) => {
let parts = [];
if (obj.d > 0) parts.push(`${obj.d}d`);
if (obj.h > 0) parts.push(`${obj.h}h`);
if (obj.m > 0) parts.push(`${obj.m}m`);
return parts.join(' ') || '0m';
};
const data = parse(valueStr);
const handleChange = (field, val) => {
const num = parseInt(val) || 0;
const newData = { ...data, [field]: num };
onChange(format(newData));
};

const handleMouseDown = (e) => {
if (e.type === 'mousedown' && e.button !== 0) return;
const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
dragRef.current = { isDragging: true, startX: clientX, startY: clientY, initialX: position.x, initialY: position.y };
const move = (e) => {
if (!dragRef.current.isDragging) return;
if (e.cancelable) e.preventDefault();
const cx = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
const cy = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
const dx = cx - dragRef.current.startX;
const dy = cy - dragRef.current.startY;
setPosition({ x: dragRef.current.initialX + dx, y: dragRef.current.initialY + dy });
};
const up = () => {
dragRef.current.isDragging = false;
document.removeEventListener('mousemove', move);
document.removeEventListener('mouseup', up);
document.removeEventListener('touchmove', move);
document.removeEventListener('touchend', up);
};
document.addEventListener('mousemove', move);
document.addEventListener('mouseup', up);
document.addEventListener('touchmove', move, { passive: false });
document.addEventListener('touchend', up);
};

const [editingData, setEditingData] = useState([]);
const [fillingIndices, setFillingIndices] = useState(new Set());
const [showConfirmDelete, setShowConfirmDelete] = useState(false);
useEffect(() => {
if (isOpen) {
const loaded = JSON.parse(JSON.stringify(data)).map((item, index) => ({
...item,
_tempId: Date.now() + index
}));
loaded.push({ term: '', pronunciation: '', definition: '', example: '', sinoViet: '', image: '', _tempId: Date.now() + 999999 });
setEditingData(loaded);
setShowConfirmDelete(false);
}
}, [isOpen, data]);
const handleChange = (index, field, value) => {
const newData = [...editingData];
newData[index][field] = value;
if (index === newData.length - 1 && value.trim() !== "") {
newData.push({ term: '', pronunciation: '', definition: '', example: '', sinoViet: '', image: '', _tempId: Date.now() + Math.random() });
}
setEditingData(newData);
};
const handleDelete = (index) => {
const newData = [...editingData];
newData.splice(index, 1);
if (newData.length === 0) {
newData.push({ term: '', pronunciation: '', definition: '', example: '', sinoViet: '', image: '', _tempId: Date.now() });
}
setEditingData(newData);
};
const handleDeleteAllClick = () => {
setShowConfirmDelete(true);
};
const confirmDeleteAll = () => {
setEditingData([{ term: '', pronunciation: '', definition: '', example: '', sinoViet: '', image: '', _tempId: Date.now() }]);
setShowConfirmDelete(false);
};
const handleSave = () => {
const validData = editingData.filter(item => item.term && item.term.trim() !== "");
onSave(validData.map(({ _tempId, ...rest }) => rest));
onClose();
};
const handleAiFill = async (index) => {
let item = editingData[index];
if (!item.term || item.term.trim() === "") {
alert("Vui lòng nhập từ vựng trước khi gọi AI!");
return;
}
if (sourceData && sourceData.length > 0) {
const localMatch = sourceData.find(c => c.term.toLowerCase().trim() === item.term.toLowerCase().trim());
if (localMatch) {
console.log("Found in source data, merging local data...");
const mergedItem = {
...item,
definition: item.definition || localMatch.definition,
pronunciation: item.pronunciation || localMatch.pronunciation,
analysis: item.analysis || localMatch.analysis,
example: item.example || localMatch.example,
sinoViet: item.sinoViet || localMatch.sinoViet,
image: (localMatch.image && localMatch.image.startsWith('http') && !item.image) ? localMatch.image : item.image
};
setEditingData(prev => {
const newData = [...prev];
newData[index] = mergedItem;
return newData;
});
item = mergedItem;
}
}
const requiredFields = ['pronunciation', 'definition', 'analysis', 'sinoViet', 'example'];
const missingFields = requiredFields.filter(field => !item[field] || item[field].toString().trim() === "");
if (!item.image || !item.image.startsWith('http')) {
missingFields.push('image');
}
if (missingFields.length === 0) return;
if (!apiKey) { alert("Vui lòng nhập API Key để AI điền nốt thông tin còn thiếu!"); return; }
setFillingIndices(prev => new Set(prev).add(index));
try {
const result = await window.Utils.fillCardWithAi(item.term, lang, apiKey, missingFields);
if (result) {
if (result._tokenUsage) {
const used = result._tokenUsage.totalTokenCount || 0;
const currentTotal = parseInt(localStorage.getItem('fc_total_tokens') || '0', 10);
localStorage.setItem('fc_total_tokens', currentTotal + used);
}
setEditingData(prev => {
const newData = [...prev];
newData[index] = {
...newData[index],
definition: newData[index].definition || result.definition,
pronunciation: newData[index].pronunciation || result.pronunciation,
analysis: newData[index].analysis || result.analysis,
example: newData[index].example || result.example,
sinoViet: newData[index].sinoViet || result.sinoViet
};
if (result.image && result.image.startsWith('http')) {
newData[index].image = result.image;
}
return newData;
});
}
} catch (e) {
console.error(e);
alert("Lỗi AI: " + e.message);
} finally {
setFillingIndices(prev => { const next = new Set(prev); next.delete(index); return next; });
}
};
const handleAiFillAll = async () => {
if (!apiKey) { alert("Vui lòng nhập API Key trước!"); return; }
if (!confirm("Hệ thống sẽ tự động điền thông tin cho các từ còn thiếu. Việc này có thể tốn nhiều Token. Bạn có muốn tiếp tục?")) return;
const indicesToFill = editingData.map((item, idx) => {
if (!item.term || item.term.trim() === "") return -1;
const required = ['definition', 'pronunciation', 'example'];
const isMissing = required.some(f => !item[f] || item[f].trim() === "");
return isMissing ? idx : -1;
}).filter(idx => idx !== -1);
if (indicesToFill.length === 0) { alert("Sổ tay đã đầy đủ thông tin (hoặc chưa nhập từ vựng)!"); return; }
for (const idx of indicesToFill) {
await handleAiFill(idx);
await new Promise(r => setTimeout(r, 1000));
}
};

return (

const WordSelectorModal = ({ isOpen, onClose, onSave, text, currentLang, t, mainColor }) => {
const [selectedIndices, setSelectedIndices] = useState(new Set());
const [words, setWords] = useState([]);
useEffect(() => {
if (!text) { setWords([]); return; }
if (currentLang === 'zh') { setWords([...text].filter(c => c.trim().length > 0)); }
else { setWords(text.split(' ').filter(w => w.length > 0)); }
setSelectedIndices(new Set());
}, [text, currentLang, isOpen]);
const toggleWord = (index) => {
const newSet = new Set(selectedIndices);
newSet.has(index) ? newSet.delete(index) : newSet.add(index);
setSelectedIndices(newSet);
};
if (!isOpen) return null;
const selectedWordsList = words.filter((_, i) => selectedIndices.has(i));
return (
<div className="fixed inset-0 z-[250] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm animate-in fade-in">

</button>
))}
</div>
</div>
<div className="p-4 border-t bg-gray-50 flex flex-col gap-2">

<button onClick={() => onSave(selectedWordsList, false)} disabled={selectedIndices.size === 0} className={`flex-1 py-3 bg-orange-500 text-white rounded-xl font-bold disabled:opacity-50 hover:bg-${mainColor}-700 shadow-md transition-all active:scale-95`}>

{t('saveWholeSentence')}

);

const ManualInputModal = ({ isOpen, onClose, onImport, onAddCard, onAutoFill, t, mainColor }) => {
const [mode, setMode] = useState('single');
const [text, setText] = useState('');
const [isFilling, setIsFilling] = useState(false);
const [singleData, setSingleData] = useState({ term: '', pronunciation: '', definition: '', example: '', sinoViet: '' });
useEffect(() => {
if (isOpen) {
setText('');
setSingleData({ term: '', pronunciation: '', definition: '', example: '', sinoViet: '' });
setMode('single');
setIsFilling(false);
}
}, [isOpen]);
const handleSingleChange = (field, value) => setSingleData(prev => ({ ...prev, [field]: value }));
const handleSingleSubmit = () => {
if (!singleData.term.trim()) return;
onAddCard(singleData);
setSingleData({ term: '', pronunciation: '', definition: '', example: '', sinoViet: '' });
};
const handleAutoFillClick = async () => {
if (!singleData.term.trim()) return;
if (!onAutoFill) { alert("Chức năng AI chưa được kết nối!"); return; }
setIsFilling(true);
try {
const result = await onAutoFill(singleData.term);
if (result) {
if (result._tokenUsage) {
const used = result._tokenUsage.totalTokenCount || 0;
const currentTotal = parseInt(localStorage.getItem('fc_total_tokens') || '0', 10);
localStorage.setItem('fc_total_tokens', currentTotal + used);
}
setSingleData(prev => ({
...prev,
pronunciation: result.pronunciation || prev.pronunciation,
definition: result.definition || prev.definition,
example: result.example || prev.example,
sinoViet: result.sinoViet || prev.sinoViet
}));
}
}
catch (e) { console.error(e); }
finally { setIsFilling(false); }
};
if (!isOpen) return null;
return (
<div className="fixed inset-0 z-[250] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm animate-in fade-in">

<button className={`flex-1 py-3 text-sm font-bold transition-colors ${mode === 'batch' ? `text-${mainColor}-600 border-b-2 border-${mainColor}-600 bg-blue-50/50` : 'text-gray-500 hover:bg-gray-50'}`} onClick={() => setMode('batch')}>Nhập JSON (Nâng cao)</button>
</div>
<div className="p-6 overflow-y-auto custom-scrollbar flex-1">
{mode === 'single' ? (
<div className="space-y-4">
<div className="relative">
<label className="block text-xs font-bold text-gray-500 mb-1 uppercase">Từ vựng <span className="text-red-500">*</span></label>
<div className="flex gap-2">
<input type="text" className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-200 outline-none font-medium" placeholder="Ví dụ: Hello / 你好" value={singleData.term} onChange={(e) => handleSingleChange('term', e.target.value)} autoFocus />
<button
onClick={handleAutoFillClick}
disabled={isFilling || !singleData.term.trim()}
className={`p-3 rounded-lg border-2 ${isFilling ? 'bg-gray-100 border-gray-200 cursor-not-allowed' : `bg-purple-50 border-purple-200 text-purple-600 hover:bg-purple-100`}`}
title="Tự động điền bằng AI"
>
{isFilling ? <div className="w-5 h-5 border-2 border-purple-600 border-t-transparent rounded-full animate-spin"></div> : <Icons.Sparkles size={20} />}
</button>
</div>

<div>
<label className="block text-xs font-bold text-gray-500 mb-1 uppercase">Phiên âm</label>
<input type="text" className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-200 outline-none text-gray-600 font-sans" placeholder="Ví dụ: /həˈloʊ/" value={singleData.pronunciation} onChange={(e) => handleSingleChange('pronunciation', e.target.value)} />

</div>
</div>
<div>
<label className="block text-xs font-bold text-blue-600 mb-1 uppercase">Nghĩa ngắn gọn (Cho Game)</label>
<textarea className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-200 outline-none resize-none" rows="2" placeholder="Ví dụ: Xin chào" value={singleData.definition} onChange={(e) => handleSingleChange('definition', e.target.value)} />
</div>
<div>
<label className="block text-xs font-bold text-gray-500 mb-1 uppercase">Giải thích chi tiết & Ví dụ</label>
<textarea className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-200 outline-none resize-none h-24" placeholder="Ví dụ: Lời chào phổ biến...\n\nHello world!" value={singleData.example} onChange={(e) => handleSingleChange('example', e.target.value)} />
</div>
</div>
) : (

<p className="text-sm text-gray-500 mb-2">Dán danh sách từ vựng dạng JSON vào bên dưới:</p>
<textarea className="w-full p-3 border rounded-lg text-sm font-mono h-60 focus:ring-2 focus:ring-blue-200 outline-none resize-none bg-gray-50" placeholder='[{"term":"Hello", "definition":"Xin chào", "pronunciation":"/həˈloʊ/"}, ...]' value={text} onChange={(e) => setText(e.target.value)} />
</>
)}

<div className="p-4 border-t bg-gray-50 flex justify-end gap-3">
<button onClick={onClose} className="px-4 py-2 rounded text-gray-600 font-bold hover:bg-gray-200">{t('cancel')}</button>

<button onClick={handleSingleSubmit} disabled={!singleData.term.trim()} className={`px-6 py-2 rounded bg-${mainColor}-600 text-white font-bold hover:bg-${mainColor}-700 disabled:opacity-50 flex items-center gap-2 shadow-lg`}><Icons.Check size={18} /> Lưu thẻ</button>

)}
</div>
</div>
</div>
);
};

// Block4.5: TẦNG 4: CÁC TÍNH NĂNG & MODALS (AI Chat Assistant Modal) - Version 1.1
// Last Updated: 2026-03-31 11:15
// Nhiệm vụ: Khung Chat tự do với AI. Giúp người dùng hỏi đáp về ngữ pháp, giao tiếp giả lập.
// Quy tắc: Khối này tự quản lý state hội thoại (Messages) và lưu trữ cục bộ, không đẩy mảng chat rác lên Tầng 6.
// ==================================================================================
const AiChatModal = ({ isOpen, onClose, apiKey, lang, t, mainColor }) => {
// --- 1. STATE & REFS ---
const [messages, setMessages] = useState(() => {
const saved = localStorage.getItem('fc_ai_chat_history');
// Tin nhắn chào mừng mặc định
return saved ? JSON.parse(saved) : [{
id: 'init',
role: 'model',
text: "Xin chào! Tôi là trợ lý AI của Flashcard Lite. Tôi có thể giúp gì cho việc học của bạn hôm nay?"
}];
});
const [input, setInput] = useState("");
const [isSending, setIsSending] = useState(false);
// [NEW v1.1] State cho Kích thước Cửa sổ (Lưu lại thiết lập của người dùng)
const [size, setSize] = useState(() => {
try {
const savedSize = localStorage.getItem('fc_aichat_size');
return savedSize ? JSON.parse(savedSize) : { width: 450, height: 600 };
} catch { return { width: 450, height: 600 }; }
});
// Refs cho UI
const messagesEndRef = useRef(null);
const inputRef = useRef(null);
// Ref cho Drag & Resize
const [position, setPosition] = useState({ x: 0, y: 0 });
const dragRef = useRef({ isDragging: false, startX: 0, startY: 0, initialX: 0, initialY: 0 });
const resizeRef = useRef({ isResizing: false, startX: 0, startY: 0, startWidth: 0, startHeight: 0 });
// --- 2. EFFECTS ---
// Auto scroll xuống cuối khi có tin nhắn mới
useEffect(() => {
messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
localStorage.setItem('fc_ai_chat_history', JSON.stringify(messages));
}, [messages]);
// Lưu kích thước cửa sổ
useEffect(() => {
localStorage.setItem('fc_aichat_size', JSON.stringify(size));
}, [size]);
// Focus vào input khi mở
useEffect(() => {
if (isOpen) setTimeout(() => inputRef.current?.focus(), 100);
}, [isOpen]);
// --- 3. LOGIC XỬ LÝ CHAT ---
const handleSend = async () => {
if (!input.trim() || isSending) return;
if (!apiKey) {
alert("Vui lòng nhập API Key trong Cài đặt trước!");
return;
}
const userText = input.trim();
const newMessage = { id: Date.now(), role: 'user', text: userText };
setMessages(prev => [...prev, newMessage]);
setInput("");
setIsSending(true);
try {
// Xây dựng ngữ cảnh hội thoại (Context)
const historyContext = messages.slice(-10).map(m =>
`${m.role === 'user' ? 'User' : 'Model'}: ${m.text}`
).join('\n');
const systemPrompt = `Bạn là trợ lý ảo hữu ích cho ứng dụng học từ vựng Flashcard Lite.
Ngôn ngữ học tập hiện tại của người dùng là: ${lang === 'zh' ? 'Tiếng Trung' : (lang === 'en' ? 'Tiếng Anh' : 'Tiếng Việt')}.
QUY TẮC GIAO TIẾP QUAN TRỌNG:
1. LUÔN LUÔN trả lời và giải thích bằng TIẾNG VIỆT (Vietnamese), trừ khi người dùng yêu cầu dịch sang ngôn ngữ khác hoặc yêu cầu cụ thể khác.
2. Nếu người dùng hỏi về từ vựng, hãy giải thích nghĩa, cách dùng và ví dụ.
3. Trả lời ngắn gọn, súc tích, thân thiện.
Hỗ trợ định dạng Markdown nhẹ (Bold, Italic, List).`;
const fullPrompt = `${systemPrompt}\n\nLịch sử chat:\n${historyContext}\n\nUser: ${userText}\nModel:`;
// Gọi API
const result = await window.Utils.callGeminiApi(fullPrompt, null, apiKey);
const aiMessage = {
id: Date.now() + 1,
role: 'model',
text: result.text || "Xin lỗi, tôi không thể trả lời lúc này."
};
setMessages(prev => [...prev, aiMessage]);
} catch (error) {
console.error("Chat Error:", error);
setMessages(prev => [...prev, {
id: Date.now(),
role: 'model',
text: `⚠️ Lỗi: ${error.message || "Không thể kết nối đến AI."}`
}]);
} finally {
setIsSending(false);
}
};
const handleClearHistory = () => {
if (confirm("Xóa toàn bộ lịch sử trò chuyện?")) {
setMessages([{
id: Date.now(),
role: 'model',
text: "Lịch sử đã được xóa. Chúng bắt đầu lại nhé!"
}]);
}
};
// --- 4. LOGIC KÉO THẢ (DRAG) ---
const handleMouseDown = (e) => {
if (e.target.closest('button') || e.target.closest('input') || e.target.closest('.no-drag')) return;
const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
dragRef.current = { isDragging: true, startX: clientX, startY: clientY, initialX: position.x, initialY: position.y };
const move = (e) => {
if (!dragRef.current.isDragging) return;
e.preventDefault();
const cx = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
const cy = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
const dx = cx - dragRef.current.startX;
const dy = cy - dragRef.current.startY;
setPosition({ x: dragRef.current.initialX + dx, y: dragRef.current.initialY + dy });
};
const up = () => {
dragRef.current.isDragging = false;
document.removeEventListener('mousemove', move);
document.removeEventListener('mouseup', up);
document.removeEventListener('touchmove', move);
document.removeEventListener('touchend', up);
};
document.addEventListener('mousemove', move);
document.addEventListener('mouseup', up);
document.addEventListener('touchmove', move, { passive: false });
document.addEventListener('touchend', up);
};
// --- 5. LOGIC KÉO GIÃN (RESIZE) - [NEW v1.1] ---
const handleResizeMouseDown = (e) => {
e.preventDefault();
e.stopPropagation();
const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
resizeRef.current = {
isResizing: true,
startX: clientX,
startY: clientY,
startWidth: size.width,
startHeight: size.height
};
const move = (e) => {
if (!resizeRef.current.isResizing) return;
if (e.cancelable) e.preventDefault();
const cx = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
const cy = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
const dx = cx - resizeRef.current.startX;
const dy = cy - resizeRef.current.startY;
// Giới hạn chiều rộng và chiều cao tối thiểu
setSize({
width: Math.max(300, Math.min(window.innerWidth - 40, resizeRef.current.startWidth + dx)),
height: Math.max(400, Math.min(window.innerHeight - 40, resizeRef.current.startHeight + dy))
});
};
const up = () => {
resizeRef.current.isResizing = false;
document.removeEventListener('mousemove', move);
document.removeEventListener('mouseup', up);
document.removeEventListener('touchmove', move);
document.removeEventListener('touchend', up);
};
document.addEventListener('mousemove', move);
document.addEventListener('mouseup', up);
document.addEventListener('touchmove', move, { passive: false });
document.addEventListener('touchend', up);
};
// --- 6. RENDER HELPER ---
const renderMarkdown = (text) => {
let html = text
.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') // Bold
.replace(/\*(.*?)\*/g, '<em>$1</em>') // Italic
.replace(/`(.*?)`/g, '<code class="bg-gray-200 px-1 rounded font-mono text-xs">$1</code>') // Code
.replace(/\n/g, '<br/>'); // Newline
return <span dangerouslySetInnerHTML={{ __html: html }} />;
};
if (!isOpen) return null;
const Icons = window.Icons;
const Icon = (Name, props) => Icons[Name] ? React.createElement(Icons[Name], props) : null;
return (
<div className="fixed inset-0 z-[200] flex items-center justify-center pointer-events-none">
{/* Overlay click to close */}

<div
className="bg-white/95 backdrop-blur-md shadow-2xl flex flex-col z-10 overflow-hidden pointer-events-auto rounded-2xl border border-gray-200 transition-transform duration-75 ease-out relative"
style={{
transform: `translate(${position.x}px, ${position.y}px)`,
width: `${size.width}px`,
height: `${size.height}px`,
maxWidth: '100vw',
maxHeight: '100vh'
}}
>
{/* Header (Draggable) */}
<div
className={`flex justify-between items-center p-3 border-b bg-${mainColor}-50 cursor-move select-none active:bg-${mainColor}-100 transition-colors`}
onMouseDown={handleMouseDown} onTouchStart={handleMouseDown}
>
<div className={`flex items-center gap-2 text-${mainColor}-700 font-bold`}>
{Icon('Sparkles', {size: 20})} AI Chat Assistant
</div>
<div className="flex gap-2">
<button onClick={handleClearHistory} className="p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="Xóa lịch sử">
{Icon('Trash2', {size: 18})}
</button>
<button onClick={onClose} className="p-1.5 text-gray-400 hover:text-gray-700 hover:bg-gray-200 rounded-lg transition-colors">
{Icon('X', {size: 20})}
</button>
</div>
</div>
{/* Messages Area */}
<div className="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-3 bg-gray-50 no-drag">
{messages.map((msg) => (
<div key={msg.id} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
<div
className={`

distractors = aiResult.slice(0, numDistractors).map((d) => {
if (!d) return null;
const safeStr = typeof d === 'string' ? d : (d.text || d.word || d.term || JSON.stringify(d));
return {
id: -1,
term: askMode === 'def' ? safeStr : `__AI_${Math.random()}__`,
definition: askMode === 'def' ? `__AI_${Math.random()}__` : safeStr
};
}).filter(x => x !== null);
isAiGenerated = true;
if (isInitializingRef.current) {
aiGeneratedCountRef.current += 1;
safeShowToast(`Đã thiết lập xong bẫy AI cho màn đấu...`, "success");
}
}
if (aiResult && aiResult._tokenUsage) {

}
} catch (e) {
console.warn("AI Match Preload Fallback triggered:", e.message);
}
}
// Fallback: Offline Distractors Đa Chiều
if (distractors.length < numDistractors) {
const distTexts = window.OfflineDistractorEngine.generate(targetText, cards, lang, askMode);
distTexts.slice(0, numDistractors - distractors.length).forEach(d => {
const safeD = typeof d === 'string' ? d : (d.text || d.word || JSON.stringify(d));
distractors.push({
id: -1,
term: askMode === 'def' ? safeD : `__DIS_${Math.random()}__`,
definition: askMode === 'def' ? `__DIS_${Math.random()}__` : safeD
});
});
let attempts = 0;
while (distractors.length < numDistractors && attempts < 50) {
attempts++;
const randomCard = cards[Math.floor(Math.random() * cards.length)];
const distText = askMode === 'def' ? randomCard.term : randomCard.definition;
const isDup = rightCandidates.some(r => (askMode === 'def' ? r.term : r.definition) === distText) ||
distractors.some(d => (askMode === 'def' ? d.term : d.definition) === distText);
if (!isDup) {
distractors.push({
id: -1,
term: askMode === 'def' ? distText : `__DIS_${Math.random()}__`,
definition: askMode === 'def' ? `__DIS_${Math.random()}__` : distText
});
}
}
}
rightCandidates = [...rightCandidates, ...distractors];
}
const rightItems = rightCandidates.map((c, i) => ({ ...c, id: i + 1000 })).sort(() => 0.5 - Math.random());

// Nhiệm vụ: Động cơ xử lý State, Trộn từ, AI Preload và Micro thu âm cho Game Ghép Câu.

const ScrambleGame = ({ cards, t, onBack, onEndGame, onPause, mainColor, lang, onPlay, apiKey, onBookmark, notebook, isPaused, showToast, onLogWrong, savedState, settings, timerMode, timeLimit, initialDifficulty, onAutoSave }) => {
// Wrapper an toàn bảo vệ hệ thống Toast Toàn cục
const safeShowToast = useCallback((msg, type = 'success') => {
if (showToast) {
showToast({ text: msg, type: type, id: Date.now() });
}
}, [showToast]);
const [inputMethod] = useState(() => {
try { return JSON.parse(localStorage.getItem('fc_scramble_config'))?.inputMethod || 'tap'; } catch (e) { return 'tap'; }
});
const [isAiMode] = useState(() => {
try { return JSON.parse(localStorage.getItem('fc_scramble_config'))?.aiMode || false; } catch (e) { return false; }
});
const [autoReadAnswer] = useState(() => {
try { return JSON.parse(localStorage.getItem('fc_scramble_config'))?.autoReadAnswer || false; } catch (e) { return false; }
});
const [gameState, setGameState] = useState({ origin: null, chunks: [], userAnswer: [], isCorrect: null, attempts: 0, isAiGenerated: false });
const [difficulty, setDifficulty] = useState(initialDifficulty || 'easy');
const [stats, setStats] = useState({ correct: 0, wrong: 0 });
const [inputBuffer, setInputBuffer] = useState("");
const [isListening, setIsListening] = useState(false);
const [showExplainModal, setShowExplainModal] = useState(false);
const [aiExplanation, setAiExplanation] = useState(null);
const [isAiExplaining, setIsAiExplaining] = useState(false);
const [timeLeft, setTimeLeft] = useState(timeLimit || 60);
const [isGenerating, setIsGenerating] = useState(false);
const [aiCountdown, setAiCountdown] = useState(0);
const [voiceRetries, setVoiceRetries] = useState(0);
const [voiceOptions, setVoiceOptions] = useState([]);
const [voiceSelectedOption, setVoiceSelectedOption] = useState(null);
const questionCache = useRef(new Map());
const endlessQueueRef = useRef([]);
const pendingFetchesRef = useRef(new Map());
const deckRef = useRef([]);
const dragItemRef = useRef(null);
const dragOverItemRef = useRef(null);
const autoNextRef = useRef(null);
const timerRef = useRef(null);
const touchStartPosRef = useRef({ x: 0, y: 0 });
const activeDragElementRef = useRef(null);
const recognitionRef = useRef(null);
const typeInputRef = useRef(null);
const silenceTimerRef = useRef(null);
const hardTimerRef = useRef(null);
const latestStateRef = useRef({});
const isGameActiveRef = useRef(true);
const isPreloadingRef = useRef(false);
const isInitializingRef = useRef(false);
const aiGeneratedCountRef = useRef(0);
useEffect(() => {
latestStateRef.current = { gameState, difficulty, stats, timeLeft, endlessQueue: endlessQueueRef.current, deck: deckRef.current };
}, [gameState, difficulty, stats, timeLeft]);
// [NEW v1.30] Hàm trích xuất Cache an toàn, chỉ lưu câu hiện tại và câu sắp tới để tối ưu dung lượng
const getActiveCacheToSave = useCallback((currentData) => {
const cacheArray = [];
const activeTerms = new Set();
if (currentData.gameState?.origin?.term) activeTerms.add(currentData.gameState.origin.term);
currentData.endlessQueue.forEach(idx => {
const term = cards[idx]?.term;
if (term) activeTerms.add(term);
});
activeTerms.forEach(term => {
if (questionCache.current.has(term)) {
cacheArray.push([term, questionCache.current.get(term)]);
}
});
return cacheArray;
}, [cards]);
const triggerAutoSave = useCallback(() => {
if (onAutoSave && latestStateRef.current) {
const currentData = latestStateRef.current;
onAutoSave({
gameState: currentData.gameState,
stats: currentData.stats,
difficulty: currentData.difficulty,
queue: { list: currentData.endlessQueue },
deck: currentData.deck,
timeLeft: currentData.timeLeft,
preloadedCache: getActiveCacheToSave(currentData) // [NEW v1.30] Đính kèm Cache
});
}
}, [onAutoSave, getActiveCacheToSave]);
useEffect(() => {
const intervalTimer = setInterval(() => triggerAutoSave(), 5000);
return () => { clearInterval(intervalTimer); triggerAutoSave(); };
}, [triggerAutoSave]);
useEffect(() => {
isGameActiveRef.current = true;
if (savedState && savedState.gameState) {
setGameState(JSON.parse(JSON.stringify(savedState.gameState)));
setStats(savedState.stats || { correct: 0, wrong: 0 });
setDifficulty(savedState.difficulty || 'easy');
if (savedState.timeLeft) setTimeLeft(savedState.timeLeft);
if (savedState.queue?.list) endlessQueueRef.current = [...savedState.queue.list];
if (savedState.deck) deckRef.current = [...savedState.deck];
// [NEW v1.30] Rã đông (Hydrate) Cache từ file Save vào RAM
if (savedState.preloadedCache && Array.isArray(savedState.preloadedCache)) {
questionCache.current = new Map(savedState.preloadedCache);
}
setIsGenerating(false);
maintainQueue();
} else {
startNewGame();
}
return () => {
isGameActiveRef.current = false;
if (autoNextRef.current) clearTimeout(autoNextRef.current);
if (timerRef.current) clearTimeout(timerRef.current);
if (recognitionRef.current) recognitionRef.current.abort();
if (silenceTimerRef.current) clearTimeout(silenceTimerRef.current);
if (hardTimerRef.current) clearTimeout(hardTimerRef.current);
};
}, []);
useEffect(() => {
if (!timerMode || isPaused || gameState.isCorrect !== null || isGenerating) return;
if (timeLeft > 0) { timerRef.current = setTimeout(() => setTimeLeft(t => t - 1), 1000); }
else { handleSkip(true); }
return () => clearTimeout(timerRef.current);
}, [timeLeft, isPaused, timerMode, gameState.isCorrect, isGenerating]);
useEffect(() => {
if (isPaused) {
if (autoNextRef.current) clearTimeout(autoNextRef.current);
if (timerRef.current) clearTimeout(timerRef.current);
if (isListening && recognitionRef.current) {
recognitionRef.current.stop();
if (silenceTimerRef.current) clearTimeout(silenceTimerRef.current);
if (hardTimerRef.current) clearTimeout(hardTimerRef.current);
setIsListening(false);
}
}
}, [isPaused]);
const handleSaveAndBack = () => {
const currentData = latestStateRef.current;
const sessionData = JSON.parse(JSON.stringify({
gameState: currentData.gameState,
stats: currentData.stats,
difficulty: currentData.difficulty,
queue: { list: currentData.endlessQueue },
deck: currentData.deck,
timeLeft: currentData.timeLeft,
preloadedCache: getActiveCacheToSave(currentData) // [NEW v1.30] Đính kèm Cache
}));
onBack(sessionData);
};
const getNextCardIndex = () => {
if (deckRef.current.length === 0) {

const actualNumOptions = distractors.length + 1;

})();

<div className={`p-3 bg-red-100 text-red-600 rounded-xl group-hover:bg-red-600 group-hover:text-white transition-colors`}>

</div>
<div className="text-left flex-1">
<div className="font-bold text-lg text-gray-800">Tìm Lỗi Sai (IOE)</div>
<div className="text-xs text-gray-500 font-medium">Săn lỗi ngữ pháp & Sửa từ</div>
