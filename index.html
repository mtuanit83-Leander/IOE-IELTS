let currentDeck = [...cards];
deckRef.current = window.Utils.shuffleArray ? window.Utils.shuffleArray(Array.from({length: currentDeck.length}, (_, i) => i)) : [];
isInitializingRef.current = true;
aiGeneratedCountRef.current = 0;
if (sourceMode === 'card' && isAiMode && apiKey && window.GameAlgoEngine && window.GameAlgoEngine.PreflightEngine) {
safeShowToast("Đang rà soát dữ liệu thẻ...", "info");
const { updatedCards, hasUpdates } = await window.GameAlgoEngine.PreflightEngine.batchEnrich(
currentDeck, deckRef.current, 10, lang, apiKey
);
if (hasUpdates) {
enrichedCardsRef.current = updatedCards;
if (onUpdateCards) onUpdateCards(updatedCards);
safeShowToast("Đã tự động dịch và lưu các thẻ khuyết nghĩa!", "success");
}
}
if (coordinatorRef.current) coordinatorRef.current.destroy();
if (window.GameAlgoEngine && window.GameAlgoEngine.PreflightEngine) {
coordinatorRef.current = window.GameAlgoEngine.PreflightEngine.createQueueCoordinator(fetchTask, 2);
} else {
safeShowToast("Lỗi hệ thống: Không tìm thấy PreflightEngine", "error");
return;
}
const isUsingAI = isAiMode || sourceMode === 'ai_pure';
if (isUsingAI) {
setAiCountdown(20);
const timer = setInterval(() => {
setAiCountdown(prev => { if (prev <= 1) clearInterval(timer); return prev - 1; });
}, 1000);
const maintainPromise = coordinatorRef.current.maintain();
const timeoutPromise = new Promise(r => setTimeout(r, 20000));
await Promise.race([maintainPromise, timeoutPromise]);
clearInterval(timer);
const firstData = coordinatorRef.current.pop();
if (isGameActiveRef.current && firstData) {
setupQuestion(firstData);
setIsGenerating(false); setAiCountdown(0); isInitializingRef.current = false;
safeShowToast(`Hoàn tất! Bắt đầu trò chơi.`, "success");
} else if (isGameActiveRef.current) {
const fbData = { wrongSentence: "He are my friend.", wrongWord: "are", correction: "is", explanation: "Dự phòng", origin: {term: "He is my friend", definition: "Tự sinh dự phòng"}, isAiGenerated: false };
setupQuestion(fbData);
setIsGenerating(false); setAiCountdown(0); isInitializingRef.current = false;
safeShowToast("AI bị nghẽn mạng. Đã dùng dữ liệu dự phòng.", "warning");
}
} else {
await coordinatorRef.current.maintain();
const data = coordinatorRef.current.pop();
if (isGameActiveRef.current && data) {
setupQuestion(data);
setIsGenerating(false); isInitializingRef.current = false;
}
}
if (gameTimerRef.current) clearInterval(gameTimerRef.current);
gameTimerRef.current = setInterval(() => { setTime(prev => prev + 1); }, 1000);
};
// PHỤC HỒI DỮ LIỆU TỪ SESSION
const hasStartedRef = React.useRef(false);
React.useEffect(() => {
if (hasStartedRef.current) return;
hasStartedRef.current = true;
isGameActiveRef.current = true;
if (savedState && savedState.spotMistakeState) {
const st = savedState.spotMistakeState;
setCurrentQuestion(st.currentQuestion);
setChunks(st.chunks || []);
setStage(st.stage || 'spot');
setSelectedIndex(st.selectedIndex !== undefined ? st.selectedIndex : null);
setInputBuffer(st.inputBuffer || "");
setCheckStatus(st.checkStatus || 'idle');
setAttempts(st.attempts || 0);
setScore(st.score || 0);
setCombo(st.combo || 1);
setPlayedCount(st.playedCount || 0);
setTime(st.time || 0);
setCorrectCount(st.correctCount || 0);
setWrongCount(st.wrongCount || 0);
setTimeLeft(st.timeLeft !== undefined ? st.timeLeft : (timeLimit || 30));
if (st.deck) deckRef.current = st.deck;
if (coordinatorRef.current) coordinatorRef.current.destroy();
if (window.GameAlgoEngine && window.GameAlgoEngine.PreflightEngine) {
coordinatorRef.current = window.GameAlgoEngine.PreflightEngine.createQueueCoordinator(fetchTask, 2);
coordinatorRef.current.maintain();
}
if (gameTimerRef.current) clearInterval(gameTimerRef.current);
gameTimerRef.current = setInterval(() => { setTime(prev => prev + 1); }, 1000);
setIsGenerating(false);
isInitializingRef.current = false;
} else {
startNewGame();
}
return () => {
isGameActiveRef.current = false;
if (gameTimerRef.current) clearInterval(gameTimerRef.current);
if (coordinatorRef.current) coordinatorRef.current.destroy();
};
}, []);
const nextRound = () => {
if (isGenerating) return;
setResultTimer(0); setIsResultPaused(false);
setPlayedCount(prev => prev + 1);
if (coordinatorRef.current && coordinatorRef.current.length() > 0) {
const nextData = coordinatorRef.current.pop();
setupQuestion(nextData);
} else {
setIsGenerating(true);
coordinatorRef.current.maintain().then(() => {
if (isGameActiveRef.current) {
const data = coordinatorRef.current.pop();
if (data) {
setupQuestion(data); setIsGenerating(false);
} else {
safeShowToast("Lỗi nạp. Tự khôi phục...", "error");
setIsGenerating(false);
const fbData = { wrongSentence: "He are my friend.", wrongWord: "are", correction: "is", explanation: "Dự phòng", origin: {term: "He is my friend", definition: "Tự sinh dự phòng"}, isAiGenerated: false };
setupQuestion(fbData);
}
}
});
}
setTimeout(() => triggerAutoSave(), 150);
};
// --- TƯƠNG TÁC NGƯỜI DÙNG ---
const handleSpotClick = (idx) => {
if (stage !== 'spot' || checkStatus === 'failed' || checkStatus === 'success') return;
const clickedChunk = chunks[idx];
if (clickedChunk.isTarget) {
setStage('correct'); setSelectedIndex(idx); setCheckStatus('correct_spot');
setScore(p => p + (10 * combo)); setAttempts(0);
safeShowToast("Phát hiện chuẩn xác! Hãy sửa lại cho đúng.", "success");
} else {
const newAttempts = attempts + 1;
setAttempts(newAttempts); setCombo(1); setScore(p => Math.max(0, p - 5));
if (newAttempts >= 3) {
pushToRetryBag(currentQuestion); // [NEW v2.6] Nhét vào túi nháp
setCheckStatus('failed'); setWrongCount(p => p + 1); safeShowToast("Đã hết lượt tìm lỗi!", "error");
logMistake(currentQuestion); setResultTimer(10);
} else {
setCheckStatus('wrong_spot'); safeShowToast(`Chưa đúng! Còn ${3 - newAttempts} lượt.`, "warning");
setTimeout(() => setCheckStatus(p => p === 'wrong_spot' ? 'idle' : p), 1000);
}
}
setTimeout(() => triggerAutoSave(), 150);
};
const handleCorrectionSubmit = () => {
if (stage !== 'correct' || !inputBuffer.trim()) return;
const normalize = (str) => str ? str.toLowerCase().replace(/[.,?!;:"'()[\]{}]/g, "").replace(/\s+/g, " ").trim() : "";
const normalizedInput = normalize(inputBuffer);
const normalizedCorrection = normalize(currentQuestion.correction);
if (normalizedInput === normalizedCorrection) {
// [NEW v2.6] Trả lời đúng ngay lần đầu -> Xóa nợ trong Túi nháp
if (attempts === 0) {
removeFromRetryBag(currentQuestion.origin?.term || currentQuestion.wrongSentence);
}
setCheckStatus('success'); setCorrectCount(p => p + 1);
setScore(p => p + (20 * combo)); setCombo(p => p + 1);
safeShowToast("Tuyệt vời! Bạn đã sửa đúng.", "success");
setResultTimer(6);
} else {
const newAttempts = attempts + 1;
setAttempts(newAttempts); setCombo(1); setScore(p => Math.max(0, p - 5));

// Block5.13: TẦNG 5: TRÒ CHƠI HÓA (OddOneOut Logic & Wrapper) - Version 1.2

const useOddOneOutLogic = (cards, config, callbacks) => {

const latestStateRef = React.useRef({});

};

const pushToRetryBag = React.useCallback((questionData) => {
try {
const bag = JSON.parse(localStorage.getItem('fc_global_retry_bag')) || {};
if (!bag['oddoneout']) bag['oddoneout'] = [];
const termToCheck = questionData.oddWord;
const isDup = bag['oddoneout'].some(item => item.oddWord === termToCheck && item.words.join() === questionData.words.join());
if (!isDup) {
bag['oddoneout'].push(questionData);
localStorage.setItem('fc_global_retry_bag', JSON.stringify(bag));
}
} catch(e) {}
}, []);
const removeFromRetryBag = React.useCallback((termToCheck, wordsArray) => {
try {
const bag = JSON.parse(localStorage.getItem('fc_global_retry_bag')) || {};
if (!bag['oddoneout']) return;
const prevLen = bag['oddoneout'].length;
bag['oddoneout'] = bag['oddoneout'].filter(item => !(item.oddWord === termToCheck && item.words.join() === wordsArray.join()));
if (bag['oddoneout'].length !== prevLen) {
localStorage.setItem('fc_global_retry_bag', JSON.stringify(bag));
}
} catch(e) {}
}, []);
// Cỗ máy đóng gói Lỗi sai (Lưu log để hiện trong Sổ tay Lỗi sai)
const logMistake = React.useCallback((question) => {

...baseData,
id: `mistake_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
type: 'mistake',
term: question.words.join(' • '),
definition: `Từ khác loại: ${question.oddWord}`,
analysis: question.explanation,
example: `Nhóm từ: ${question.words.join(', ')}`,
tags: ['oddoneout', level, sourceMode],
timestamp: Date.now()
};
onLogWrong(mistakeCard);
}, [onLogWrong, level, sourceMode]);
// --- TÌM NẠP DỮ LIỆU (FETCH TASK CHO COORDINATOR) ---
const fetchTask = async () => {
// 1. ĐÁNH CHẶN 30%: Bốc từ túi nháp (Tiết kiệm Token AI)

try {
const bag = JSON.parse(localStorage.getItem('fc_global_retry_bag')) || {};
if (bag['oddoneout'] && bag['oddoneout'].length > 0) {
const randIdx = Math.floor(Math.random() * bag['oddoneout'].length);
const retryQ = bag['oddoneout'][randIdx];
if (retryQ && retryQ.words && retryQ.oddWord) {
return retryQ;
}
}
} catch(e) {}
}
const isPureMode = sourceMode === 'ai_pure';
const canCallAi = isAiMode && apiKey && window.Utils && window.Utils.callGeminiApi;
if (isPureMode && canCallAi && window.GameAlgoEngine && window.GameAlgoEngine.OddOneOutEngine) {
try {
let historyPrompt = "";
if (window.GameAlgoEngine.PreflightEngine) {
historyPrompt = window.GameAlgoEngine.PreflightEngine.getHistoryPrompt(historyQueueRef.current);
}
const parsedResult = await window.GameAlgoEngine.OddOneOutEngine.ai_generate(level, lang, apiKey, historyPrompt);
// [MODIFIED v1.2] Chiến dịch Bàn Tay Sắt: Xé nhỏ mảng từ vựng, lưu TỪNG TỪ MỘT vào danh sách đen
if (parsedResult && parsedResult.words && Array.isArray(parsedResult.words)) {
parsedResult.words.forEach(w => {
if (w && typeof w === 'string') {
historyQueueRef.current.push(w.trim());
}
});
// Giữ lại 40 từ gần nhất (tương đương 10 câu hỏi) để cấm AI dùng lại
while (historyQueueRef.current.length > 40) {
historyQueueRef.current.shift();
}
}
if (isInitializingRef.current) {
aiGeneratedCountRef.current += 1;
safeShowToast(`Đã nạp xong câu ${aiGeneratedCountRef.current} bằng AI...`, "success");
}
if (onSaveToHarvest) {
onSaveToHarvest(level, {
displaySentence: parsedResult.words.join(' • '),

}
}

aiGeneratedCountRef.current = 0;

if (sourceMode === 'card' && isAiMode && apiKey && window.GameAlgoEngine && window.GameAlgoEngine.PreflightEngine) {

const tempIndices = Array.from({length: currentDeck.length}, (_, i) => i);

if (hasUpdates) {

safeShowToast("Đã tự động dịch và lưu các thẻ khuyết nghĩa!", "success");

}
if (coordinatorRef.current) coordinatorRef.current.destroy();

}
const isUsingAI = isAiMode || sourceMode === 'ai_pure';

setAiCountdown(prev => { if (prev <= 1) clearInterval(timer); return prev - 1; });
}, 1000);
const maintainPromise = coordinatorRef.current.maintain();

await Promise.race([maintainPromise, timeoutPromise]);
clearInterval(timer);
const firstData = coordinatorRef.current.pop();
if (isGameActiveRef.current && firstData) {
setCurrentQuestion(firstData);
setSelectedIndex(null); setCheckStatus('idle'); setAttempts(0);
setIsGenerating(false); setAiCountdown(0); isInitializingRef.current = false;
setTimeLeft(timeLimit || 15);
safeShowToast(`Hoàn tất! Bắt đầu trò chơi.`, "success");
} else if (isGameActiveRef.current) {
const fbData = { words: ["run", "walk", "jump", "beautiful"], oddWord: "beautiful", explanation: "Beautiful là tính từ, các từ còn lại là động từ.", isAiGenerated: false };
setCurrentQuestion(fbData);
setIsGenerating(false); setAiCountdown(0); isInitializingRef.current = false;
setTimeLeft(timeLimit || 15);
safeShowToast("AI bị nghẽn mạng. Đã dùng dữ liệu dự phòng.", "warning");
}
} else {
await coordinatorRef.current.maintain();
const data = coordinatorRef.current.pop();
if (isGameActiveRef.current && data) {
setCurrentQuestion(data);
setSelectedIndex(null); setCheckStatus('idle'); setAttempts(0);
setIsGenerating(false); isInitializingRef.current = false;
setTimeLeft(timeLimit || 15);
}
}
if (gameTimerRef.current) clearInterval(gameTimerRef.current);
gameTimerRef.current = setInterval(() => { setTime(prev => prev + 1); }, 1000);
};
// PHỤC HỒI DỮ LIỆU TỪ SESSION
const hasStartedRef = React.useRef(false);
React.useEffect(() => {
if (hasStartedRef.current) return;
hasStartedRef.current = true;
isGameActiveRef.current = true;
if (savedState && savedState.oddOneOutState) {
const st = savedState.oddOneOutState;
setCurrentQuestion(st.currentQuestion);
setSelectedIndex(st.selectedIndex !== undefined ? st.selectedIndex : null);
setCheckStatus(st.checkStatus || 'idle');
setAttempts(st.attempts || 0);
setScore(st.score || 0);
setCombo(st.combo || 1);
setPlayedCount(st.playedCount || 0);
setTime(st.time || 0);
setCorrectCount(st.correctCount || 0);
setWrongCount(st.wrongCount || 0);
setTimeLeft(st.timeLeft !== undefined ? st.timeLeft : (timeLimit || 15));
if (coordinatorRef.current) coordinatorRef.current.destroy();
if (window.GameAlgoEngine && window.GameAlgoEngine.PreflightEngine) {
coordinatorRef.current = window.GameAlgoEngine.PreflightEngine.createQueueCoordinator(fetchTask, 2);
coordinatorRef.current.maintain();
}
if (gameTimerRef.current) clearInterval(gameTimerRef.current);
gameTimerRef.current = setInterval(() => { setTime(prev => prev + 1); }, 1000);
setIsGenerating(false);
isInitializingRef.current = false;
} else {
startNewGame();
}
return () => {
isGameActiveRef.current = false;
if (gameTimerRef.current) clearInterval(gameTimerRef.current);
if (coordinatorRef.current) coordinatorRef.current.destroy();
};
}, []);
const nextRound = () => {
if (isGenerating) return;
setResultTimer(0); setIsResultPaused(false);
setPlayedCount(prev => prev + 1);
if (coordinatorRef.current && coordinatorRef.current.length() > 0) {
const nextData = coordinatorRef.current.pop();
setCurrentQuestion(nextData);
setSelectedIndex(null); setCheckStatus('idle'); setAttempts(0);
setTimeLeft(timeLimit || 15);
} else {
setIsGenerating(true);
coordinatorRef.current.maintain().then(() => {
if (isGameActiveRef.current) {

}
}
});
}
setTimeout(() => triggerAutoSave(), 150);
};
// --- TƯƠNG TÁC NGƯỜI DÙNG ---
const handleOptionClick = (idx) => {
if (checkStatus === 'success' || checkStatus === 'failed') return;
const clickedWord = currentQuestion.words[idx];
setSelectedIndex(idx);
const isCorrect = clickedWord.toLowerCase().trim() === currentQuestion.oddWord.toLowerCase().trim();
if (isCorrect) {
if (attempts === 0) {
removeFromRetryBag(currentQuestion.oddWord, currentQuestion.words);
}
setCheckStatus('success'); setCorrectCount(p => p + 1);
setScore(p => p + (15 * combo)); setCombo(p => p + 1);
safeShowToast("Xuất sắc!", "success");
setResultTimer(6);
} else {
const newAttempts = attempts + 1;
setAttempts(newAttempts); setCombo(1); setScore(p => Math.max(0, p - 5));
if (newAttempts >= 2) {
pushToRetryBag(currentQuestion);
setCheckStatus('failed'); setWrongCount(p => p + 1); safeShowToast("Đã hết lượt!", "error");
logMistake(currentQuestion); setResultTimer(8);
} else {
setCheckStatus('wrong_retry'); safeShowToast(`Chưa đúng! Còn ${2 - newAttempts} lượt.`, "warning");
setTimeout(() => setCheckStatus(p => p === 'wrong_retry' ? 'idle' : p), 1000);
}
}
setTimeout(() => triggerAutoSave(), 150);
};
const handleSkip = () => {
if (checkStatus === 'success' || checkStatus === 'failed') return;
pushToRetryBag(currentQuestion);
setCombo(1); setCheckStatus('failed'); setWrongCount(p => p + 1); setAttempts(2);
safeShowToast("Đã bỏ qua!", "error"); logMistake(currentQuestion); setResultTimer(8);
setTimeout(() => triggerAutoSave(), 150);
};

timerId = setInterval(() => {
setTimeLeft(prev => {
if (prev <= 1) {
clearInterval(timerId);
return 0;
}
return prev - 1;
});
}, 1000);
}
return () => { if (timerId) clearInterval(timerId); };
}, [timerMode, checkStatus, isGenerating, currentQuestion]);
// CƠ CHẾ GIẬT CÒ KHI HẾT GIỜ (TIMEOUT TRIGGER)
React.useEffect(() => {
if (timerMode && timeLeft === 0 && checkStatus !== 'success' && checkStatus !== 'failed') {
pushToRetryBag(currentQuestion);
setCombo(1); setAttempts(2); setCheckStatus('failed'); setWrongCount(p => p + 1);
safeShowToast("Hết giờ! Xem đáp án nhé.", "error");
logMistake(currentQuestion);
setResultTimer(8);
setTimeout(() => triggerAutoSave(), 150);
}
}, [timeLeft, timerMode, checkStatus, currentQuestion, logMistake, safeShowToast, triggerAutoSave, pushToRetryBag]);
React.useEffect(() => {
if ((checkStatus === 'success' || checkStatus === 'failed') && resultTimer > 0 && !isResultPaused) {
const id = setTimeout(() => setResultTimer(t => t - 1), 1000);
return () => clearTimeout(id);
} else if ((checkStatus === 'success' || checkStatus === 'failed') && resultTimer === 0 && !isResultPaused) {
nextRound();
}
}, [checkStatus, resultTimer, isResultPaused]);
const toggleResultPause = () => setIsResultPaused(p => !p);
return {
currentQuestion, selectedIndex, checkStatus, attempts, score, combo, playedCount, time, isFinished,
isGenerating, aiCountdown, correctCount, wrongCount,
resultTimer, isResultPaused, toggleResultPause, timeLeft,
handleOptionClick, handleSkip, nextRound, handleSaveAndBack
};
};

// Last Updated: 2026-04-08 19:55
// Nhiệm vụ: Cung cấp hook useAiLogic xử lý tự động phát (Auto-Play) và giao tiếp với AI Gemini (Làm giàu thẻ, giải thích ngữ pháp).
// Quy tắc: Tách biệt hoàn toàn logic chạy ngầm khỏi App Component chính. TUYỆT ĐỐI KHÔNG CẮT XÉN CODE. Tuân thủ Điều 3.
// Cập nhật: [BƯỚC 2 - TOPIC FLOW] Bổ sung trường `topic` vào danh sách requiredFields/missingFields của hàm processAiQueue và handleAiEnrichCard.
// ==================================================================================
const useAiLogic = (core, latestStateRef, callbacks) => {
const { speak, handleNext } = callbacks;
const {
isAutoPlaying, currentCardIndex, setIsFlipped, setIsContentHidden,
autoPlayTimeoutRef, apiKey, setIsAiLoading, setCards, setTotalTokens,
setNotebook, aiQueueRef, isAiQueueProcessing, processingCardsRef
} = core;
// Cờ báo hiệu vòng lặp đang chạy
const isLoopRunning = useRef(false);
// ==================================================================================
// 1. LOGIC AUTO-PLAY (STABLE VERSION)
// ==================================================================================
// Hàm đợi an toàn
const wait = (ms) => new Promise(resolve => {
if (autoPlayTimeoutRef.current) clearTimeout(autoPlayTimeoutRef.current);
autoPlayTimeoutRef.current = setTimeout(resolve, ms);
});
const runAutoPlay = useCallback(async () => {
if (isLoopRunning.current) return;
if (!latestStateRef.current.isAutoPlaying) return;
isLoopRunning.current = true;
try {
const { cards, currentCardIndex: idx, settings } = latestStateRef.current;
const card = cards[idx];
if (!card) return;
// --- KIỂM TRA SRS ---
if (settings.srsEnabled !== false && card.srs_due && card.srs_due > Date.now()) {
await wait(2000);
if (latestStateRef.current.isAutoPlaying) handleNext();
return;
}
const textToSpeak = card.term;
const repeatCount = Math.max(1, settings.repeatCount || 1);
// --- VÒNG LẶP LẠI ---
for (let i = 0; i < repeatCount; i++) {
if (!latestStateRef.current.isAutoPlaying) break;
// 1. Reset mặt trước
setIsContentHidden(false);
if (latestStateRef.current.isFlipped) {
setIsFlipped(false);
await wait(600);
}
if (!latestStateRef.current.isAutoPlaying) break;
// 2. Đọc (Speak)
const minTimePromise = wait(1500);
const speakPromise = new Promise(resolve => speak(textToSpeak, null, null, resolve));
// Tính toán thời gian động dựa trên độ dài văn bản (150ms/ký tự, tối thiểu 10 giây)
const dynamicTimeoutMs = Math.max(10000, (textToSpeak ? textToSpeak.length : 0) * 150);
const timeoutPromise = new Promise(resolve => setTimeout(() => resolve('timeout'), dynamicTimeoutMs));
await Promise.all([
Promise.race([speakPromise, timeoutPromise]),
minTimePromise
]);
if (!latestStateRef.current.isAutoPlaying) break;
await wait(settings.delayAfterRead || 1000);
if (!latestStateRef.current.isAutoPlaying) break;
// 3. Lật ra sau
if (!latestStateRef.current.isFlipLocked) {
setIsFlipped(true);
await wait(600);
await wait(settings.delayFlip || 2000);
} else {
await wait(settings.delayFlip || 2000);
}
// 4. Nghỉ giữa các lần lặp
if (i < repeatCount - 1) {
if (!latestStateRef.current.isAutoPlaying) break;
if (!latestStateRef.current.isFlipLocked) {
setIsFlipped(false);
await wait(600);
}
await wait(800);
}
}
// --- CHUYỂN THẺ ---
if (latestStateRef.current.isAutoPlaying) {
if (latestStateRef.current.isFlipped) {
setIsFlipped(false);
await wait(600);
}
await wait(settings.delayNext || 1500);
isLoopRunning.current = false;
handleNext();
}
} catch (e) {
console.error("AutoPlay Error:", e);
isLoopRunning.current = false;
} finally {
if (!latestStateRef.current.isAutoPlaying) {
isLoopRunning.current = false;
}
}
}, [speak, handleNext, latestStateRef, setIsFlipped, setIsContentHidden, autoPlayTimeoutRef]);
// [EFFECT MASTER]
useEffect(() => {
if (autoPlayTimeoutRef.current) clearTimeout(autoPlayTimeoutRef.current);
if (isAutoPlaying) {
runAutoPlay();
} else {
isLoopRunning.current = false;
setIsContentHidden(false);
callbacks.stopSpeaking();
}
return () => {
if (autoPlayTimeoutRef.current) clearTimeout(autoPlayTimeoutRef.current);
};
}, [isAutoPlaying, currentCardIndex]);
// ==================================================================================
// 2. CÁC LOGIC KHÁC (AI QUEUE)
// ==================================================================================
const processAiQueue = async () => {
if (isAiQueueProcessing.current) return;
isAiQueueProcessing.current = true;
while (aiQueueRef.current.length > 0) {
const term = aiQueueRef.current[0];
const currentApiKey = localStorage.getItem(window.STORAGE_KEYS.API_KEY);
if (!currentApiKey) { aiQueueRef.current.shift(); continue; }
try {
const currentNotebook = latestStateRef.current.notebook;
const noteCard = currentNotebook.find(n => n.term === term);
// [HOTFIX v1.5] Thêm topic vào mảng cần kiểm tra để AI chạy ngầm
const requiredFields = ['pronunciation', 'definition', 'partOfSpeech', 'topic', 'sinoViet', 'example', 'image'];
const missingFields = noteCard ? requiredFields.filter(field => {
const val = noteCard[field] ? noteCard[field].toString().trim() : "";
if (field === 'image') return !val.startsWith('http');
return val === "";
}) : requiredFields;
if (missingFields && missingFields.length === 0) { aiQueueRef.current.shift(); continue; }
let res;
try { res = await window.Utils.fillCardWithAi(term, core.lang, currentApiKey, missingFields); }
catch (err) { await new Promise(r => setTimeout(r, 2000)); res = await window.Utils.fillCardWithAi(term, core.lang, currentApiKey, missingFields); }
if (missingFields.includes('image')) {
if (!res.image || !res.image.startsWith('http')) {
const fallbackQuery = noteCard && noteCard.image && noteCard.image.trim() !== "" ? noteCard.image : term;
res.image = `https://tse4.mm.bing.net/th?q=${encodeURIComponent(fallbackQuery)}&w=300&h=300&c=7&rs=1&p=0`;
}
}
if (res) {
if (res._tokenUsage) {
const newTotal = parseInt(localStorage.getItem('fc_total_tokens') || '0', 10) + (res._tokenUsage.totalTokenCount || 0);
localStorage.setItem('fc_total_tokens', newTotal);
setTotalTokens(newTotal);
}
setNotebook(prev => {
const newData = prev.map(item => item.term === term ? { ...item, ...res, ai_explanation: res.example || item.example || "Enriched" } : item);
window.Utils.safeLocalStorageSet(window.CONFIG_SAMPLES[core.lang].noteKey, newData);
return newData;
});
}
} catch (e) { console.warn(`Auto-fill skipped for ${term}:`, e); }
aiQueueRef.current.shift();
if (aiQueueRef.current.length > 0) await new Promise(r => setTimeout(r, 5000));
}
isAiQueueProcessing.current = false;
};
// ==================================================================================
// 3. LOGIC ENRICH CARD (Làm giàu thẻ học hiện tại)
// ==================================================================================
// Xử lý tham số đầu vào linh hoạt (index, card object, hoặc Event)
const handleAiEnrichCard = async (indexOrCardOrEvent, silent = false) => {
if (!apiKey) { if (!silent) callbacks.showToast("Chưa có API Key!", "error"); return; }
let cardTerm = null;
// Logic xác định từ khóa cần tra cứu
if (typeof indexOrCardOrEvent === 'number') {
cardTerm = latestStateRef.current.cards[indexOrCardOrEvent]?.term;
} else if (indexOrCardOrEvent && typeof indexOrCardOrEvent === 'object' && indexOrCardOrEvent.term) {
cardTerm = indexOrCardOrEvent.term;
} else {
const idx = latestStateRef.current.currentCardIndex;
cardTerm = latestStateRef.current.cards[idx]?.term;
}
if (!cardTerm) {
if (!silent) callbacks.showToast("Không xác định được từ vựng!", "error");
return;
}
if (processingCardsRef.current.has(cardTerm)) {
if (!silent) callbacks.showToast("Đang xử lý từ này...", "info");
return;
}
processingCardsRef.current.add(cardTerm);
if (!silent) setIsAiLoading(true);
try {
const currentCard = latestStateRef.current.cards.find(c => c.term === cardTerm);
// [HOTFIX v1.5] Cấy ghép topic vào mảng lọc thông tin bị thiếu
const missingFields = ['pronunciation', 'definition', 'partOfSpeech', 'topic', 'sinoViet', 'example', 'image'].filter(f => !currentCard?.[f] || (f==='image' && !currentCard[f].startsWith('http')));
if (!silent && !missingFields.length) { callbacks.showToast("Thẻ đã đầy đủ!", "success"); return; }
if (silent && !missingFields.length) return;
const enriched = await window.Utils.fillCardWithAi(cardTerm, core.lang, apiKey, missingFields);
if (missingFields.includes('image') && (!enriched.image || !enriched.image.startsWith('http'))) {
const q = (currentCard?.image && currentCard.image.trim()) || cardTerm;
enriched.image = `https://tse4.mm.bing.net/th?q=${encodeURIComponent(q)}&w=300&h=300&c=7&rs=1&p=0`;
}
setCards(prev => {
const idx = prev.findIndex(c => c.term === cardTerm);
if (idx === -1) return prev;
const next = [...prev];
next[idx] = { ...next[idx], ...enriched, ai_explanation: enriched.example || next[idx].example || "Enriched", is_enriched: true };
window.Utils.safeLocalStorageSet(window.CONFIG_SAMPLES[core.lang].dataKey, next);
return next;
});
if (enriched._tokenUsage) {
const newTotal = parseInt(localStorage.getItem('fc_total_tokens') || '0', 10) + (enriched._tokenUsage.totalTokenCount || 0);
setTotalTokens(newTotal); localStorage.setItem('fc_total_tokens', newTotal);
}
if (!silent) callbacks.showToast("Đã bổ sung thông tin!", "success");
} catch (e) { if (!silent) callbacks.showToast("Lỗi AI: " + e.message, "error"); }
finally { processingCardsRef.current.delete(cardTerm); if (!silent) setIsAiLoading(false); }
};
const handleExplainGrammar = async (index) => {
if (!apiKey) { callbacks.showToast("Cần API Key!", "warning"); return; }
const cardTerm = latestStateRef.current.cards[index]?.term;
if (!cardTerm) return;
setIsAiLoading(true);
try {
const result = await window.Utils.fillCardWithAi(cardTerm, core.lang, apiKey, ['analysis']);

const safeFetchExcel = async (url) => {
let cleanUrl = url.trim();
const match = cleanUrl.match(/\/d\/([a-zA-Z0-9-_]+)/);
if (!match) throw new Error("Link không hợp lệ. Không tìm thấy ID của Google Sheet.");
const sheetId = match[1];
const exportUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=xlsx`;
const cacheBuster = `&cb=${Date.now()}`;
const proxies = [`https://api.allorigins.win/raw?url=${encodeURIComponent(exportUrl + cacheBuster)}`, `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(exportUrl)}`, `https://corsproxy.io/?${encodeURIComponent(exportUrl)}`, exportUrl];
let lastErr = null;
for (const proxy of proxies) {
try {
const res = await fetch(proxy);
if (!res.ok) throw new Error(`HTTP ${res.status}`);
const buffer = await res.arrayBuffer();
if (buffer.byteLength < 100) throw new Error("File quá nhỏ, lỗi chặn kết nối.");
const header = new Uint8Array(buffer).subarray(0, 2);
if (header[0] !== 0x50 || header[1] !== 0x4B) {
throw new Error("LỖI QUYỀN TRUY CẬP: Hãy chắc chắn Link Google Sheet của bạn đã bật quyền 'Bất kỳ ai có liên kết' (Anyone with the link).");
}
return buffer;
} catch (e) {
lastErr = e;
if (e.message.includes("LỖI QUYỀN TRUY CẬP")) throw e;
}
}
throw new Error("Mạng bị chặn Proxy. Sẽ tự động chuyển sang GViz...");
};
// Cách 2 (Tuyệt chiêu): Quét từng Tab trực tiếp bằng Google GViz (Bỏ qua Proxy)
const fetchDirectGvizTabs = async (sheetId, lang) => {
let allNewItems = [];
let masterDataObj = {};
let total = 0;
const levelPrefix = lang === 'zh' ? 'zh_level_' : (lang === 'vi' ? 'vi_level_' : 'en_level_');
const fetchTab = async (sheetName) => {
const encodedName = encodeURIComponent(sheetName);
const gvizUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodedName}`;
try {
const res = await fetch(gvizUrl);
if (!res.ok) return null;
const text = await res.text();
if (text.trim().startsWith('<')) return null;
return window.Utils.parseAndMapCSV(text);
} catch(e) { return null; }
};
for (let i = 1; i <= 9; i++) {
const possibleNames = [`Level0${i}`, `Level ${i}`, `Level${i}`, `Sheet${i}`];
for (const sheetName of possibleNames) {
const parsedCards = await fetchTab(sheetName);
if (parsedCards && parsedCards.length > 0) {
masterDataObj[`${levelPrefix}${i}`] = parsedCards;
total += parsedCards.length;
allNewItems = allNewItems.concat(parsedCards);
break;
}
}
}
if (total === 0) {
const defaultTabs = ["Trang tính 1", "Sheet 1", "Sheet1", "Data"];
for (const sheetName of defaultTabs) {
const parsedCards = await fetchTab(sheetName);
if (parsedCards && parsedCards.length > 0) {
masterDataObj[`${levelPrefix}1`] = parsedCards;
total += parsedCards.length;
allNewItems = allNewItems.concat(parsedCards);
break;
}
}
if (total === 0) {
const gvizUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;
try {
const res = await fetch(gvizUrl);
if (res.ok) {
const text = await res.text();
if (!text.trim().startsWith('<')) {
const parsedCards = window.Utils.parseAndMapCSV(text);
if (parsedCards && parsedCards.length > 0) {
masterDataObj[`${levelPrefix}1`] = parsedCards;
total += parsedCards.length;
allNewItems = allNewItems.concat(parsedCards);
}
}
}
} catch(e) {}
}
}
return { masterData: masterDataObj, totalCards: total, flatItems: allNewItems };

const ctx = new AudioContext();
