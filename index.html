advancedNormalize: (str, langCode) => {
if (!str) return "";
let s = str.toLowerCase();
if (langCode === 'vi') {
s = s.replace(/\blăm\b/g, 'năm').replace(/\bmốt\b/g, 'một').replace(/\btư\b/g, 'bốn');
} else if (langCode === 'zh') {
s = s.replace(/两/g, '二');
}
s = s.replace(/\d+/g, (match) => {
const num = parseInt(match, 10);

}

}

];
const shuffledRules = window.Utils ? window.Utils.shuffleArray(replacements) : replacements;
for (const rule of shuffledRules) {

const originalWord = match[0];
const isCap = /^[A-Z]/.test(originalWord);
let finalWrong = rule.wrong;
let finalCorrect = rule.correct;
if (isCap) {
finalWrong = finalWrong.charAt(0).toUpperCase() + finalWrong.slice(1);

// 2. ĐỘNG CƠ TẠO ĐÁP ÁN NHIỄU (OPTIONS ENGINE) - Dùng cho Quiz

OptionsEngine: {
// [HOTFIX v1.8] Cấm tự đoán ngôn ngữ, ép nhận isReverse từ Tầng 5
offline_generateOptions: function(correctText, deck, lang, type, count = 3, isReverse = false) {
const distractors = new Set();
// Đọc thẻ gốc chuẩn xác dựa vào chiều câu hỏi
let baseCard = isReverse ? deck.find(c => c.term === correctText) : deck.find(c => c.definition === correctText);
baseCard = baseCard || {};
const originTopic = baseCard.topic || "";
const originPOS = baseCard.partOfSpeech || "";
// Xử lý CÂU VĂN (Sentence Mode)
if (type === 'sentence') {
if (!isReverse) {
// Câu hỏi là Tiếng Anh -> Chọn đáp án là Tiếng Việt: Bốc nguyên câu Tiếng Việt khác
const otherCards = deck.filter(c => c.definition && c.definition !== correctText && c.term !== baseCard.term);
otherCards.sort((a, b) => Math.abs(a.definition.length - correctText.length) - Math.abs(b.definition.length - correctText.length));
for (let c of otherCards) {
if (distractors.size >= count) break;
distractors.add(c.definition);
}
} else {
// Câu hỏi là Tiếng Việt -> Chọn đáp án Tiếng Anh: Áp dụng Đột biến câu
// 1. Bẫy Ngữ pháp
if (window.GameAlgoEngine.DistortionEngine.offline_distort) {
const trap1 = window.GameAlgoEngine.DistortionEngine.offline_distort(correctText, lang, type).wrongSentence;
if (trap1 && trap1 !== correctText) distractors.add(trap1);
}
// 2. Bẫy đánh tráo Keyword
const words = correctText.split(' ').map(w => w.replace(/[.,?!;:'"]/g, ''));
const longWords = words.filter(w => w.length >= 4);
if (longWords.length > 0) {
const kw = longWords[Math.floor(Math.random() * longWords.length)];
let pool = deck.filter(c => c.term !== baseCard.term && c.term && !c.term.includes(' '));
if (originTopic) pool = pool.filter(c => c.topic === originTopic);
if (pool.length === 0) pool = deck.filter(c => c.term !== baseCard.term && c.term && !c.term.includes(' '));
if (pool.length > 0) {
const swapWord = pool[Math.floor(Math.random() * pool.length)].term;
distractors.add(correctText.replace(new RegExp(`\\b${kw}\\b`, 'i'), swapWord));
}
}
// 3. Bẫy trật tự từ
if (words.length >= 4) {
const mid = Math.floor(words.length / 2);
const temp = [...words];
let t = temp[mid]; temp[mid] = temp[mid-1]; temp[mid-1] = t;
distractors.add(temp.join(' '));
}
// Fallback: Lấy nguyên câu tiếng Anh khác có độ dài tương tự
const otherCards = deck.filter(c => c.term && c.term !== correctText && window.Utils.detectSentence(c.term));
otherCards.sort((a, b) => Math.abs(a.term.length - correctText.length) - Math.abs(b.term.length - correctText.length));
for (let c of otherCards) {
if (distractors.size >= count) break;
distractors.add(c.term);
}
}
}
// Xử lý TỪ VỰNG (Vocabulary Mode) - Thuật toán Thác Nước
else {
const getVal = (c) => isReverse ? c.term : c.definition;
let pool = deck.filter(c => getVal(c) && getVal(c) !== correctText && c.term !== baseCard.term);
// Ưu tiên 1: Cùng Topic & Cùng POS
let l1 = pool.filter(c => c.topic === originTopic && c.partOfSpeech === originPOS && originTopic && originPOS);
l1 = window.Utils.shuffleArray(l1);
for (let c of l1) { if (distractors.size >= count) break; distractors.add(getVal(c)); }
// Ưu tiên 2: Cùng Topic HOẶC Cùng POS
if (distractors.size < count) {
let l2 = pool.filter(c => (c.topic === originTopic || c.partOfSpeech === originPOS) && (originTopic || originPOS) && !distractors.has(getVal(c)));
l2 = window.Utils.shuffleArray(l2);
for (let c of l2) { if (distractors.size >= count) break; distractors.add(getVal(c)); }
}
// Ưu tiên 3: Tương đồng độ dài hoặc ký tự bắt đầu
if (distractors.size < count) {
const targetLen = correctText.length;
const startChar = correctText.charAt(0).toLowerCase();
let l3 = pool.filter(c => {
const val = getVal(c);
if (!val || distractors.has(val)) return false;
return Math.abs(val.length - targetLen) <= 2 || val.charAt(0).toLowerCase() === startChar;
});
l3 = window.Utils.shuffleArray(l3);
for (let c of l3) { if (distractors.size >= count) break; distractors.add(getVal(c)); }
}
// Ưu tiên 4: Random
if (distractors.size < count) {
let l4 = window.Utils.shuffleArray(pool.filter(c => getVal(c) && !distractors.has(getVal(c))));
for (let c of l4) { if (distractors.size >= count) break; distractors.add(getVal(c)); }
}
}
// An toàn chống lỗi vỡ Layout
let arr = Array.from(distractors);
let fallbackCounter = 1;
while (arr.length < count) {
arr.push(correctText + " " + fallbackCounter);
fallbackCounter++;
}
return arr.slice(0, count);
},

ScrambleNoiseEngine: {
offline_getNoise: function(correctText, deck, lang, type, count = 2) {

const baseTokens = (isZh ? Array.from(correctText) : correctText.split(' ')).map(t => window.GameAlgoEngine._cleanWord(t));

if (clean && !baseTokens.includes(clean)) pool.push(clean);

}
});
const shuffledPool = window.Utils.shuffleArray(pool);
for (let w of shuffledPool) {
noise.add(w);
if (noise.size >= count) break;

if (noise.size >= count) break;
}
}

ClozeEngine: {
offline_mask: function(text, lang, type) {
if (type === 'word') {
return { targetWord: text, displaySentence: '[__________]', hint: "Từ vựng" };
}
const isZh = lang === 'zh';
const stopWordsEn = ['a', 'an', 'the', 'in', 'on', 'at', 'to', 'for', 'of', 'with', 'by', 'and', 'or', 'but', 'is', 'am', 'are', 'was', 'were', 'be', 'been', 'being', 'it', 'this', 'that', 'he', 'she', 'they', 'we', 'you', 'i'];
const stopWordsZh = ['的', '是', '在', '了', '和', '我', '你', '他', '不'];
const stopWordsVi = ['là', 'của', 'và', 'hoặc', 'những', 'các', 'một', 'trong', 'trên', 'tôi', 'bạn'];
let words = [];
if (isZh) {
words = [];
for(let i=0; i<text.length-1; i++) words.push(text.substr(i, 2));
} else {
words = text.split(/[\s]+/).filter(w => w.trim().length > 0);
}
let candidates = words.filter(w => {
const clean = window.GameAlgoEngine._cleanWord(w);
if (clean.length < 2) return false;
if (isZh) return !stopWordsZh.includes(clean);
if (lang === 'vi') return !stopWordsVi.includes(clean);
return !stopWordsEn.includes(clean);
});
if (candidates.length === 0) candidates = words.filter(w => w.length > 0);
candidates.sort((a, b) => b.length - a.length);
const rawTarget = candidates[0] || text;
const cleanTarget = rawTarget.replace(/^[^\p{L}\p{N}]+|[^\p{L}\p{N}]+$/gu, '');
let displaySentence = "";
if (isZh) {
displaySentence = text.replace(cleanTarget, '[__________]');
} else {
const regex = new RegExp(`\\b${cleanTarget}\\b`, 'i');
displaySentence = text.replace(regex, '[__________]');
}
return { targetWord: cleanTarget, displaySentence: displaySentence, hint: "Điền từ còn thiếu" };

// 5. ĐỘNG CƠ BẢO HIỂM & CUỐN CHIẾU (PREFLIGHT ENGINE)

PreflightEngine: {
batchEnrich: async function(cards, queueIndices, maxCount, lang, apiKey) {
if (!apiKey || !window.Utils.callGeminiApi) return { updatedCards: cards, hasUpdates: false };
let updatedCards = [...cards];
let hasUpdates = false;
const batchTargets = [];
for (let i = 0; i < queueIndices.length; i++) {
if (batchTargets.length >= maxCount) break;
const cardIdx = queueIndices[i];
const c = updatedCards[cardIdx];
if (c && (!c.definition || c.definition.trim() === '')) {
batchTargets.push({ idx: cardIdx, term: c.term });
}
}
if (batchTargets.length > 0) {
try {
const targetLang = lang === 'zh' ? 'Chinese' : (lang === 'en' ? 'English' : 'Vietnamese');
let prompt = "Translate these " + batchTargets.length + " " + targetLang + " items into Vietnamese. Keep definitions very short (1-6 words).\nItems:\n";
prompt += batchTargets.map((b, i) => (i+1) + ". " + b.term).join('\n');
prompt += "\n\nReturn EXACTLY a JSON object with a translations array.\nFormat: {\"translations\": [\"nghĩa 1\", \"nghĩa 2\", ...]}";
const schema = {
type: "OBJECT",
properties: { translations: { type: "ARRAY", items: { type: "STRING" } } },
required: ["translations"]
};
const aiPromise = window.Utils.callGeminiApi(prompt, schema, apiKey);
const timeoutPromise = new Promise((_, r) => setTimeout(() => r(new Error("Timeout")), 15000));
const res = await Promise.race([aiPromise, timeoutPromise]);
const parsed = window.Utils.parseAiJson(res.text);
if (parsed && parsed.translations && parsed.translations.length === batchTargets.length) {
batchTargets.forEach((b, i) => {
updatedCards[b.idx] = { ...updatedCards[b.idx], definition: parsed.translations[i] };
});
hasUpdates = true;
if (res.tokenMetadata) {
const used = res.tokenMetadata.totalTokenCount || 0;
const currentTotal = parseInt(localStorage.getItem('fc_total_tokens') || '0', 10);
localStorage.setItem('fc_total_tokens', currentTotal + used);
}
}
} catch(e) {
console.warn("Pre-flight Batch enrich error:", e);
}
}
return { updatedCards, hasUpdates };
},
getHistoryPrompt: function(historyArray) {
if (!historyArray || historyArray.length === 0) return "";
return "\n\nCRITICAL ANTI-DUPLICATION RULE:\nABSOLUTELY DO NOT USE ANY OF THE FOLLOWING WORDS: [" + historyArray.join(', ') + "]. If you use them, you will fail.\n";

createQueueCoordinator: function(fetchDataFn, maxConcurrent = 2) {
return {
queue: [],
isFetching: false,
isActive: true,
maintain: async function() {
if (this.isFetching || !this.isActive) return;
this.isFetching = true;
try {
while (this.queue.length < maxConcurrent && this.isActive) {
const data = await fetchDataFn();
if (data && this.isActive) {
this.queue.push(data);
} else {
break;
}
}
} finally {
this.isFetching = false;
}
},
pop: function() {
const item = this.queue.shift();
this.maintain();
return item;
},
peek: function() {
return this.queue.length > 0 ? this.queue[0] : null;
},
destroy: function() {
this.isActive = false;
this.queue = [];
},
length: function() {
return this.queue.length;
}
};
}
},

// 6. ĐỘNG CƠ TỪ KHÁC LOẠI (ODD ONE OUT ENGINE)

OddOneOutEngine: {
offline_generate: function(deck, lang) {
const validCards = deck.filter(c => !window.Utils.detectSentence(c.term));
if (validCards.length >= 4) {
const posMap = {};
validCards.forEach(c => {
let pos = (c.partOfSpeech || "").toLowerCase().trim();
if (pos.includes('danh từ') || pos === 'n' || pos.includes('noun')) pos = 'noun';
else if (pos.includes('động từ') || pos === 'v' || pos.includes('verb')) pos = 'verb';
else if (pos.includes('tính từ') || pos === 'adj' || pos.includes('adjective')) pos = 'adj';
else if (pos.includes('trạng từ') || pos === 'adv' || pos.includes('adverb')) pos = 'adv';
if (pos) {
if (!posMap[pos]) posMap[pos] = [];
posMap[pos].push(c);
}
});
let majorCat = null;
let minorCat = null;
const keys = Object.keys(posMap);
for (let i = 0; i < keys.length; i++) {
if (posMap[keys[i]].length >= 3) {
majorCat = keys[i];
for (let j = 0; j < keys.length; j++) {
if (i !== j && posMap[keys[j]].length >= 1) {
minorCat = keys[j];
break;
}
}
if (minorCat) break;
}
}
if (majorCat && minorCat) {
const majorCards = window.Utils.shuffleArray([...posMap[majorCat]]).slice(0, 3);
const minorCard = window.Utils.shuffleArray([...posMap[minorCat]])[0];
const wordsObj = [...majorCards, minorCard];
const shuffledWordsObj = window.Utils.shuffleArray(wordsObj);
return {
words: shuffledWordsObj.map(c => c.term),
oddWord: minorCard.term,
explanation: "Từ " + minorCard.term + " là " + (minorCard.partOfSpeech || minorCat) + ", trong khi các từ còn lại là " + (majorCards[0].partOfSpeech || majorCat) + ".",
originCards: shuffledWordsObj
};
}
}
const fbList = window.IoeDataEngine?.FALLBACK_DATA?.pure_oddoneout || [
{ words: ["apple", "banana", "orange", "cat"], oddWord: "cat", explanation: "Cat là động vật, các từ còn lại là trái cây." }
];
const fb = fbList[Math.floor(Math.random() * fbList.length)];
return { ...fb, isFallback: true };
},

fetchPureMatchBatch: async function(level, lang, apiKey, historyPrompt = "") {

definition: item.definition,
isAiGenerated: true,
_tokenUsage: res.tokenMetadata
}));
}
throw new Error("Invalid format from AI for Match Pure Mode");

// Block4.1: TẦNG 4: CÁC TÍNH NĂNG & MODALS (Feature Modals - Hanzi Writer) - Version 1.1
// Last Updated: 2026-03-31 11:15
// Nhiệm vụ: Chứa tính năng Tập viết chữ Hán (Hanzi Writer Modal). Tầng này đóng gói trọn vẹn UI và logic cục bộ của một tính năng cụ thể.
// Quy tắc: Chỉ xử lý logic hiển thị và thư viện bên ngoài (HanziWriter) của riêng nó, nhận trạng thái hiển thị (isOpen) và dữ liệu (char) từ Tầng 6.
// ==================================================================================
const HanziWriterModal = ({ isOpen, onClose, char, t, mainColor }) => {
const [isLoading, setIsLoading] = useState(true);
const [charData, setCharData] = useState(null); // [NEW] Lưu dữ liệu chữ Hán
const [quizStatus, setQuizStatus] = useState("Vẽ nét đầu tiên vào ô trên!");
const [statusColor, setStatusColor] = useState("text-slate-500 bg-slate-50 border-slate-200");
// Refs
const writerRef = useRef(null);
const quizWriterRef = useRef(null);
const fanContainerRef = useRef(null);
const demoDivRef = useRef(null);
const quizDivRef = useRef(null);
// EFFECT 1: Tải dữ liệu khi mở Modal
useEffect(() => {
if (isOpen && char && typeof window.HanziWriter !== 'undefined') {
setIsLoading(true);
setCharData(null);
window.HanziWriter.loadCharacterData(char)
.then(data => {
setCharData(data); // Lưu dữ liệu
setIsLoading(false); // Kích hoạt render giao diện chính
})
.catch(e => {
console.error("Load Hanzi Data Failed:", e);
setQuizStatus("Lỗi tải dữ liệu. Vui lòng kiểm tra mạng.");
setIsLoading(false);
});
}
}, [isOpen, char]);
// EFFECT 2: Khởi tạo Writer khi DOM đã sẵn sàng (!isLoading)
useEffect(() => {
if (!isLoading && charData && demoDivRef.current && quizDivRef.current) {
// Dọn dẹp cũ
demoDivRef.current.innerHTML = '';
quizDivRef.current.innerHTML = '';
if (fanContainerRef.current) fanContainerRef.current.innerHTML = '';
const commonOptions = {
width: 300,
height: 300,
padding: 20,
strokeColor: '#1e293b',
outlineColor: '#e2e8f0',
drawingColor: '#2563eb',
strokeAnimationSpeed: 1,
delayBetweenStrokes: 500,
charDataLoader: (char, onComplete) => onComplete(charData) // Dùng luôn data đã tải
};
try {
// 1. Writer Demo
writerRef.current = window.HanziWriter.create(demoDivRef.current, char, {
...commonOptions,
showOutline: true
});
writerRef.current.showCharacter();
// 2. Writer Quiz
quizWriterRef.current = window.HanziWriter.create(quizDivRef.current, char, {
...commonOptions,
showOutline: true,
showHintAfterMisses: 1,
highlightOnComplete: true
});
quizWriterRef.current.showOutline();
// Thiết lập Quiz Logic
quizWriterRef.current.quiz({
onMistake: () => {
setQuizStatus("Sai rồi! Hãy thử lại.");
setStatusColor("text-red-500 bg-red-50 border-red-200 animate-pulse");
},
onCorrectStroke: () => {
setQuizStatus("Đúng! Tiếp tục nào.");
setStatusColor("text-blue-500 bg-blue-50 border-blue-200");
},
onComplete: () => {
setQuizStatus("Xuất sắc! Bạn đã thuộc bài.");
setStatusColor("text-green-600 bg-green-100 border-green-200 font-bold");
}
});
// 3. Tạo Stroke Fan (Tách nét)
if (fanContainerRef.current) {
for (let i = 0; i < charData.strokes.length; i++) {
const div = document.createElement('div');
div.className = "w-16 h-16 border border-red-100 bg-white rounded-lg relative mb-2 mr-2 shrink-0 hanzi-grid-bg";
div.style.width = '64px';
div.style.height = '64px';
fanContainerRef.current.appendChild(div);
const smallWriter = window.HanziWriter.create(div, char, {
width: 64, height: 64, padding: 5,
strokeColor: '#334155', outlineColor: '#cbd5e1', showOutline: true,
charDataLoader: (c, cb) => cb(charData)
});
// Vẽ tĩnh (không animation) cho nhanh
smallWriter.hideCharacter();
for (let j = 0; j <= i; j++) {
// Dùng animateStroke nhưng speed cực nhanh để hiện nét
smallWriter.animateStroke(j, { speed: 100 });
}
}
}
// Chạy demo sau 1s
setTimeout(() => writerRef.current?.animateCharacter(), 1000);
} catch (e) {
console.error("Init Writer Error:", e);
}
}
}, [isLoading, charData, char]); // Chạy khi loading xong và có data
// Các hàm điều khiển
const handleAnimate = () => writerRef.current?.animateCharacter();
const handleSlowAnimate = () => writerRef.current?.animateCharacter({ strokeAnimationSpeed: 0.2 });
const handleHint = () => quizWriterRef.current?.animateStroke(quizWriterRef.current?._quiz?.currentStrokeIndex || 0);
const handleResetQuiz = () => {
if (quizWriterRef.current) {
quizWriterRef.current.cancelQuiz();
quizWriterRef.current.hideCharacter();
quizWriterRef.current.showOutline();
quizWriterRef.current.quiz({
onMistake: () => { setQuizStatus("Sai rồi!"); setStatusColor("text-red-500 bg-red-50 border-red-200"); },
onCorrectStroke: () => { setQuizStatus("Đúng!"); setStatusColor("text-blue-500 bg-blue-50 border-blue-200"); },
onComplete: () => { setQuizStatus("Hoàn thành!"); setStatusColor("text-green-600 bg-green-100 border-green-200 font-bold"); }
});
setQuizStatus("Vẽ nét đầu tiên vào ô trên!");
setStatusColor("text-slate-500 bg-slate-50 border-slate-200");
}
};
if (!isOpen) return null;
return (
<div className="fixed inset-0 z-[250] bg-white flex flex-col animate-in slide-in-from-bottom-10">
{/* Header */}
<div className={`p-4 bg-${mainColor}-600 text-white flex justify-between items-center shadow-md shrink-0`}>
<div className="flex items-center gap-4">
<button onClick={onClose} className="p-2 hover:bg-white/20 rounded-full transition-colors">

</div>
</div>
</div>
<div className="text-right hidden sm:block">
<p className="text-[10px] opacity-60 uppercase">Powered by HanziWriter</p>
</div>
</div>
{/* Content Scrollable */}
<div className="flex-1 overflow-y-auto custom-scrollbar p-4 md:p-8 bg-gray-50">
{isLoading ? (
<div className="h-full flex flex-col items-center justify-center text-gray-400">
<div className={`w-10 h-10 border-4 border-${mainColor}-500 border-t-transparent rounded-full animate-spin mb-3`}></div>
<p>Đang tải dữ liệu bút thuận...</p>
</div>
) : (
<div className="max-w-5xl mx-auto">
{/* Khu vực Chính: Demo & Quiz */}
<div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
{/* Cột Trái: Demo */}
<div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex flex-col items-center">

Mô phỏng nét bút
</h3>
<div className="relative mb-6">
<div className="absolute inset-0 border-2 border-red-200 rounded-xl pointer-events-none hanzi-grid-bg"></div>
<div ref={demoDivRef} className="cursor-pointer" style={{ width: '300px', height: '300px' }} onClick={handleAnimate}></div>
</div>
<div className="flex gap-2 w-full max-w-[300px]">
<button onClick={handleAnimate} className="flex-1 py-3 bg-blue-50 text-blue-600 font-bold rounded-xl hover:bg-blue-100 transition-colors">
<Icons.Play size={18} className="inline mr-1"/> Xem lại
</button>
<button onClick={handleSlowAnimate} className="flex-1 py-3 bg-gray-100 text-gray-600 font-bold rounded-xl hover:bg-gray-200 transition-colors">
<Icons.Clock size={18} className="inline mr-1"/> Xem chậm
</button>
</div>
</div>
{/* Cột Phải: Quiz */}
<div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex flex-col items-center">
<h3 className="font-bold text-gray-700 mb-4 flex items-center gap-2">
<span className="w-2 h-6 bg-green-500 rounded-full"></span>
Thực hành
</h3>
<div className="relative mb-6">
<div className="absolute inset-0 border-2 border-red-200 rounded-xl pointer-events-none hanzi-grid-bg"></div>
<div ref={quizDivRef} className="cursor-crosshair" style={{ width: '300px', height: '300px' }}></div>
</div>
<div className={`w-full max-w-[300px] py-2 px-4 rounded-lg text-center text-sm font-bold border mb-4 transition-colors ${statusColor}`}>
{quizStatus}
</div>
<div className="flex gap-2 w-full max-w-[300px]">
<button onClick={handleHint} className="flex-1 py-3 bg-purple-50 text-purple-600 font-bold rounded-xl hover:bg-purple-100 transition-colors">
<Icons.Sparkles size={18} className="inline mr-1"/> Gợi ý
</button>
<button onClick={handleResetQuiz} className="flex-1 py-3 bg-gray-100 text-gray-600 font-bold rounded-xl hover:bg-gray-200 transition-colors">
<Icons.RotateCcw size={18} className="inline mr-1"/> Làm lại
</button>
</div>
</div>
</div>
{/* Khu vực Dưới: Stroke Fan */}
<div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
<h3 className="font-bold text-gray-700 mb-6 flex items-center gap-2">
<span className="w-2 h-6 bg-orange-500 rounded-full"></span>
Thứ tự từng nét
</h3>
<div ref={fanContainerRef} className="flex flex-wrap justify-center gap-2"></div>
</div>
</div>
)}
</div>
</div>
);
};

// Block4.2: TẦNG 4: CÁC TÍNH NĂNG & MODALS (Settings Modal) - Version 1.1
// Last Updated: 2026-03-31 11:15
// Nhiệm vụ: Chứa giao diện Cài đặt toàn hệ thống (Giao diện, Phông chữ, Âm thanh, Auto-play, SRS).
// Quy tắc: Sử dụng Local State để lưu tạm các thay đổi. Chỉ đẩy dữ liệu lên Tầng 6 (thông qua prop onSave) khi người dùng bấm "Áp dụng".
// ==================================================================================
// Helper Components cho SRS Settings
const NumberUnitInput = ({ value, onChange, label }) => (
<div className="flex items-center gap-1 bg-white border border-gray-300 rounded px-2 py-1 shadow-sm focus-within:ring-2 focus-within:ring-blue-200 focus-within:border-blue-400">
<input
type="number"
min="0"
value={value || ''}
onChange={(e) => onChange(e.target.value)}
className="w-8 text-right font-mono font-bold text-gray-700 outline-none text-sm p-0 m-0"
placeholder="0"
/>
<span className="text-[10px] text-gray-400 font-bold uppercase select-none">{label}</span>
</div>
);
const LevelConfigRow = ({ levelLabel, color, valueStr, onChange }) => {
const parse = (str) => {
let d = 0, h = 0, m = 0;
if (!str) return { d, h, m };
const matchD = str.match(/(\d+)d/); if (matchD) d = parseInt(matchD[1]);
const matchH = str.match(/(\d+)h/); if (matchH) h = parseInt(matchH[1]);
const matchM = str.match(/(\d+)m/); if (matchM) m = parseInt(matchM[1]);
return { d, h, m };
};
const format = (obj) => {
let parts = [];
if (obj.d > 0) parts.push(`${obj.d}d`);
if (obj.h > 0) parts.push(`${obj.h}h`);
if (obj.m > 0) parts.push(`${obj.m}m`);
return parts.join(' ') || '0m';
};
const data = parse(valueStr);
const handleChange = (field, val) => {
const num = parseInt(val) || 0;
const newData = { ...data, [field]: num };
onChange(format(newData));
};
return (
<div className={`flex flex-col sm:flex-row sm:items-center justify-between p-2 rounded-lg border-l-4 bg-gray-50 border-${color}-500 shadow-sm mb-2`}>
<div className="mb-2 sm:mb-0 flex items-center gap-2">
<span className={`text-xs font-bold uppercase text-${color}-600 min-w-[60px]`}>{levelLabel}</span>
<span className="text-[10px] text-gray-400 bg-white px-1 rounded border hidden sm:inline-block">{valueStr}</span>
</div>
<div className="flex gap-2">
<NumberUnitInput value={data.d} onChange={(v) => handleChange('d', v)} label="d" />
<NumberUnitInput value={data.h} onChange={(v) => handleChange('h', v)} label="h" />
<NumberUnitInput value={data.m} onChange={(v) => handleChange('m', v)} label="m" />
</div>
</div>
);
};
const SettingOption = ({ label, options, current, onChange, mainColor }) => (
<div className="space-y-2">

</button>

</div>
</div>
);

</div>
);
const PromptEditor = ({ label, value, onChange, onRestore, t, subLabel }) => (
<div className="space-y-1 border-b pb-3 mb-2 last:border-0">

</div>
<button onClick={onRestore} title={t('promptRestore')} className="text-gray-400 hover:text-blue-500 p-1 rounded transition-colors"><Icons.RotateCcw size={12}/></button>

/>
</div>
);
const SettingsModal = ({ isOpen, onClose, onApply, initialSettings, voices, testSpeak, onResetData, currentLang, t, uiLang, setUiLang, mainColor, onDone, onUpdate, totalTokens }) => {
// [NEW v1.3] Lưu trạng thái gốc khi vừa mở Modal để phục vụ tính năng Revert (Cancel)
const [originalSettings] = useState(initialSettings);
const [localSettings, setLocalSettings] = useState(initialSettings);
const [position, setPosition] = useState({ x: 0, y: 0 });
const dragRef = useRef({ isDragging: false, startX: 0, startY: 0, initialX: 0, initialY: 0 });
const [prompts, setPrompts] = useState({});
const [keyStats, setKeyStats] = useState({ count: 0, active: 'Chưa có' });
// [SAFE] Thêm kiểm tra an toàn cho voices
const safeVoices = Array.isArray(voices) ? voices : [];
const filteredVoices = safeVoices.filter(v => {
const voiceLang = v.lang.replace('_', '-').toLowerCase();
if (currentLang === 'zh') {
return voiceLang.startsWith('zh') || voiceLang.startsWith('cmn') || voiceLang.includes('cn') || voiceLang.includes('tw') || voiceLang.includes('hk');
}
return voiceLang.startsWith(currentLang);
});
const voiceOptions = filteredVoices.length > 0 ? filteredVoices : safeVoices;
useEffect(() => {
setLocalSettings(initialSettings);
}, [isOpen, initialSettings]);
useEffect(() => {
if (isOpen) {
setPosition({ x: 0, y: 0 });
const pool = window.Utils?.safeJsonParse('fc_apikey_pool', []);
const currentKey = localStorage.getItem('fc_apikey') || '';
setKeyStats({ count: pool?.length || 0, active: currentKey ? `...${currentKey.slice(-5)}` : 'Chưa có' });
const defaults = window.DEFAULT_PROMPTS || {};
const p = {};
// [UPDATED] Load danh sách key mới
['enrich_word', 'enrich_sentence', 'quiz_word', 'quiz_sentence', 'match_word', 'match_sentence', 'grammar'].forEach(key => {
p[key] = localStorage.getItem('fc_prompt_' + key) || defaults[key] || '';
});
setPrompts(p);
}
}, [isOpen]);
const handleChange = (key, value) => {
const newSettings = { ...localSettings, [key]: value };
setLocalSettings(newSettings);
// [UPDATED v1.3] Bật lại Live Update để xem trước thay đổi
if (onUpdate) onUpdate(newSettings);
};
// [UPDATED v1.3] Logic Cancel: Hoàn tác về trạng thái gốc
const handleCancel = () => {
if (onUpdate) onUpdate(originalSettings); // Revert
onClose();
};
// [UPDATED v1.3] Logic OK: Chỉ cần đóng (vì đã Live Update rồi)
const handleSave = () => {
// if (onUpdate) onUpdate(localSettings); // Không cần gọi lại vì đã gọi ở handleChange
onDone();
};
const handlePromptChange = (key, val) => {
setPrompts(prev => ({ ...prev, [key]: val }));
localStorage.setItem('fc_prompt_' + key, val);
};
const handleRestorePrompt = (key) => {
const def = window.DEFAULT_PROMPTS?.[key] || '';
setPrompts(prev => ({ ...prev, [key]: def }));
localStorage.removeItem('fc_prompt_' + key);
};
const handleMouseDown = (e) => {
if (e.type === 'mousedown' && e.button !== 0) return;
const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
dragRef.current = { isDragging: true, startX: clientX, startY: clientY, initialX: position.x, initialY: position.y };
const move = (e) => {
if (!dragRef.current.isDragging) return;
if (e.cancelable) e.preventDefault();
const cx = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
const cy = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
const dx = cx - dragRef.current.startX;
const dy = cy - dragRef.current.startY;
setPosition({ x: dragRef.current.initialX + dx, y: dragRef.current.initialY + dy });
};
const up = () => {
dragRef.current.isDragging = false;
document.removeEventListener('mousemove', move);
document.removeEventListener('mouseup', up);
document.removeEventListener('touchmove', move);
document.removeEventListener('touchend', up);
};
document.addEventListener('mousemove', move);
document.addEventListener('mouseup', up);
document.addEventListener('touchmove', move, { passive: false });
document.addEventListener('touchend', up);
};

const [editingData, setEditingData] = React.useState([]);
const [fillingIndices, setFillingIndices] = React.useState(new Set());
const [showConfirmDelete, setShowConfirmDelete] = React.useState(false);
React.useEffect(() => {
if (isOpen) {
const loaded = JSON.parse(JSON.stringify(data)).map((item, index) => ({
...item,
_tempId: Date.now() + index
}));
loaded.push({ term: '', pronunciation: '', definition: '', partOfSpeech: '', topic: '', example: '', sinoViet: '', image: '', _tempId: Date.now() + 999999 });
setEditingData(loaded);
setShowConfirmDelete(false);
}

const handleChange = (index, field, value) => {
const newData = [...editingData];
newData[index][field] = value;
if (index === newData.length - 1 && value.trim() !== "") {
newData.push({ term: '', pronunciation: '', definition: '', partOfSpeech: '', topic: '', example: '', sinoViet: '', image: '', _tempId: Date.now() + Math.random() });
}
setEditingData(newData);
};
const handleDelete = (index) => {
const newData = [...editingData];
newData.splice(index, 1);
if (newData.length === 0) {
newData.push({ term: '', pronunciation: '', definition: '', partOfSpeech: '', topic: '', example: '', sinoViet: '', image: '', _tempId: Date.now() });
}
setEditingData(newData);
};
const handleDeleteAllClick = () => {
setShowConfirmDelete(true);
};
const confirmDeleteAll = () => {
setEditingData([{ term: '', pronunciation: '', definition: '', partOfSpeech: '', topic: '', example: '', sinoViet: '', image: '', _tempId: Date.now() }]);
setShowConfirmDelete(false);
};

const validData = editingData.filter(item => item.term && item.term.trim() !== "");
onSave(validData.map(({ _tempId, ...rest }) => rest));
onClose();
};
const handleAiFill = async (index) => {
let item = editingData[index];
if (!item.term || item.term.trim() === "") {
alert("Vui lòng nhập từ vựng trước khi gọi AI!");
return;
}
if (sourceData && sourceData.length > 0) {
const localMatch = sourceData.find(c => c.term.toLowerCase().trim() === item.term.toLowerCase().trim());
if (localMatch) {
console.log("Found in source data, merging local data...");
const mergedItem = {
...item,
definition: item.definition || localMatch.definition,
pronunciation: item.pronunciation || localMatch.pronunciation,
partOfSpeech: item.partOfSpeech || localMatch.partOfSpeech,
topic: item.topic || localMatch.topic,
analysis: item.analysis || localMatch.analysis,
example: item.example || localMatch.example,
sinoViet: item.sinoViet || localMatch.sinoViet,
image: (localMatch.image && localMatch.image.startsWith('http') && !item.image) ? localMatch.image : item.image
};
setEditingData(prev => {
const newData = [...prev];
newData[index] = mergedItem;
return newData;
});
item = mergedItem;
}
}
const requiredFields = ['pronunciation', 'definition', 'partOfSpeech', 'topic', 'analysis', 'sinoViet', 'example'];
const missingFields = requiredFields.filter(field => !item[field] || item[field].toString().trim() === "");
if (!item.image || !item.image.startsWith('http')) {
missingFields.push('image');
}
if (missingFields.length === 0) return;
if (!apiKey) { alert("Vui lòng nhập API Key để AI điền nốt thông tin còn thiếu!"); return; }
setFillingIndices(prev => new Set(prev).add(index));
try {
const result = await window.Utils.fillCardWithAi(item.term, lang, apiKey, missingFields);
if (result) {
if (result._tokenUsage) {
const used = result._tokenUsage.totalTokenCount || 0;
const currentTotal = parseInt(localStorage.getItem('fc_total_tokens') || '0', 10);
localStorage.setItem('fc_total_tokens', currentTotal + used);
}
setEditingData(prev => {
const newData = [...prev];
newData[index] = {
...newData[index],
definition: newData[index].definition || result.definition,
pronunciation: newData[index].pronunciation || result.pronunciation,
partOfSpeech: newData[index].partOfSpeech || result.partOfSpeech,
topic: newData[index].topic || result.topic,
analysis: newData[index].analysis || result.analysis,
example: newData[index].example || result.example,
sinoViet: newData[index].sinoViet || result.sinoViet
};
if (result.image && result.image.startsWith('http')) {
newData[index].image = result.image;
}
return newData;
});
}
} catch (e) {
console.error(e);
alert("Lỗi AI: " + e.message);
} finally {
setFillingIndices(prev => { const next = new Set(prev); next.delete(index); return next; });
}
};
const handleAiFillAll = async () => {
if (!apiKey) { alert("Vui lòng nhập API Key trước!"); return; }
if (!confirm("Hệ thống sẽ tự động điền thông tin cho các từ còn thiếu. Việc này có thể tốn nhiều Token. Bạn có muốn tiếp tục?")) return;
const indicesToFill = editingData.map((item, idx) => {
if (!item.term || item.term.trim() === "") return -1;
const required = ['definition', 'pronunciation', 'example'];
const isMissing = required.some(f => !item[f] || item[f].trim() === "");
return isMissing ? idx : -1;
}).filter(idx => idx !== -1);
if (indicesToFill.length === 0) { alert("Sổ tay đã đầy đủ thông tin (hoặc chưa nhập từ vựng)!"); return; }
for (const idx of indicesToFill) {
await handleAiFill(idx);
await new Promise(r => setTimeout(r, 1000));
}
};

// Block4.5: TẦNG 4: CÁC TÍNH NĂNG & MODALS (AI Chat Assistant Modal) - Version 1.1
// Last Updated: 2026-03-31 11:15
// Nhiệm vụ: Khung Chat tự do với AI. Giúp người dùng hỏi đáp về ngữ pháp, giao tiếp giả lập.
// Quy tắc: Khối này tự quản lý state hội thoại (Messages) và lưu trữ cục bộ, không đẩy mảng chat rác lên Tầng 6.
// ==================================================================================
const AiChatModal = ({ isOpen, onClose, apiKey, lang, t, mainColor }) => {
// --- 1. STATE & REFS ---
const [messages, setMessages] = useState(() => {
const saved = localStorage.getItem('fc_ai_chat_history');
// Tin nhắn chào mừng mặc định
return saved ? JSON.parse(saved) : [{
id: 'init',
role: 'model',
text: "Xin chào! Tôi là trợ lý AI của Flashcard Lite. Tôi có thể giúp gì cho việc học của bạn hôm nay?"
}];
});
const [input, setInput] = useState("");
const [isSending, setIsSending] = useState(false);
// [NEW v1.1] State cho Kích thước Cửa sổ (Lưu lại thiết lập của người dùng)
const [size, setSize] = useState(() => {
try {
const savedSize = localStorage.getItem('fc_aichat_size');
return savedSize ? JSON.parse(savedSize) : { width: 450, height: 600 };
} catch { return { width: 450, height: 600 }; }
});
// Refs cho UI
const messagesEndRef = useRef(null);
const inputRef = useRef(null);
// Ref cho Drag & Resize
const [position, setPosition] = useState({ x: 0, y: 0 });
const dragRef = useRef({ isDragging: false, startX: 0, startY: 0, initialX: 0, initialY: 0 });
const resizeRef = useRef({ isResizing: false, startX: 0, startY: 0, startWidth: 0, startHeight: 0 });
// --- 2. EFFECTS ---
// Auto scroll xuống cuối khi có tin nhắn mới
useEffect(() => {
messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
localStorage.setItem('fc_ai_chat_history', JSON.stringify(messages));
}, [messages]);
// Lưu kích thước cửa sổ
useEffect(() => {
localStorage.setItem('fc_aichat_size', JSON.stringify(size));
}, [size]);
// Focus vào input khi mở
useEffect(() => {
if (isOpen) setTimeout(() => inputRef.current?.focus(), 100);
}, [isOpen]);
// --- 3. LOGIC XỬ LÝ CHAT ---
const handleSend = async () => {
if (!input.trim() || isSending) return;
if (!apiKey) {
alert("Vui lòng nhập API Key trong Cài đặt trước!");
return;
}
const userText = input.trim();
const newMessage = { id: Date.now(), role: 'user', text: userText };
setMessages(prev => [...prev, newMessage]);
setInput("");
setIsSending(true);
try {
// Xây dựng ngữ cảnh hội thoại (Context)
const historyContext = messages.slice(-10).map(m =>
`${m.role === 'user' ? 'User' : 'Model'}: ${m.text}`
).join('\n');
const systemPrompt = `Bạn là trợ lý ảo hữu ích cho ứng dụng học từ vựng Flashcard Lite.
Ngôn ngữ học tập hiện tại của người dùng là: ${lang === 'zh' ? 'Tiếng Trung' : (lang === 'en' ? 'Tiếng Anh' : 'Tiếng Việt')}.
QUY TẮC GIAO TIẾP QUAN TRỌNG:
1. LUÔN LUÔN trả lời và giải thích bằng TIẾNG VIỆT (Vietnamese), trừ khi người dùng yêu cầu dịch sang ngôn ngữ khác hoặc yêu cầu cụ thể khác.
2. Nếu người dùng hỏi về từ vựng, hãy giải thích nghĩa, cách dùng và ví dụ.
3. Trả lời ngắn gọn, súc tích, thân thiện.
Hỗ trợ định dạng Markdown nhẹ (Bold, Italic, List).`;
const fullPrompt = `${systemPrompt}\n\nLịch sử chat:\n${historyContext}\n\nUser: ${userText}\nModel:`;
// Gọi API
const result = await window.Utils.callGeminiApi(fullPrompt, null, apiKey);
const aiMessage = {
id: Date.now() + 1,
role: 'model',
text: result.text || "Xin lỗi, tôi không thể trả lời lúc này."
};
setMessages(prev => [...prev, aiMessage]);
} catch (error) {
console.error("Chat Error:", error);
setMessages(prev => [...prev, {
id: Date.now(),
role: 'model',
text: `⚠️ Lỗi: ${error.message || "Không thể kết nối đến AI."}`
}]);
} finally {
setIsSending(false);
}
};
const handleClearHistory = () => {
if (confirm("Xóa toàn bộ lịch sử trò chuyện?")) {
setMessages([{
id: Date.now(),
role: 'model',
text: "Lịch sử đã được xóa. Chúng bắt đầu lại nhé!"
}]);
}
};
// --- 4. LOGIC KÉO THẢ (DRAG) ---
const handleMouseDown = (e) => {
if (e.target.closest('button') || e.target.closest('input') || e.target.closest('.no-drag')) return;
const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
dragRef.current = { isDragging: true, startX: clientX, startY: clientY, initialX: position.x, initialY: position.y };
const move = (e) => {
if (!dragRef.current.isDragging) return;
e.preventDefault();
const cx = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
const cy = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
const dx = cx - dragRef.current.startX;
const dy = cy - dragRef.current.startY;
setPosition({ x: dragRef.current.initialX + dx, y: dragRef.current.initialY + dy });
};
const up = () => {
dragRef.current.isDragging = false;
document.removeEventListener('mousemove', move);
document.removeEventListener('mouseup', up);
document.removeEventListener('touchmove', move);
document.removeEventListener('touchend', up);
};
document.addEventListener('mousemove', move);
document.addEventListener('mouseup', up);
document.addEventListener('touchmove', move, { passive: false });
document.addEventListener('touchend', up);
};
// --- 5. LOGIC KÉO GIÃN (RESIZE) - [NEW v1.1] ---
const handleResizeMouseDown = (e) => {
e.preventDefault();
e.stopPropagation();
const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
resizeRef.current = {
isResizing: true,
startX: clientX,
startY: clientY,
startWidth: size.width,
startHeight: size.height
};
const move = (e) => {
if (!resizeRef.current.isResizing) return;
if (e.cancelable) e.preventDefault();
const cx = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
const cy = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
const dx = cx - resizeRef.current.startX;
const dy = cy - resizeRef.current.startY;
// Giới hạn chiều rộng và chiều cao tối thiểu
setSize({
width: Math.max(300, Math.min(window.innerWidth - 40, resizeRef.current.startWidth + dx)),
height: Math.max(400, Math.min(window.innerHeight - 40, resizeRef.current.startHeight + dy))
});
};
const up = () => {
resizeRef.current.isResizing = false;
document.removeEventListener('mousemove', move);
document.removeEventListener('mouseup', up);
document.removeEventListener('touchmove', move);
document.removeEventListener('touchend', up);
};
document.addEventListener('mousemove', move);
document.addEventListener('mouseup', up);
document.addEventListener('touchmove', move, { passive: false });
document.addEventListener('touchend', up);
};
// --- 6. RENDER HELPER ---
const renderMarkdown = (text) => {
let html = text
.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') // Bold
.replace(/\*(.*?)\*/g, '<em>$1</em>') // Italic
.replace(/`(.*?)`/g, '<code class="bg-gray-200 px-1 rounded font-mono text-xs">$1</code>') // Code
.replace(/\n/g, '<br/>'); // Newline
return <span dangerouslySetInnerHTML={{ __html: html }} />;
};
if (!isOpen) return null;
const Icons = window.Icons;
const Icon = (Name, props) => Icons[Name] ? React.createElement(Icons[Name], props) : null;
return (
<div className="fixed inset-0 z-[200] flex items-center justify-center pointer-events-none">
{/* Overlay click to close */}
<div className="absolute inset-0 bg-transparent pointer-events-auto" onClick={onClose}></div>
<div
className="bg-white/95 backdrop-blur-md shadow-2xl flex flex-col z-10 overflow-hidden pointer-events-auto rounded-2xl border border-gray-200 transition-transform duration-75 ease-out relative"

const ManualInputModal = ({ isOpen, onClose, onImport, onAddCard, onAutoFill, t, mainColor }) => {
const [mode, setMode] = React.useState('single');
const [text, setText] = React.useState('');
const [isFilling, setIsFilling] = React.useState(false);
const [singleData, setSingleData] = React.useState({ term: '', pronunciation: '', definition: '', partOfSpeech: '', example: '', sinoViet: '' });
React.useEffect(() => {
if (isOpen) {
setText('');
setSingleData({ term: '', pronunciation: '', definition: '', partOfSpeech: '', example: '', sinoViet: '' });
setMode('single');
setIsFilling(false);
}
}, [isOpen]);
const handleSingleChange = (field, value) => setSingleData(prev => ({ ...prev, [field]: value }));
const handleSingleSubmit = () => {
if (!singleData.term.trim()) return;
onAddCard(singleData);
setSingleData({ term: '', pronunciation: '', definition: '', partOfSpeech: '', example: '', sinoViet: '' });
};
const handleAutoFillClick = async () => {
if (!singleData.term.trim()) return;
if (!onAutoFill) { alert("Chức năng AI chưa được kết nối!"); return; }
setIsFilling(true);
try {
const result = await onAutoFill(singleData.term);
if (result) {
if (result._tokenUsage) {
const used = result._tokenUsage.totalTokenCount || 0;
const currentTotal = parseInt(localStorage.getItem('fc_total_tokens') || '0', 10);
localStorage.setItem('fc_total_tokens', currentTotal + used);
}
setSingleData(prev => ({
...prev,
pronunciation: result.pronunciation || prev.pronunciation,
definition: result.definition || prev.definition,
partOfSpeech: result.partOfSpeech || prev.partOfSpeech,
example: result.example || prev.example,
sinoViet: result.sinoViet || prev.sinoViet
}));
}
}
catch (e) { console.error(e); }
finally { setIsFilling(false); }
};
if (!isOpen) return null;
return (
<div className="fixed inset-0 z-[250] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm animate-in fade-in">

<button onClick={handleAutoFillClick} disabled={isFilling || !singleData.term.trim()} className={`p-3 rounded-lg border-2 ${isFilling ? 'bg-gray-100 border-gray-200 cursor-not-allowed' : `bg-purple-50 border-purple-200 text-purple-600 hover:bg-purple-100`}`} title="Tự động điền bằng AI">

</>

<div className="p-4 border-t bg-gray-50 flex justify-end gap-3">

// Block4.7: TẦNG 4: CÁC TÍNH NĂNG & MODALS (In-game Helper Modals) - Version 1.1
// Last Updated: 2026-04-04 13:55
// Nhiệm vụ: Chuyên trách các công cụ phụ trợ bật lên trong quá trình học.
// Gồm: WordSelectorModal, HanziSelectorModal
// ==================================================================================
// [UPDATED] Hỗ trợ Dual-Payload: Nhận vào chuỗi hoặc Object có {isSmartTarget: true}
const WordSelectorModal = ({ isOpen, onClose, onSave, text, currentLang, t, mainColor }) => {
const [selectedIndices, setSelectedIndices] = React.useState(new Set());
const [words, setWords] = React.useState([]);
// Xử lý Dual-Payload
const isSmartObject = typeof text === 'object' && text !== null && text.isSmartTarget;
const displayText = isSmartObject ? text.display : (text || "");
const saveText = isSmartObject ? text.save : (text || "");
React.useEffect(() => {
if (!displayText) { setWords([]); return; }
if (currentLang === 'zh') { setWords([...displayText].filter(c => c.trim().length > 0)); }
else { setWords(displayText.split(' ').filter(w => w.length > 0)); }
setSelectedIndices(new Set());
}, [displayText, currentLang, isOpen]);
const toggleWord = (index) => {
const newSet = new Set(selectedIndices);
newSet.has(index) ? newSet.delete(index) : newSet.add(index);
setSelectedIndices(newSet);
};
if (!isOpen) return null;
const selectedWordsList = words.filter((_, i) => selectedIndices.has(i));
const Icons = window.Icons;
return (
<div className="fixed inset-0 z-[250] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm animate-in fade-in">
<div className="bg-white rounded-xl shadow-2xl w-full max-w-sm flex flex-col overflow-hidden">
<div className="p-4 border-b bg-gray-50 flex justify-between items-center">
<h3 className="font-bold text-gray-700">{t('selectWordsToSave')}</h3>
<button onClick={onClose} data-tooltip={t('ttClose')}><Icons.X size={20} /></button>
</div>
<div className="p-6 overflow-y-auto max-h-[60vh]">
<div className="flex flex-wrap gap-2 justify-center">
{words.map((word, idx) => (
<button key={idx} onClick={() => toggleWord(idx)} className={`px-3 py-2 rounded-lg border transition-all text-base sm:text-lg font-medium ${selectedIndices.has(idx) ? `bg-orange-100 border-${mainColor}-500 text-${mainColor}-700 shadow-md` : 'bg-white border-gray-200 text-gray-600 hover:bg-gray-50'}`}>
{word}
</button>
))}
</div>
</div>
<div className="p-4 border-t bg-gray-50 flex flex-col gap-2">
<div className="flex gap-2">
<button onClick={() => onSave(selectedWordsList, false)} disabled={selectedIndices.size === 0} className={`flex-1 py-3 bg-orange-500 text-white rounded-xl font-bold disabled:opacity-50 hover:bg-${mainColor}-700 shadow-md transition-all active:scale-95`}>
{t('saveSelected')} ({selectedIndices.size})
</button>
<button onClick={() => onSave(selectedWordsList, true)} disabled={selectedIndices.size < 2} className={`flex-1 py-3 bg-purple-600 text-white rounded-xl font-bold disabled:opacity-50 hover:bg-purple-700 shadow-md transition-all active:scale-95 flex items-center justify-center gap-1`} title="Ghép các từ đã chọn thành 1 từ vựng mới">
<Icons.Link size={18} /> Lưu cụm
</button>
</div>
{/* Bấm nút này sẽ lưu chuỗi "saveText" (có thể chứa đáp án ẩn) */}
<button onClick={() => onSave([saveText])} className="w-full py-3 bg-white border border-gray-300 text-gray-700 rounded-xl font-bold hover:bg-gray-100 transition-colors">
{t('saveWholeSentence')}
</button>
</div>
</div>
</div>
);
};
// Hanzi Selector Modal - Cửa sổ bật lên để chọn chữ Hán cần tập viết
const HanziSelectorModal = ({ isOpen, onClose, text, onSelect, t }) => {
const [chars, setChars] = React.useState([]);
React.useEffect(() => {
if (isOpen && text) {
const hanziRegex = /[\u4e00-\u9fa5]/g;
const found = text.match(hanziRegex);
if (found) {
setChars([...new Set(found)]);
} else {
setChars([]);
}
}
}, [isOpen, text]);
if (!isOpen) return null;
const Icons = window.Icons;
return (
<div className="fixed inset-0 z-[240] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm animate-in fade-in">

<div className="p-4 border-b bg-gray-50 flex justify-between items-center">
<h3 className="font-bold text-gray-700">Chọn chữ để tập viết</h3>
<button onClick={onClose}><Icons.X size={20} /></button>
</div>
<div className="p-6">
{chars.length === 0 ? (
<p className="text-center text-gray-500 italic">Không tìm thấy chữ Hán nào trong thẻ này.</p>
) : (
<div className="flex flex-wrap gap-3 justify-center">
{chars.map((char, idx) => (
<button
key={idx}
onClick={() => onSelect(char)}
className="w-16 h-16 text-3xl font-serif border-2 border-gray-200 rounded-xl hover:border-red-500 hover:bg-red-50 hover:text-red-600 transition-all shadow-sm flex items-center justify-center"
>
{char}
</button>
))}
</div>
)}
</div>
<div className="p-4 border-t bg-gray-50 text-center">
<button onClick={onClose} className="px-6 py-2 text-gray-500 font-bold hover:bg-gray-200 rounded-lg">Đóng</button>
</div>
</div>
</div>
);
};
// EXPORT GLOBAL
window.WordSelectorModal = WordSelectorModal;
window.HanziSelectorModal = HanziSelectorModal;

// Nhiệm vụ: Giao diện (Presentation) của Game Nối ô. Chỉ chứa thẻ HTML/Tailwind.
// Cập nhật: NÂNG CẤP GIAI ĐOẠN 2. Bổ sung Panel chọn "Nguồn dữ liệu" (Thẻ / AI Tự sinh) vào màn hình Setup. Tinh chỉnh màn hình chờ AI. Tuân thủ tuyệt đối Quy tắc 3.
// ==================================================================================
// 1. MÀN HÌNH CÀI ĐẶT (MATCH SETUP)
const MatchSetup = ({ t, mainColor, onStart, onBack }) => {
const [sourceMode, setSourceMode] = React.useState('card');
const [timerMode, setTimerMode] = React.useState(false);
const [hardMode, setHardMode] = React.useState(false);
const [aiMode, setAiMode] = React.useState(false);
const [timeLimit, setTimeLimit] = React.useState(60);
React.useEffect(() => {
try {
const savedConfig = localStorage.getItem('fc_match_config');
if (savedConfig) {
const config = JSON.parse(savedConfig);
setSourceMode(config.sourceMode ?? 'card');
setTimerMode(config.timerMode ?? false);
setHardMode(config.hardMode ?? false);
setAiMode(config.aiMode ?? false);
setTimeLimit(config.timeLimit ?? 60);
}
} catch (e) { console.warn("Load config failed", e); }
}, []);
const handleStart = () => {
const config = { timerMode, hardMode, aiMode, timeLimit, sourceMode };
localStorage.setItem('fc_match_config', JSON.stringify(config));
onStart('match', config);
};
const handleHardModeChange = (val) => {
setHardMode(val);
if (!val) setAiMode(false);
};
const MenuToggle = window.MenuToggle;
const Icons = window.Icons;
return (
<div className="relative z-10 flex flex-col items-center mx-auto w-full max-w-sm animate-in slide-in-from-right-8 py-4 h-full">
<div className="w-full flex items-center justify-between mb-4 shrink-0">
<button onClick={onBack} className="p-2 rounded-full hover:bg-gray-100 text-gray-500"><Icons.ChevronLeft size={24}/></button>
<h2 className="text-xl font-bold text-gray-800">Cấu hình Nối Ô</h2>
<div className="w-10"></div>
</div>
<div className="w-full space-y-3 p-1 flex-1 overflow-y-auto custom-scrollbar pb-4">
{/* Bảng chọn Nguồn dữ liệu (Mới) */}
<div className="mb-4">
<label className="block text-sm font-bold text-gray-400 uppercase tracking-widest mb-2">Nguồn câu hỏi</label>
<div className="grid grid-cols-2 gap-3">
<button onClick={() => setSourceMode('card')} className={`p-2 rounded-2xl border-2 flex flex-col items-center gap-1 transition-all ${sourceMode === 'card' ? `border-${mainColor}-500 bg-${mainColor}-50 shadow-sm` : 'border-gray-100 bg-white opacity-60 hover:opacity-100'} hover:scale-105`}>
<Icons.Layers size={24} className={sourceMode === 'card' ? `text-${mainColor}-600` : 'text-gray-400'} />
<div className="text-center">
<div className="font-bold text-gray-800 text-sm">Thẻ của tôi</div>
<div className="text-[10px] text-gray-500">Nối từ trong Flashcard</div>
</div>
</button>
<button onClick={() => { setSourceMode('ai_pure'); setAiMode(false); }} className={`p-2 rounded-2xl border-2 flex flex-col items-center gap-1 transition-all ${sourceMode === 'ai_pure' ? `border-blue-500 bg-blue-50 shadow-sm` : 'border-gray-100 bg-white opacity-60 hover:opacity-100'} hover:scale-105`}>
<Icons.Sparkles size={24} className={sourceMode === 'ai_pure' ? 'text-blue-600' : 'text-gray-400'} />
<div className="text-center">
<div className="font-bold text-gray-800 text-sm">AI Tự Sinh</div>
<div className="text-[10px] text-gray-500">Tạo cặp từ mới vô tận</div>
</div>
</button>
</div>
</div>
<MenuToggle active={hardMode} setActive={handleHardModeChange} icon={Icons.Layers} color="red" title="Chế độ Khó (Hard Mode)" subtitle={hardMode ? "Có từ nhiễu (Distractors)" : "Chỉ gồm các cặp đúng"} />
<MenuToggle active={aiMode} setActive={setAiMode} icon={Icons.Sparkles} color="purple" title="Thử thách AI" subtitle={!hardMode ? "(Yêu cầu bật Chế độ Khó)" : (aiMode ? "AI tạo nhiễu thông minh" : "Thuật toán nội bộ")} disabled={!hardMode || sourceMode === 'ai_pure'} />
<MenuToggle active={timerMode} setActive={setTimerMode} icon={Icons.Clock} color="orange" title="Giới hạn thời gian" subtitle={timerMode ? `${timeLimit} giây / vòng` : 'Thoải mái thời gian'} extra={
<div className="mt-3 pt-2 border-t border-orange-100 flex justify-between items-center animate-in fade-in">
<span className="text-[10px] font-bold text-orange-400 uppercase">Chọn thời gian:</span>
<div className="flex gap-1">
{[30, 45, 60, 90].map(sec => (
<button key={sec} onClick={(e) => { e.stopPropagation(); setTimeLimit(sec); }} className={`px-3 py-1 text-xs font-bold rounded-lg border transition-all ${timeLimit === sec ? `bg-orange-500 text-white border-orange-500 shadow-md` : 'bg-white text-gray-500 border-gray-200 hover:bg-orange-50'}`}>
{sec}s
</button>
))}
</div>
</div>
} />
</div>
<div className="w-full mt-2 pt-4 border-t border-gray-100 space-y-3 pb-safe shrink-0">
<button onClick={handleStart} className={`w-full py-4 bg-${mainColor}-600 text-white rounded-xl font-bold shadow-lg hover:bg-${mainColor}-700 flex items-center justify-center gap-2 active:scale-95 transition-transform`}>
<Icons.Play size={24} /> BẮT ĐẦU NGAY
</button>
</div>
</div>
);

// 2. MÀN HÌNH CHƠI (MATCH PLAY SCREEN)
const MatchPlayScreen = ({
t, mainColor, isLoading, isPaused, onPause, handleSaveAndBack, onEndGame,
timerMode, timeLeft, timeLimit, gameStats, accuracy, difficulty, isAiMode, matchState, settings, notebook, onBookmark,
handleMatchClick, checkMatch, generateMatch, toggleResultPause,
isGenerating, aiCountdown, config
}) => {
const Icons = window.Icons;
const [showConfirmEnd, setShowConfirmEnd] = React.useState(false);
const getTimerColor = (time, total) => {
const ratio = time / total;
if (ratio > 0.6) return 'text-green-600';
if (ratio > 0.3) return 'text-orange-500';
return 'text-red-600 animate-pulse';
};
const getLineCoords = (startId, endId) => {
const startEl = document.getElementById(`match-left-${startId}`);
const endEl = document.getElementById(`match-right-${endId}`);
const container = document.getElementById('match-container');
if (!startEl || !endEl || !container) return null;
const startRect = startEl.getBoundingClientRect();
const endRect = endEl.getBoundingClientRect();
const containerRect = container.getBoundingClientRect();
return {
x1: startRect.right - containerRect.left,
y1: startRect.top + startRect.height / 2 - containerRect.top,
x2: endRect.left - containerRect.left,
y2: endRect.top + endRect.height / 2 - containerRect.top
};
};
if (isGenerating && (!matchState.pairs || matchState.pairs.length === 0)) {
return (
<div className="w-full h-full bg-gray-50 rounded-2xl shadow-xl flex flex-col border-2 border-gray-200 items-center justify-center animate-in fade-in p-4 text-center">
{aiCountdown > 0 ? (
<div className="flex flex-col items-center animate-in zoom-in">
<div className={`text-7xl font-black text-${mainColor}-500 mb-6 drop-shadow-md`}>{aiCountdown}</div>
<p className={`text-${mainColor}-600 font-bold animate-pulse text-lg`}>AI đang phân tích dữ liệu...</p>
<p className="text-gray-400 text-xs mt-2 italic">(Vui lòng đợi giây lát để có vòng đấu hay)</p>
</div>
) : (
<>
<div className={`w-12 h-12 border-4 border-${mainColor}-200 border-t-${mainColor}-600 rounded-full animate-spin mb-4`}></div>
<p className={`text-${mainColor}-600 font-bold animate-pulse text-lg`}>
{config?.sourceMode === 'ai_pure' ? 'AI đang tạo các cặp từ...' : (t('aiGenerating') || 'Đang chuẩn bị dữ liệu...')}
</p>
{config?.sourceMode === 'ai_pure' && config?.level && (
<p className="text-gray-400 text-xs mt-2 italic">(Cấp độ: {config.level.replace('level_', '').replace(/_/g, ' ').toUpperCase()})</p>
)}
</>
)}
<button onClick={() => onEndGame(gameStats)} className="mt-8 text-sm text-gray-400 hover:text-red-500 font-bold border px-4 py-2 rounded-lg hover:bg-red-50 transition-colors">
Hủy bỏ
</button>
</div>
);
}
return (
<React.Fragment>
{/* --- POPUPS & OVERLAYS --- */}
{showConfirmEnd && (
<div className="fixed inset-0 z-[200] bg-black/40 backdrop-blur-sm flex items-center justify-center animate-in fade-in p-4">
<div className="bg-white p-6 rounded-2xl shadow-2xl max-w-sm w-full text-center border-2 border-red-100 flex flex-col items-center">
<div className="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mb-4">
<Icons.AlertCircle size={32} />
</div>
<h3 className="text-xl font-black text-gray-800 mb-2">Kết thúc sớm?</h3>
<p className="text-gray-600 text-sm mb-6">Tiến trình của vòng chơi hiện tại sẽ không được lưu lại. Bạn có chắc chắn muốn thoát?</p>
<div className="flex w-full gap-3">
<button onClick={() => setShowConfirmEnd(false)} className="flex-1 py-3 bg-gray-100 text-gray-700 font-bold rounded-xl hover:bg-gray-200 transition-colors">
Chơi tiếp
</button>
<button onClick={() => { setShowConfirmEnd(false); onEndGame(gameStats); }} className="flex-1 py-3 bg-red-600 text-white font-bold rounded-xl hover:bg-red-700 transition-colors shadow-lg shadow-red-200">
Thoát ngay
</button>
</div>
</div>
</div>
)}
{isGenerating && matchState.pairs && matchState.pairs.length > 0 && (
<div className="fixed inset-0 bg-white/80 backdrop-blur-sm z-[150] flex flex-col items-center justify-center animate-in fade-in">
<div className={`w-10 h-10 border-4 border-${mainColor}-200 border-t-${mainColor}-600 rounded-full animate-spin mb-2`}></div>
<p className={`text-${mainColor}-600 font-bold text-sm animate-pulse`}>{t('aiGenerating') || "AI đang thiết lập..."}</p>
</div>
)}
{isLoading && !isGenerating && (
<div className="fixed inset-0 bg-white/80 z-[150] flex flex-col items-center justify-center backdrop-blur-sm animate-in fade-in">
<div className={`w-10 h-10 border-4 border-${mainColor}-200 border-t-${mainColor}-600 rounded-full animate-spin mb-2`}></div>
<p className={`text-${mainColor}-600 font-bold text-sm animate-pulse`}>Đang thiết lập...</p>
</div>
)}
{isPaused && (
<div className="fixed inset-0 z-[150] bg-white/60 backdrop-blur-sm flex flex-col items-center justify-center animate-in fade-in">

<button onClick={onPause} className={`w-16 h-16 rounded-full bg-${mainColor}-600 text-white flex items-center justify-center shadow-lg hover:scale-110 transition-transform`}>

<div className="flex items-center gap-2">

<Icons.Clock size={12} /> {timeLeft}s
</span>

</div>
<div className="flex items-center gap-2">
{!matchState.isChecked ? (
<button

// ==================================================================================
const MatchGame = ({ cards, t, onBack, onEndGame, onPause, mainColor, isAiMode: propAiMode, lang, onBookmark, notebook, isPaused, onLogWrong, savedState, settings, timerMode, timeLimit, initialDifficulty: propDifficulty, onAutoSave, onUpdateCards, level, onSaveToHarvest }) => {

return propDifficulty || (isAiMode ? 'hard' : 'easy');

});
const [sourceMode] = React.useState(() => {

const [timeLeft, setTimeLeft] = React.useState(timeLimit || 60);

const [isLoading, setIsLoading] = React.useState(false);

const matchQueueRef = React.useRef({ queue: [], index: 0 });

return () => { clearInterval(intervalTimer); triggerAutoSave(); };
}, [triggerAutoSave]);
// ==================================================================================

// ==================================================================================
const pushToRetryBag = React.useCallback((questionData) => {
try {
const bag = JSON.parse(localStorage.getItem('fc_global_retry_bag')) || {};
if (!bag['match']) bag['match'] = [];
const isDup = bag['match'].some(item => item.term === questionData.term);
if (!isDup) {
bag['match'].push(questionData);
localStorage.setItem('fc_global_retry_bag', JSON.stringify(bag));
}
} catch(e) {}
}, []);
const removeFromRetryBag = React.useCallback((termToCheck) => {
try {
const bag = JSON.parse(localStorage.getItem('fc_global_retry_bag')) || {};
if (!bag['match']) return;
const prevLen = bag['match'].length;
bag['match'] = bag['match'].filter(item => item.term !== termToCheck);
if (bag['match'].length !== prevLen) {
localStorage.setItem('fc_global_retry_bag', JSON.stringify(bag));
}
} catch(e) {}
}, []);
const prepareRoundData = async (currentQueueState, currentDiff) => {
let { queue, index } = currentQueueState;
const isPureMode = sourceMode === 'ai_pure';
let isAiGenerated = false;
let realCards = [];
// HÀM LỌC & AUTO-ENRICH TÍCH HỢP BATCH PROCESSING (Chỉ dành cho Card Mode)
const getValidCards = async (startIndex, targetCount, exclusionList = []) => {
let result = [];
let currIdx = startIndex;
let attempts = 0;
let hasGlobalUpdates = false;
let updatedCards = [...cardsRef.current];
const missingBatch = [];
let retryCards = [];
try {
const bag = JSON.parse(localStorage.getItem('fc_global_retry_bag')) || {};
if (bag['match'] && bag['match'].length > 0) {
const shuffledBag = window.Utils.shuffleArray([...bag['match']]);
const maxRetry = Math.ceil(targetCount * 0.3);
retryCards = shuffledBag.slice(0, maxRetry);
}
} catch(e) {}
retryCards.forEach(rc => {
if (!exclusionList.some(ex => ex.term === rc.term)) {
result.push(rc);
}
});
while (result.length < targetCount && attempts < cardsRef.current.length) {
if (currIdx >= queue.length) {
queue = window.Utils.shuffleArray([...queue]);
currIdx = 0;
}
const cardIdx = queue[currIdx];
let c = { ...updatedCards[cardIdx] };
currIdx++;
attempts++;
if (exclusionList.some(ex => ex.term === c.term) || result.some(r => r.term === c.term)) continue;
if (!c.definition || c.definition.trim() === "") {
missingBatch.push({ idx: cardIdx, term: c.term });
result.push(c);
} else {
result.push(c);
}
}
if (missingBatch.length > 0) {
const currentApiKey = localStorage.getItem(window.STORAGE_KEYS.API_KEY);
if (currentApiKey && window.Utils.callGeminiApi) {
try {
const targetLang = lang === 'zh' ? 'Chinese' : (lang === 'en' ? 'English' : 'Vietnamese');
const prompt = `Translate these ${missingBatch.length} ${targetLang} items into Vietnamese. Keep definitions very short (1-6 words).\nItems:\n${missingBatch.map((b, i) => `${i+1}. "${b.term}"`).join('\n')}\n\nReturn EXACTLY a JSON object with a "translations" array.\nFormat: {"translations": ["nghĩa 1", "nghĩa 2", ...]}`;
const schema = { type: "OBJECT", properties: { translations: { type: "ARRAY", items: { type: "STRING" } } }, required: ["translations"] };
const aiPromise = window.Utils.callGeminiApi(prompt, schema, currentApiKey);
const timeoutPromise = new Promise((_, r) => setTimeout(() => r(new Error("Timeout")), 10000));
const res = await Promise.race([aiPromise, timeoutPromise]);
const parsed = window.Utils.parseAiJson(res.text);
if (parsed && parsed.translations && parsed.translations.length === missingBatch.length) {
missingBatch.forEach((b, i) => {
updatedCards[b.idx] = { ...updatedCards[b.idx], definition: parsed.translations[i] };
const resItem = result.find(r => r.term === b.term);
if (resItem) resItem.definition = parsed.translations[i];
});
hasGlobalUpdates = true;
if (res.tokenMetadata) {
const used = res.tokenMetadata.totalTokenCount || 0;
const currentTotal = parseInt(localStorage.getItem('fc_total_tokens') || '0', 10);
localStorage.setItem('fc_total_tokens', currentTotal + used);
}
}
} catch (e) {
console.warn("Background batch enrich failed:", e);
}
}
result = result.filter(c => c.definition && c.definition.trim() !== "");
}
if (hasGlobalUpdates) {
cardsRef.current = updatedCards;
if (onUpdateCards) onUpdateCards(updatedCards);
}
if (result.length < targetCount) {
const remaining = cardsRef.current.filter(c => !exclusionList.some(ex => ex.term === c.term) && !result.some(r => r.term === c.term));
result.push(...remaining.slice(0, targetCount - result.length));
}
return { validCards: result, nextIndex: currIdx, updatedQueue: queue };
};
// --- 1. LẤY DỮ LIỆU (REAL CARDS) ---
if (isPureMode) {
setIsGenerating(true);
try {
let historyPrompt = "";
if (window.GameAlgoEngine && window.GameAlgoEngine.PreflightEngine) {
const history = JSON.parse(localStorage.getItem('fc_match_history') || '[]');
historyPrompt = window.GameAlgoEngine.PreflightEngine.getHistoryPrompt(history);
}
const currentApiKey = localStorage.getItem(window.STORAGE_KEYS.API_KEY);
if (!currentApiKey) throw new Error("Missing API Key");
const safeLevel = level || 'level_4_discovery_basic';
const pureCards = await window.GameAlgoEngine.PureModeEngine.fetchPureMatchBatch(safeLevel, lang, currentApiKey, historyPrompt);
const newTerms = pureCards.map(c => c.term);
let history = JSON.parse(localStorage.getItem('fc_match_history') || '[]');
history = [...history, ...newTerms].slice(-20);
localStorage.setItem('fc_match_history', JSON.stringify(history));
if (onSaveToHarvest) {
pureCards.forEach(c => {
onSaveToHarvest(safeLevel, { displaySentence: c.term, targetWord: c.term, hint: c.definition });
});
}
const count = currentDiff === 'hard' ? 4 : 5;
realCards = window.Utils.shuffleArray(pureCards).slice(0, count);
isAiGenerated = true;
} catch (e) {
console.warn("PureMode Match Fallback:", e);
const fbList = window.IoeDataEngine?.FALLBACK_DATA?.pure_match || [{ items: [{term: "apple", definition: "táo"}, {term: "cat", definition: "mèo"}, {term: "dog", definition: "chó"}, {term: "sun", definition: "mặt trời"}, {term: "moon", definition: "mặt trăng"}] }];
const fb = fbList[0].items;
const count = currentDiff === 'hard' ? 4 : 5;
realCards = window.Utils.shuffleArray(fb).slice(0, count);
}
} else {
if (queue.length !== cardsRef.current.length) {
queue = window.Utils.shuffleArray(Array.from({ length: cardsRef.current.length }, (_, i) => i));
index = 0;
}
const count = currentDiff === 'hard' ? Math.min(4, cardsRef.current.length) : Math.min(6, cardsRef.current.length);
const { validCards, nextIndex, updatedQueue } = await getValidCards(index, count);
realCards = validCards;
index = nextIndex;
queue = updatedQueue;
}
// --- 2. TẠO BẪY VÀ SẮP XẾP ---
if (currentDiff === 'hard') {
let trapCards = [];
if (isPureMode) {
const trapCandidates = realCards.slice(0, 2);
for (let i = 0; i < trapCandidates.length; i++) {
const tc = trapCandidates[i];
let distortedTerm = null;
const type = window.Utils.detectSentence ? (window.Utils.detectSentence(tc.term) ? 'sentence' : 'word') : 'word';
const currentApiKey = localStorage.getItem(window.STORAGE_KEYS.API_KEY);
if (currentApiKey && window.GameAlgoEngine && window.GameAlgoEngine.DistortionEngine.ai_distort) {
try {

distortedTerm = res.wrongSentence;

}
if ((!distortedTerm || distortedTerm === tc.term) && window.GameAlgoEngine && window.GameAlgoEngine.DistortionEngine.offline_distort) {
distortedTerm = window.GameAlgoEngine.DistortionEngine.offline_distort(tc.term, lang, type).wrongSentence;
}
if (!distortedTerm) distortedTerm = tc.term + "x";
trapCards.push({ ...tc, distortedTerm });
}
} else {
const availableTraps = cardsRef.current.filter(c =>
!realCards.some(r => r.term === c.term) &&
c.definition && c.definition.trim() !== ""
);
if (availableTraps.length >= 2) {
trapCards = window.Utils.shuffleArray([...availableTraps]).slice(0, 2);
} else {
const absoluteFallback = cardsRef.current.filter(c => !realCards.some(r => r.term === c.term));
trapCards = window.Utils.shuffleArray([...absoluteFallback]).slice(0, 2);
}
}
const leftItems = [...realCards, ...trapCards].map((c, i) => ({
id: `left_${i}_${Date.now()}`,
term: c.term,
definition: c.definition || "No definition",
isTrap: isPureMode ? trapCards.some(t => t.term === c.term) : trapCards.some(t => t.term === c.term),

}));
const rightItems = [];
realCards.forEach((c, i) => {

id: `right_real_${i}_${Date.now()}`,

isTrap: false
});
});
for (let i = 0; i < trapCards.length; i++) {

} catch(e) {}
}, []);

const retryQ = bag['fillblank'][randIdx];
if (retryQ && retryQ.targetWord && retryQ.displaySentence) {

if (validCards.length === 0) validCards = [...enrichedCardsRef.current];
deckRef.current = window.Utils.shuffleArray ? window.Utils.shuffleArray(validCards) : validCards;
}
card = deckRef.current.shift();

}
const canCallAi = isAiMode && apiKey && window.Utils && window.Utils.callGeminiApi;
const isSentence = !isPureMode ? (window.Utils && window.Utils.detectSentence ? window.Utils.detectSentence(card.term) : card.term.includes(' ')) : true;

// ==================================================================================
// --- 1. ĐỘNG CƠ LOGIC (HOOK) ---
const useSpotMistakeLogic = (cards, config, callbacks) => {
const { isAiMode, apiKey, lang, timeLimit, level, sourceMode, savedState, timerMode } = config;

const [combo, setCombo] = React.useState(1);

// ==================================================================================
// [NEW v2.6] BỘ NÃO TÚI NHÁP TOÀN CỤC (GLOBAL RETRY BAG LOGIC)

const pushToRetryBag = React.useCallback((questionData) => {
try {
const bag = JSON.parse(localStorage.getItem('fc_global_retry_bag')) || {};
if (!bag['spotmistake']) bag['spotmistake'] = [];
const termToCheck = questionData.origin?.term || questionData.wrongSentence;
const isDup = bag['spotmistake'].some(item => (item.origin?.term || item.wrongSentence) === termToCheck);
if (!isDup) {
bag['spotmistake'].push(questionData);
localStorage.setItem('fc_global_retry_bag', JSON.stringify(bag));
}
} catch(e) {}
}, []);
const removeFromRetryBag = React.useCallback((termToCheck) => {
try {
const bag = JSON.parse(localStorage.getItem('fc_global_retry_bag')) || {};
if (!bag['spotmistake']) return;
const prevLen = bag['spotmistake'].length;
bag['spotmistake'] = bag['spotmistake'].filter(item => (item.origin?.term || item.wrongSentence) !== termToCheck);
if (bag['spotmistake'].length !== prevLen) {
localStorage.setItem('fc_global_retry_bag', JSON.stringify(bag));
}
} catch(e) {}
}, []);
// ==================================================================================
// Cỗ máy đóng gói Lỗi sai (Lưu cả câu đã sửa & Gạch chân từ đúng)
const logMistake = React.useCallback((question) => {
if (!onLogWrong || !question) return;
const baseData = question.origin || {};
const underlinedCorrection = question.correction.split('').map(char => char + '\u0332').join('');
const sentenceWithUnderline = question.wrongSentence.replace(question.wrongWord, underlinedCorrection);
const mistakeCard = {
...baseData, id: `mistake_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`, type: 'mistake',
term: sentenceWithUnderline, definition: baseData.definition || question.hint || "Thử thách Spot Mistake",
analysis: question.explanation, example: `Lỗi: ${question.wrongWord} -> Sửa: ${question.correction}`,
tags: ['spotmistake', level, sourceMode], timestamp: Date.now()
};
onLogWrong(mistakeCard);
}, [onLogWrong, level, sourceMode]);
const getNextCardIndex = () => {
if (deckRef.current.length === 0) {
let validIndices = enrichedCardsRef.current.map((c, i) => ({ c, i })).filter(({ c }) => window.Utils && window.Utils.detectSentence ? window.Utils.detectSentence(c.term) : c.term.includes(' ')).map(({ i }) => i);
if (validIndices.length === 0) validIndices = enrichedCardsRef.current.map((_, i) => i);
deckRef.current = window.Utils.shuffleArray ? window.Utils.shuffleArray(validIndices) : validIndices;
}
return deckRef.current.shift() || 0;
};
// --- TÌM NẠP DỮ LIỆU (FETCH TASK CHO COORDINATOR) ---
const fetchTask = async () => {
// 1. ĐÁNH CHẶN 30%: Bốc từ túi nháp (Tiết kiệm Token AI)
if (Math.random() < 0.3) {
try {
const bag = JSON.parse(localStorage.getItem('fc_global_retry_bag')) || {};
if (bag['spotmistake'] && bag['spotmistake'].length > 0) {
const randIdx = Math.floor(Math.random() * bag['spotmistake'].length);
const retryQ = bag['spotmistake'][randIdx];
if (retryQ && retryQ.wrongSentence && retryQ.wrongWord) {
return retryQ;
}
}
} catch(e) {}
}
const isPureMode = sourceMode === 'ai_pure';
let card = null;
if (!isPureMode) {
const nextIdx = getNextCardIndex();
card = enrichedCardsRef.current[nextIdx];
if (!card) return null;
}
const canCallAi = isAiMode && apiKey && window.Utils && window.Utils.callGeminiApi;
const isSentence = !isPureMode ? (window.Utils && window.Utils.detectSentence ? window.Utils.detectSentence(card.term) : card.term.includes(' ')) : true;
const type = isSentence ? 'sentence' : 'word';
if (canCallAi && isSentence) {
try {
let parsedResult = null;
if (isPureMode) {
let prompt = window.IoeDataEngine.buildPureModePrompt(level, 'spotmistake');
if (window.GameAlgoEngine && window.GameAlgoEngine.PreflightEngine) {
prompt += window.GameAlgoEngine.PreflightEngine.getHistoryPrompt(historyQueueRef.current);
}
prompt += "\n\nCRITICAL RULE: The 'explanation' field MUST BE 100% IN VIETNAMESE.";
const schema = window.IoeDataEngine.SCHEMAS.pure_spot_mistake;
const aiPromise = window.Utils.callGeminiApi(prompt, schema, apiKey);
const timeoutPromise = new Promise((_, r) => setTimeout(() => r(new Error("AI Timeout (20s)")), 20000));
const res = await Promise.race([aiPromise, timeoutPromise]);
parsedResult = window.Utils.parseAiJson(res.text);
historyQueueRef.current.push(parsedResult.wrongSentence);
if (historyQueueRef.current.length > 15) historyQueueRef.current.shift();
if (res.tokenMetadata) {
const used = res.tokenMetadata.totalTokenCount || 0;
const currentTotal = parseInt(localStorage.getItem('fc_total_tokens') || '0', 10);
localStorage.setItem('fc_total_tokens', currentTotal + used);
}
if (onSaveToHarvest) {
onSaveToHarvest(level, {
wrongSentence: parsedResult.wrongSentence, wrongWord: parsedResult.wrongWord,
correction: parsedResult.correction, explanation: parsedResult.explanation
});
}
} else {
if (window.GameAlgoEngine && window.GameAlgoEngine.DistortionEngine.ai_distort) {
parsedResult = await window.GameAlgoEngine.DistortionEngine.ai_distort(card.term, lang, type, apiKey);
} else {
throw new Error("Missing DistortionEngine in Tầng 2");
}
}
if (!parsedResult || !parsedResult.wrongSentence || !parsedResult.wrongWord) throw new Error("Invalid AI Data");
const originData = isPureMode ? {
term: parsedResult.wrongSentence.replace(parsedResult.wrongWord, parsedResult.correction),
definition: "Thử thách tự sinh (AI Pure Mode)", analysis: parsedResult.explanation, isAiGenerated: true
} : card;
const result = { ...parsedResult, origin: originData, isAiGenerated: true };
if (isInitializingRef.current) {
aiGeneratedCountRef.current += 1;
safeShowToast(`Đã nạp xong câu ${aiGeneratedCountRef.current} bằng AI...`, "success");
}
return result;
} catch (e) {
console.warn("AI SpotMistake Fallback:", e.message);
if (isPureMode) {
const fallbackList = window.IoeDataEngine.FALLBACK_DATA?.pure_spot_mistake || [{ wrongSentence: "The childrens is playing in the park.", wrongWord: "is", correction: "are", explanation: "Lỗi chủ ngữ số ít/nhiều" }];
const fb = fallbackList[Math.floor(Math.random() * fallbackList.length)];
return { ...fb, origin: { term: fb.wrongSentence.replace(fb.wrongWord, fb.correction), definition: "Offline Fallback", analysis: fb.explanation }, isAiGenerated: false };
}
}
}
const textOrCardTerm = isPureMode ? "The dogs is eating." : card.term;
let offlineResult = { wrongSentence: textOrCardTerm + "x", wrongWord: textOrCardTerm + "x", correction: textOrCardTerm, explanation: "Fallback" };
if (window.GameAlgoEngine && window.GameAlgoEngine.DistortionEngine.offline_distort) {
offlineResult = window.GameAlgoEngine.DistortionEngine.offline_distort(textOrCardTerm, lang, type);
}
return { ...offlineResult, origin: isPureMode ? { term: textOrCardTerm, definition: "Offline Tự sinh" } : card, isAiGenerated: false };
};
const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
// Thuật toán Smart Chunking
const setupQuestion = (data) => {
setCurrentQuestion(data);
let wordChunks = [];
const sentence = data.wrongSentence || "";
const wrong = data.wrongWord || "";
if (wrong && sentence) {
let regex;
try { regex = new RegExp(`\\b${escapeRegExp(wrong)}\\b`, 'i'); }
catch(e) { regex = new RegExp(escapeRegExp(wrong), 'i'); }
let match = sentence.match(regex);
if (!match) {
regex = new RegExp(escapeRegExp(wrong), 'i');
match = sentence.match(regex);
}
if (match) {
const index = match.index;
const before = sentence.substring(0, index);
const matchedText = sentence.substring(index, index + wrong.length);
const after = sentence.substring(index + wrong.length);
const beforeChunks = before.split(' ').filter(w => w.trim().length > 0).map((text, idx) => ({ id: `cb-${idx}-${Date.now()}`, text, isTarget: false }));
const matchChunk = { id: `cm-${Date.now()}`, text: matchedText, isTarget: true };
const afterChunks = after.split(' ').filter(w => w.trim().length > 0).map((text, idx) => ({ id: `ca-${idx}-${Date.now()}`, text, isTarget: false }));
wordChunks = [...beforeChunks, matchChunk, ...afterChunks];
} else {
wordChunks = sentence.split(' ').filter(w => w.trim().length > 0).map((text, idx) => {
const cleanText = text.replace(/[.,?!;:'"]/g, '').toLowerCase();
const cleanWrong = wrong.replace(/[.,?!;:'"]/g, '').toLowerCase();
return { id: `c-${idx}-${Date.now()}`, text, isTarget: cleanText === cleanWrong };
});
}
} else {
wordChunks = sentence.split(' ').map((text, idx) => ({ id: `c-${idx}-${Date.now()}`, text, isTarget: false }));
}
setChunks(wordChunks);
setStage('spot'); setSelectedIndex(null); setInputBuffer(""); setCheckStatus('idle'); setAttempts(0);
setTimeLeft(timeLimit || 30);
};
const startNewGame = async () => {
if (sourceMode === 'card' && (!cards || cards.length === 0)) return;
setIsGenerating(true);
setPlayedCount(0); setScore(0); setCombo(1); setTime(0); setCorrectCount(0); setWrongCount(0);
