<button onClick={() => { setSourceMode('ai_pure'); setInputMethod('tap'); setAiMode(false); }} className={`p-2 rounded-2xl border-2 flex flex-col items-center gap-1 transition-all ${sourceMode === 'ai_pure' ? `border-blue-500 bg-blue-50 shadow-sm` : 'border-gray-100 bg-white opacity-60 hover:opacity-100'} hover:scale-105`}>
<Icons.Sparkles size={24} className={sourceMode === 'ai_pure' ? 'text-blue-600' : 'text-gray-400'} />
<div className="text-center">
<div className="font-bold text-gray-800 text-sm">AI Tự Sinh</div>
<div className="text-[10px] text-gray-500">Tạo câu đố mới vô tận</div>
</div>
</button>
</div>
</div>
<div>
<label className="block text-sm font-semibold text-gray-700 mb-2 mt-2">Cách trả lời (Chốt khi bắt đầu)</label>
<div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-2">
<button onClick={() => setInputMethod('tap')} className={`p-3 rounded-xl border-2 flex flex-col items-center justify-center text-center transition-all ${inputMethod === 'tap' ? 'border-blue-500 bg-blue-50 text-blue-700 ring-2 ring-blue-200' : 'border-gray-200 hover:border-blue-300 bg-white text-gray-500'}`}>
<span className="text-2xl mb-1">🖱️</span><span className="font-bold text-xs">Chạm thẻ</span>
</button>
<button onClick={() => { setInputMethod('type'); setAiMode(false); }} className={`p-3 rounded-xl border-2 flex flex-col items-center justify-center text-center transition-all ${inputMethod === 'type' ? 'border-green-500 bg-green-50 text-green-700 ring-2 ring-green-200' : 'border-gray-200 hover:border-green-300 bg-white text-gray-500'}`}>
<span className="text-2xl mb-1">⌨️</span><span className="font-bold text-xs">Gõ phím</span>
</button>
<button onClick={() => { setInputMethod('voice'); setAiMode(false); }} className={`p-3 rounded-xl border-2 flex flex-col items-center justify-center text-center transition-all ${inputMethod === 'voice' ? 'border-purple-500 bg-purple-50 text-purple-700 ring-2 ring-purple-200' : 'border-gray-200 hover:border-purple-300 bg-white text-gray-500'}`}>
<span className="text-2xl mb-1">🎙️</span><span className="font-bold text-xs">Giọng nói</span>
</button>
</div>
</div>
<MenuToggle active={autoReadAnswer} setActive={setAutoReadAnswer} icon={Icons.Volume2} color="pink" title="Đọc lại đáp án" subtitle="Tự động đọc to khi ghép đúng" />
<MenuToggle active={hardMode} setActive={handleHardModeChange} icon={Icons.Layers} color="red" title="Chế độ Khó (Hard Mode)" subtitle={hardMode ? (inputMethod === 'tap' ? "Có từ nhiễu & Khóa trợ giúp" : "Khóa trợ giúp (Không tự đọc)") : (inputMethod === 'tap' ? "Chỉ gồm từ trong câu" : "Cơ bản (Có hỗ trợ âm thanh)")} />
<MenuToggle active={aiMode} setActive={setAiMode} icon={Icons.Sparkles} color="purple" title="Thử thách AI" subtitle={!hardMode ? "(Yêu cầu bật Chế độ Khó)" : (inputMethod !== 'tap' ? "(Chỉ hỗ trợ Chạm thẻ)" : "AI tạo bẫy ngữ pháp (cho câu văn)")} disabled={!hardMode || inputMethod !== 'tap'} />
<MenuToggle active={timerMode} setActive={setTimerMode} icon={Icons.Clock} color="orange" title="Giới hạn thời gian" subtitle={timerMode ? `${timeLimit} giây / câu` : 'Thoải mái thời gian'} extra={
<div className="mt-3 pt-2 border-t border-orange-100 flex justify-between items-center animate-in fade-in">
<span className="text-[10px] font-bold text-orange-400 uppercase">Chọn thời gian:</span>
<div className="flex gap-1">
{[20, 30, 60, 90, 120].map(sec => (
<button key={sec} onClick={(e) => { e.stopPropagation(); setTimeLimit(sec); }} className={`px-3 py-1 text-xs font-bold rounded-lg border transition-all ${timeLimit === sec ? `bg-orange-500 text-white border-orange-500 shadow-md` : 'bg-white text-gray-500 border-gray-200 hover:bg-orange-50'}`}>
{sec}s
</button>
))}
</div>
</div>
} />
</div>
<div className="w-full mt-2 pt-4 border-t border-gray-100 space-y-3 bg-white pb-safe shrink-0">
<button onClick={handleStart} className={`w-full py-4 bg-${mainColor}-600 text-white rounded-xl font-bold shadow-lg hover:bg-${mainColor}-700 flex items-center justify-center gap-2 active:scale-95 transition-transform`}>
<Icons.Play size={24} /> BẮT ĐẦU NGAY
</button>
</div>
</div>
);
};
// 2. SCRAMBLE PLAY SCREEN (Giao diện Game)
const ScramblePlayScreen = ({
t, mainColor, lang, settings, config,
isPaused, timerMode, timeLimit, timeLeft,
inputMethod, isGenerating, aiCountdown,
gameState, setGameState, stats, difficulty,
inputBuffer, setInputBuffer, typeInputRef,
isListening, voiceRetries, voiceOptions, voiceSelectedOption,
showExplainModal, setShowExplainModal, aiExplanation, isAiExplaining,
onBack, onEndGame, onPause, onPlay, onBookmark,
triggerAutoSave, checkAnswer, handleVoiceChoice, toggleMic, handleSkip,
onDragStart, onDragEnter, onDragEnd, onTouchStart, onTouchMove, onTouchEnd,
handleExplain, nextRound, isBookmarked,
handleAddPunctuation,
resultTimer, isResultPaused, toggleResultPause,
queueLength
}) => {
const Icons = window.Icons;
const [showConfirmEnd, setShowConfirmEnd] = React.useState(false);
const totalPlayed = stats.correct + stats.wrong;
const accuracy = totalPlayed > 0 ? Math.round((stats.correct / totalPlayed) * 100) : 0;
const getTimerColor = (time, total) => { const ratio = time / total; if (ratio > 0.6) return 'text-green-600'; if (ratio > 0.3) return 'text-orange-500'; return 'text-red-600 animate-pulse'; };
const containerWidthClass = 'max-w-5xl';
const renderChunk = (chunk, onClick) => {
const isSpace = chunk.text === ' ';
const isPunct = chunk.isPunct;
return (
<div style={{ touchAction: 'none', fontFamily: window.Utils.getFontFamily(settings), fontWeight: settings?.fontWeight || 'bold', fontSize: settings?.fontSize ? `${settings.fontSize}rem` : '1.5rem' }} className={`px-3 py-1.5 rounded-lg shadow transition-all select-none ${isSpace ? 'bg-gray-200 border-2 border-dashed border-gray-400 text-transparent min-w-[30px] flex justify-center items-center' : (onClick ? 'bg-white border border-gray-200 text-gray-700 hover:bg-gray-50 cursor-pointer' : (isPunct ? 'bg-gray-700 text-white cursor-grab active:cursor-grabbing' : `bg-${mainColor}-500 text-white cursor-grab active:cursor-grabbing`))}`}>
{isSpace ? '␣' : chunk.text}
</div>
);
};
if (isGenerating && !gameState.origin) {
return (
<div className="w-full h-full bg-gray-50 rounded-2xl shadow-xl flex flex-col border-2 border-gray-200 items-center justify-center animate-in fade-in">
{aiCountdown > 0 ? (
<div className="flex flex-col items-center animate-in zoom-in">
<div className={`text-7xl font-black text-${mainColor}-500 mb-6 drop-shadow-md`}>{aiCountdown}</div>
<p className={`text-${mainColor}-600 font-bold animate-pulse text-lg`}>AI đang phân tích dữ liệu...</p>
<p className="text-gray-400 text-xs mt-2 italic">(Vui lòng đợi giây lát để có câu hỏi hay)</p>
</div>
) : (
<>
<div className={`w-12 h-12 border-4 border-${mainColor}-200 border-t-${mainColor}-600 rounded-full animate-spin mb-4`}></div>
<p className={`text-${mainColor}-600 font-bold animate-pulse text-lg`}>
{config?.sourceMode === 'ai_pure' ? 'AI đang sáng tác câu đố...' : (t('aiGenerating') || "Đang tải dữ liệu...")}
</p>
</>
)}
<button onClick={() => onEndGame(stats)} className="mt-8 text-sm text-gray-400 hover:text-red-500 font-bold border px-4 py-2 rounded-lg hover:bg-red-50 transition-colors">
Hủy bỏ
</button>
</div>
);
}
// [QA DEBUG] Xử lý kẹt màn hình Loading do AI sập hoặc Fallback sập
if (!isGenerating && !gameState.origin) {
return (
<div className="w-full h-full bg-gray-50 rounded-2xl shadow-xl flex flex-col border-2 border-gray-200 items-center justify-center animate-in fade-in p-6 text-center">
<Icons.AlertCircle size={48} className="text-red-500 mb-4" />
<h3 className="text-xl font-bold text-gray-800 mb-2">Lỗi nạp dữ liệu</h3>
<p className="text-gray-600 mb-6 text-sm max-w-sm">Hệ thống không thể tải được câu hỏi. Vui lòng kiểm tra lại kết nối mạng hoặc thử lại.</p>
<button onClick={() => onEndGame(stats)} className="px-6 py-3 bg-red-600 text-white font-bold rounded-xl shadow-lg hover:bg-red-700 transition-colors">
Thoát về Menu
</button>
</div>
);
}
return (
<div className={`w-full h-full flex flex-col items-center bg-${mainColor}-50 rounded-2xl shadow-xl border-2 border-gray-200 overflow-hidden relative animate-in`}>
{showConfirmEnd && (
<div className="absolute inset-0 z-[100] bg-black/40 backdrop-blur-sm flex items-center justify-center animate-in fade-in p-4">
<div className="bg-white p-6 rounded-2xl shadow-2xl max-w-sm w-full text-center border-2 border-red-100 flex flex-col items-center">
<div className="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mb-4">
<Icons.AlertCircle size={32} />
</div>
<h3 className="text-xl font-black text-gray-800 mb-2">Kết thúc sớm?</h3>
<p className="text-gray-600 text-sm mb-6">Tiến trình của câu hỏi hiện tại sẽ không được lưu lại. Bạn có chắc chắn muốn thoát?</p>
<div className="flex w-full gap-3">
<button onClick={() => setShowConfirmEnd(false)} className="flex-1 py-3 bg-gray-100 text-gray-700 font-bold rounded-xl hover:bg-gray-200 transition-colors">
Chơi tiếp
</button>
<button onClick={() => { setShowConfirmEnd(false); onEndGame(stats); }} className="flex-1 py-3 bg-red-600 text-white font-bold rounded-xl hover:bg-red-700 transition-colors shadow-lg shadow-red-200">
Thoát ngay
</button>
</div>
</div>
</div>
)}
{isGenerating && gameState.origin && (
<div className="absolute inset-0 bg-white/80 backdrop-blur-sm z-20 flex flex-col items-center justify-center animate-in fade-in">
<div className={`w-10 h-10 border-4 border-${mainColor}-200 border-t-${mainColor}-600 rounded-full animate-spin mb-2`}></div>
<p className={`text-${mainColor}-600 font-bold text-sm animate-pulse`}>{t('aiGenerating')}</p>
</div>
)}
{isPaused && (
<div className="absolute inset-0 z-40 bg-white/60 backdrop-blur-sm flex flex-col items-center justify-center animate-in fade-in">
<div className="bg-white p-6 rounded-2xl shadow-2xl border-2 border-gray-100 flex flex-col items-center gap-4">
<h3 className="text-2xl font-black text-gray-700 tracking-widest uppercase">TẠM DỪNG</h3>
<button onClick={onPause} className={`w-16 h-16 rounded-full bg-${mainColor}-600 text-white flex items-center justify-center shadow-lg hover:scale-110 transition-transform`}><Icons.Play size={32} fill="currentColor" /></button>
</div>
</div>
)}
<div className="w-full bg-white border-b p-3 flex justify-between items-center z-10">
<div className="flex items-center gap-2">
<button onClick={onBack} className="text-gray-500 hover:text-gray-700 flex items-center gap-1 font-bold text-sm"><Icons.ChevronLeft size={18} /> {t('backMenu')}</button>
</div>
<div className="text-center flex flex-col items-center">
<h2 className={`font-bold text-${mainColor}-700`}>{t('modeScramble')}</h2>
{timerMode && (<span className={`text-xs font-mono font-bold ${getTimerColor(timeLeft, timeLimit)} flex items-center gap-1`}><Icons.Clock size={12} /> {timeLeft}s</span>)}
</div>
<button onClick={() => setShowConfirmEnd(true)} className="text-red-500 hover:text-red-700 font-bold text-xs border border-red-200 bg-red-50 px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1"><Icons.X size={14}/> {t('endGame')}</button>
</div>
<div className="flex-1 w-full overflow-y-auto custom-scrollbar p-4 flex flex-col items-center gap-4">
<div className={`w-full flex justify-between items-center transition-all duration-300 ${containerWidthClass}`}>
<div className="flex gap-2 text-xs font-bold items-center">
<span className="text-green-600 bg-green-100 px-2 py-1 rounded flex items-center gap-1"><Icons.CheckCircle size={14} /> {stats.correct}</span>
<span className="text-red-500 bg-red-100 px-2 py-1 rounded flex items-center gap-1"><Icons.X size={14} /> {stats.wrong}</span>
<span className="text-blue-600 bg-blue-50 px-2 py-1 rounded border border-blue-100 flex items-center gap-1">🎯 {accuracy}%</span>
</div>
<div className="flex items-center gap-2">
{/* Nguồn Badge (Source Badge) KÈM QUEUE COUNTER ĐỒNG BỘ */}
{gameState.isAiGenerated ? (
<span className="text-[9px] sm:text-[10px] px-2 py-1 rounded-full font-bold uppercase tracking-wider flex items-center gap-1 bg-indigo-100 text-indigo-700 border border-indigo-200 shadow-sm" title="Câu hỏi được tạo bởi AI">
<Icons.Sparkles size={12} className="animate-pulse text-indigo-500" /> Nguồn: AI
{queueLength !== undefined && (
<span className="bg-indigo-500 text-white px-1 rounded-[4px] font-mono ml-0.5 text-[9px] flex items-center" title={`Đã nạp sẵn ${queueLength} câu`}>{"+" + queueLength}</span>
)}
</span>
) : (
<span className="text-[9px] sm:text-[10px] px-2 py-1 rounded-full font-bold uppercase tracking-wider flex items-center gap-1 bg-slate-100 text-slate-600 border border-slate-200" title="Trích xuất từ Bộ thẻ">
<Icons.Layers size={12} className="text-slate-400" /> Nguồn: Thẻ
{queueLength !== undefined && (
<span className="bg-slate-400 text-white px-1 rounded-[4px] font-mono ml-0.5 text-[9px] flex items-center" title={`Đã nạp sẵn ${queueLength} câu`}>{"+" + queueLength}</span>
)}
</span>
)}
<span className={`text-[10px] px-3 py-1 rounded-full font-bold uppercase tracking-wider ${inputMethod === 'tap' ? 'bg-blue-100 text-blue-700 border border-blue-200' : inputMethod === 'type' ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-purple-100 text-purple-700 border border-purple-200'}`}>
{inputMethod === 'tap' ? '🖱️ Chạm & Ghép' : inputMethod === 'type' ? '⌨️ Gõ phím' : '🎙️ Giọng nói'}
</span>
</div>
</div>
<div className={`w-full bg-white rounded-xl shadow-md p-4 transition-all duration-300 ${containerWidthClass}`}>
<div className={`p-3 bg-${mainColor}-50 border-l-4 border-${mainColor}-400 mb-4 rounded italic text-gray-600 text-center`} style={{ fontSize: settings?.backFontSize ? `${settings.backFontSize}rem` : '0.875rem', fontWeight: settings?.fontWeight || 'normal', fontFamily: 'inherit' }}>"{gameState.origin?.definition}"</div>
{gameState.isCorrect === false && gameState.attempts >= 3 && (
<div className="w-full mb-4 p-4 border-2 border-green-400 bg-green-50 rounded-xl flex flex-col items-center justify-center animate-in zoom-in shadow-sm">
<span className="text-xs font-bold text-green-600 uppercase tracking-wider mb-2 flex items-center gap-1">
<Icons.CheckCircle size={14}/> Đáp án chính xác
</span>
<span className="text-xl md:text-2xl font-bold text-green-900 text-center leading-relaxed" style={{ fontFamily: window.Utils.getFontFamily(settings) }}>
{gameState.origin?.term}
</span>
</div>
)}
{inputMethod === 'tap' && (
<div className="w-full flex flex-col gap-4">
<div className={`min-h-[100px] border-2 border-dashed border-gray-300 rounded-xl p-3 flex flex-wrap items-center gap-2 transition-colors ${gameState.isCorrect===true ? 'bg-green-50 border-green-300' : (gameState.isCorrect===false ? 'bg-red-50 border-red-300' : 'bg-gray-50')}`}>
{gameState.userAnswer.map((chunk, idx) => (
<div key={chunk.id} data-drag-index={idx} draggable onDragStart={(e) => onDragStart(e, idx)} onDragEnter={(e) => onDragEnter(e, idx)} onDragEnd={onDragEnd} onTouchStart={(e) => onTouchStart(e, idx)} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd} onClick={() => !isPaused && setGameState(p => { const st = {...p, userAnswer: p.userAnswer.filter(c=>c.id!==chunk.id), chunks: chunk.isPunct ? p.chunks : [...p.chunks, chunk]}; setTimeout(() => triggerAutoSave(), 150); return st; })}>
{renderChunk(chunk, null)}
</div>
))}
</div>
<div className="flex justify-center items-center gap-2">
<span className="text-xs font-bold text-gray-400 uppercase tracking-wider mr-1">Dấu câu:</span>
{['.', ',', ':', '?','!'].map(punct => (
<button
key={punct}
onClick={() => handleAddPunctuation && handleAddPunctuation(punct)}
disabled={isPaused || gameState.isCorrect !== null}
className="w-10 h-10 flex items-center justify-center rounded-lg bg-gray-100 text-gray-700 font-bold border border-gray-200 hover:bg-gray-200 shadow-sm disabled:opacity-50 transition-colors"
style={{ fontFamily: window.Utils.getFontFamily(settings), fontSize: '1.25rem' }}
>
{punct}
</button>
))}
</div>
<div className="flex flex-wrap justify-center gap-2 min-h-[60px]">
{gameState.chunks.map(chunk => (
<div key={chunk.id} onClick={() => !isPaused && setGameState(p => { const st = {...p, userAnswer: [...p.userAnswer, chunk], chunks: p.chunks.filter(c=>c.id!==chunk.id)}; setTimeout(() => triggerAutoSave(), 150); return st; })}>
{renderChunk(chunk, true)}
</div>
))}
</div>
</div>
)}
{inputMethod === 'type' && (
<div className="w-full flex flex-col items-center gap-4 animate-in slide-in-from-bottom-4">
<input ref={typeInputRef} type="text" autoFocus value={inputBuffer} onChange={(e) => setInputBuffer(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && !isPaused && checkAnswer()} className={`w-full p-6 text-center border-4 rounded-2xl outline-none transition-colors shadow-inner ${gameState.isCorrect === true ? 'bg-green-50 border-green-400 text-green-700' : (gameState.isCorrect === false ? 'bg-red-50 border-red-400 text-red-700' : 'bg-gray-50 border-blue-200 focus:border-blue-500 text-gray-800')}`} placeholder="Gõ lại câu bằng bàn phím..." style={{ fontFamily: window.Utils.getFontFamily(settings), fontWeight: settings?.fontWeight || 'bold', fontSize: settings?.fontSize ? `${settings.fontSize}rem` : '1.875rem' }} disabled={gameState.isCorrect !== null || isPaused} />
<p className="text-xs text-gray-400">Ấn phím <kbd className="bg-gray-100 px-2 py-1 rounded border shadow-sm">Enter</kbd> để kiểm tra</p>
</div>
)}
{inputMethod === 'voice' && (
<div className="w-full flex flex-col items-center gap-6 py-4 animate-in zoom-in">
<div className="flex flex-col items-center w-full">
<button onClick={toggleMic} disabled={isPaused || gameState.isCorrect !== null || (!isListening && voiceRetries >= 3)} className={`w-28 h-28 rounded-full border-4 flex items-center justify-center shadow-lg outline-none transition-all duration-300 ${isListening ? 'bg-red-50 border-red-200 text-red-500 animate-pulse scale-110 shadow-red-200' : (!isListening && voiceRetries >= 3) ? 'bg-gray-100 border-gray-200 text-gray-400 cursor-not-allowed' : 'bg-purple-50 border-purple-200 text-purple-600 hover:bg-purple-100 hover:scale-105 hover:shadow-purple-200'}`}>
{isListening ? <Icons.Square size={48} fill="currentColor" /> : <Icons.Mic size={48} />}
</button>
<p className={`font-bold mt-4 text-center ${isListening ? 'text-red-500 animate-pulse' : 'text-gray-500'}`}>
{isListening ? "Đang lắng nghe (Chạm để Dừng)..." : (voiceRetries >= 3 ? "Đã hết lượt đọc lại!" : (voiceOptions.length > 0 ? "Chạm Mic để đọc lại" : "Nhấn Micro để đọc đáp án"))}
</p>
<p className="text-xs font-bold text-gray-400 mt-1">Lượt thử: {voiceRetries}/3</p>
</div>
{voiceOptions.length > 0 && !isListening && (
<div className="w-full mt-4 space-y-3 animate-in slide-in-from-bottom-4">
<p className="text-sm font-bold text-purple-600 text-center mb-3 flex items-center justify-center gap-2"><Icons.Sparkles size={16} /> AI nhận diện được 3 kết quả:</p>
{voiceOptions.map((opt, idx) => {
const isOptCorrect = window.Utils.advancedNormalize(opt, lang) === window.Utils.advancedNormalize(gameState.origin?.term, lang);
let btnClass = "bg-white border-2 border-gray-200 text-gray-700 hover:border-purple-300 hover:bg-purple-50 hover:-translate-y-1";
if (gameState.isCorrect !== null) {
if (isOptCorrect) { btnClass = "bg-green-100 border-2 border-green-500 text-green-800 font-bold shadow-md scale-105 z-10"; }
else if (voiceSelectedOption === opt) { btnClass = "bg-red-100 border-2 border-red-500 text-red-800 font-bold shadow-md"; }
else { btnClass = "bg-gray-50 border-2 border-gray-100 text-gray-400 opacity-50"; }
}
return (
<button key={idx} onClick={() => handleVoiceChoice(opt)} disabled={gameState.isCorrect !== null} style={{ fontFamily: window.Utils.getFontFamily(settings), fontWeight: settings?.fontWeight || 'bold', fontSize: settings?.fontSize ? `${settings.fontSize}rem` : '1.25rem' }} className={`w-full p-4 rounded-xl transition-all shadow-sm ${btnClass}`}>
{opt}
</button>
);
})}
</div>
)}
</div>
)}
</div>
{gameState.attempts >= 2 && difficulty !== 'hard' && (
<div className={`flex w-full justify-center mt-2 animate-in slide-in-from-top-2 transition-all duration-300 ${containerWidthClass}`}>
<button onClick={() => onPlay(gameState.origin.term)} className="px-6 py-2 flex items-center gap-2 bg-yellow-100 text-yellow-700 rounded-full shadow-sm hover:bg-yellow-200 font-bold transition-transform hover:scale-105" disabled={isPaused}>
<Icons.Volume2 size={20} /> Nghe lại đáp án
</button>
</div>
)}
</div>
{/* Footer Control Panel */}
<div className="w-full p-4 border-t bg-white z-30 flex gap-3 justify-center shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] relative">
{gameState.isCorrect === true || (gameState.isCorrect === false && gameState.attempts >= 3) ? (
<div className="w-full max-w-lg flex gap-2">
<button onClick={handleExplain} disabled={isPaused || isGenerating} className="flex-[1.2] py-3 bg-blue-50 text-blue-700 border border-blue-200 rounded-xl font-bold hover:bg-blue-100 transition-colors flex items-center justify-center gap-1 shadow-sm">
<Icons.BookOpen size={18}/> Giải thích
</button>
<button onClick={() => toggleResultPause && toggleResultPause()} className={`flex-1 py-3 font-bold text-sm rounded-xl border-2 transition-all flex items-center justify-center gap-1 shadow-sm ${isResultPaused ? 'bg-orange-50 text-orange-600 border-orange-200 hover:bg-orange-100 shadow-inner' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}`}>

const dynamicTimeoutMs = Math.max(10000, (textToSpeak ? textToSpeak.length : 0) * 150);
const timeoutPromise = new Promise(resolve => setTimeout(() => resolve('timeout'), dynamicTimeoutMs));
await Promise.all([
Promise.race([speakPromise, timeoutPromise]),
minTimePromise
]);
if (!latestStateRef.current.isAutoPlaying) break;
await wait(settings.delayAfterRead || 1000);
if (!latestStateRef.current.isAutoPlaying) break;
// 3. Lật ra sau

await wait(settings.delayFlip || 2000);

await wait(settings.delayFlip || 2000);

if (!latestStateRef.current.isAutoPlaying) break;

setIsFlipped(false);
await wait(600);

await wait(800);

handleNext();

// ==================================================================================
useEffect(() => {
const runGarbageCollector = () => {
try {
const now = Date.now();
const THREE_DAYS = 3 * 24 * 60 * 60 * 1000;
let hasChanges = false;
let totalSize = 0;
for (let i = 0; i < localStorage.length; i++) {
const key = localStorage.key(i);
totalSize += (localStorage.getItem(key) || '').length;
}
const isEmergency = totalSize > 4 * 1024 * 1024;
const sessionsStr = localStorage.getItem('fc_game_sessions');
if (sessionsStr) {
let sessions = JSON.parse(sessionsStr);
let sessionChanged = false;
if (isEmergency) {
sessions = {};
sessionChanged = true;
} else {
Object.keys(sessions).forEach(langKey => {
const langSessions = sessions[langKey];
Object.keys(langSessions).forEach(gameType => {
const session = langSessions[gameType];
if (now - session.timestamp > THREE_DAYS) {
delete langSessions[gameType];
sessionChanged = true;
}
});
if (Object.keys(langSessions).length === 0) {
delete sessions[langKey];
sessionChanged = true;
}
});
}
if (sessionChanged) {
localStorage.setItem('fc_game_sessions', JSON.stringify(sessions));
hasChanges = true;
}
}
const chatStr = localStorage.getItem('fc_ai_chat_history');
if (chatStr) {
let chatHistory = JSON.parse(chatStr);
if (isEmergency) {
chatHistory = chatHistory.slice(-1);
localStorage.setItem('fc_ai_chat_history', JSON.stringify(chatHistory));
hasChanges = true;
} else if (chatHistory.length > 20) {
chatHistory = chatHistory.slice(-20);
localStorage.setItem('fc_ai_chat_history', JSON.stringify(chatHistory));
hasChanges = true;
}
}
} catch (e) {
console.error("Garbage Collector Failed:", e);
}
};
const gcTimer = setTimeout(() => {

}, 2000);
return () => clearTimeout(gcTimer);
}, []);

const fallbackCopy = (text) => {

textArea.style.position = "fixed";
textArea.style.left = "-9999px";
textArea.style.top = "0";

textArea.focus();
textArea.select();
const successful = document.execCommand('copy');
document.body.removeChild(textArea);

showToast(t('syncSuccess'));
} else {
showToast("Trình duyệt chặn copy. Hãy copy thủ công.", "error");

// ==================================================================================
// Cách 1: Tải qua Proxy (Lấy toàn bộ file Excel)
const safeFetchExcel = async (url) => {
let cleanUrl = url.trim();
const match = cleanUrl.match(/\/d\/([a-zA-Z0-9-_]+)/);
if (!match) throw new Error("Link không hợp lệ. Không tìm thấy ID của Google Sheet.");
const sheetId = match[1];
const exportUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=xlsx`;
const cacheBuster = `&cb=${Date.now()}`;
const proxies = [`https://api.allorigins.win/raw?url=${encodeURIComponent(exportUrl + cacheBuster)}`, `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(exportUrl)}`, `https://corsproxy.io/?${encodeURIComponent(exportUrl)}`, exportUrl];
let lastErr = null;
for (const proxy of proxies) {
try {
const res = await fetch(proxy);
if (!res.ok) throw new Error(`HTTP ${res.status}`);
const buffer = await res.arrayBuffer();
if (buffer.byteLength < 100) throw new Error("File quá nhỏ, lỗi chặn kết nối.");
const header = new Uint8Array(buffer).subarray(0, 2);
if (header[0] !== 0x50 || header[1] !== 0x4B) {
throw new Error("LỖI QUYỀN TRUY CẬP: Hãy chắc chắn Link Google Sheet của bạn đã bật quyền 'Bất kỳ ai có liên kết' (Anyone with the link).");
}
return buffer;
} catch (e) {
lastErr = e;
if (e.message.includes("LỖI QUYỀN TRUY CẬP")) throw e;
}
}
throw new Error("Mạng bị chặn Proxy. Sẽ tự động chuyển sang GViz...");
};
// Cách 2 (Tuyệt chiêu): Quét từng Tab trực tiếp bằng Google GViz (Bỏ qua Proxy)
const fetchDirectGvizTabs = async (sheetId, lang) => {
let allNewItems = [];
let masterDataObj = {};
let total = 0;
const levelPrefix = lang === 'zh' ? 'zh_level_' : (lang === 'vi' ? 'vi_level_' : 'en_level_');
const fetchTab = async (sheetName) => {
const encodedName = encodeURIComponent(sheetName);
const gvizUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodedName}`;
try {
const res = await fetch(gvizUrl);
if (!res.ok) return null;
const text = await res.text();
if (text.trim().startsWith('<')) return null;
return window.Utils.parseAndMapCSV(text);
} catch(e) { return null; }
};
for (let i = 1; i <= 9; i++) {
const possibleNames = [`Level0${i}`, `Level ${i}`, `Level${i}`, `Sheet${i}`];
for (const sheetName of possibleNames) {
const parsedCards = await fetchTab(sheetName);
if (parsedCards && parsedCards.length > 0) {
masterDataObj[`${levelPrefix}${i}`] = parsedCards;
total += parsedCards.length;
allNewItems = allNewItems.concat(parsedCards);
break;
}
}
}
if (total === 0) {
const defaultTabs = ["Trang tính 1", "Sheet 1", "Sheet1", "Data"];
for (const sheetName of defaultTabs) {
const parsedCards = await fetchTab(sheetName);
if (parsedCards && parsedCards.length > 0) {
masterDataObj[`${levelPrefix}1`] = parsedCards;
total += parsedCards.length;
allNewItems = allNewItems.concat(parsedCards);
break;
}
}
if (total === 0) {
const gvizUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;
try {
const res = await fetch(gvizUrl);
if (res.ok) {
const text = await res.text();
if (!text.trim().startsWith('<')) {
const parsedCards = window.Utils.parseAndMapCSV(text);
if (parsedCards && parsedCards.length > 0) {
masterDataObj[`${levelPrefix}1`] = parsedCards;
total += parsedCards.length;
allNewItems = allNewItems.concat(parsedCards);
}
}
}
} catch(e) {}
}
}
return { masterData: masterDataObj, totalCards: total, flatItems: allNewItems };
};

// Nạp câu hỏi vào túi nháp khi làm sai
const addToRetryBag = useCallback((gameType, questionData) => {
if (!gameType || !questionData) return;
core.setGlobalRetryBag(prev => {
const currentBag = prev[gameType] || [];
// Kiểm tra trùng lặp (Dùng term hoặc displaySentence làm khóa nhận diện)
const termToCheck = questionData.term || questionData.origin?.term || questionData.displaySentence || questionData.wrongSentence || questionData.oddWord;
if (!termToCheck) return prev;
const isDup = currentBag.some(item => {
const itemTerm = item.term || item.origin?.term || item.displaySentence || item.wrongSentence || item.oddWord;
// Xử lý đặc thù cho OddOneOut (cần check thêm mảng words)
if (gameType === 'oddoneout' && item.words && questionData.words) {
return itemTerm === termToCheck && item.words.join() === questionData.words.join();
}
return itemTerm === termToCheck;
});
if (isDup) return prev;
// Đẩy dữ liệu mới vào túi của Game tương ứng
return { ...prev, [gameType]: [...currentBag, questionData] };
});
}, [core.setGlobalRetryBag]);
// Rút câu hỏi ra khỏi túi nháp khi đã làm đúng
const removeFromRetryBag = useCallback((gameType, termToRemove, extraData = null) => {
if (!gameType || !termToRemove) return;
core.setGlobalRetryBag(prev => {
const currentBag = prev[gameType] || [];
const newBag = currentBag.filter(item => {
const itemTerm = item.term || item.origin?.term || item.displaySentence || item.wrongSentence || item.oddWord;
// Xử lý đặc thù cho OddOneOut
if (gameType === 'oddoneout' && extraData && item.words) {
if (itemTerm === termToRemove && item.words.join() === extraData.join()) {
return false; // Loại bỏ (Match cả oddWord và words)
}
return true; // Giữ lại
}
return itemTerm !== termToRemove;
});
if (newBag.length === currentBag.length) return prev; // Không có gì thay đổi
