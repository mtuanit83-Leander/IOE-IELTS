);
};
// 2. GAME VIEW (Controller chính - Clean Router)
const GameView = ({ t, mainColor, isAiMode, setAiMode, onMissingKey, isLoading, cards, lang, onPlay, onBookmark, notebook, showToast, onLogWrong, setIsGamePlaying, gameSessions, setGameSessions, settings }) => {
// Chỉ giữ lại State quản lý luồng màn hình (Menu -> Playing -> Result)
const [gameState, setGameState] = React.useState('menu');
const [gameType, setGameType] = React.useState(null);
const [gameConfig, setGameConfig] = React.useState({}); // Lưu cấu hình game (Timer, HardMode...)
const [gameSessionId, setGameSessionId] = React.useState(Date.now());
// State cho màn hình kết quả
const [finalStats, setFinalStats] = React.useState({ score: 0, wrong: 0, total: 0 });
// Refs quản lý ID & Trạng thái để chống Race Condition
const activeSessionIdRef = React.useRef(null);
const gameTypeRef = React.useRef(null);
// [SAFE LOAD] Load các Component Game Con
const SafeMatchGame = window.Block5_1_MatchGame || window.MatchGame || (() => <div className="text-red-500 p-4">Lỗi: MatchGame chưa tải</div>);
const SafeScrambleGame = window.Block5_3_ScrambleGame || window.ScrambleGame || (() => <div className="text-red-500 p-4">Lỗi: ScrambleGame chưa tải</div>);
const SafeQuizGame = window.Block5_6_QuizGame || window.QuizGame || (() => <div className="text-red-500 p-4">Lỗi: QuizGame chưa tải</div>);
const SafeGameResult = window.Block5_5_GameResult || window.GameResult || (() => <div className="text-red-500">Lỗi: GameResult chưa tải</div>);
const SafeQuizSetup = window.Block5_5_QuizSetup || window.QuizSetup || (() => <div className="text-red-500">Lỗi: QuizSetup chưa tải</div>);
const SafeScrambleSetup = window.Block5_3_ScrambleSetup || window.ScrambleSetup || (() => <div className="text-red-500">Lỗi: ScrambleSetup chưa tải</div>);
const SafeMatchSetup = window.Block5_1_MatchSetup || window.MatchSetup || (() => <div className="text-red-500">Lỗi: MatchSetup chưa tải</div>);
const SafeFillBlankGame = window.Block5_8_FillBlankGame || window.FillBlankGame || (() => <div className="text-red-500 p-4">Lỗi: FillBlankGame chưa tải</div>);
const SafeSpotMistakeGame = window.Block5_10_SpotMistakeGame || window.SpotMistakeGame || (() => <div className="text-red-500 p-4">Lỗi: SpotMistakeGame chưa tải</div>);
// [HOTFIX v1.4] Sửa lỗi Toast đen cho Game Điền từ (Chuẩn hóa tham số thành Object cho hàm setToast của React)
React.useEffect(() => {
const originalToast = window.globalShowToast;
window.globalShowToast = (msg, type = 'success') => {
if (typeof msg === 'object' && msg !== null) {
showToast({ text: msg.text || msg.message || '', type: msg.type || type, id: Date.now() });
} else {
showToast({ text: String(msg), type: type, id: Date.now() });
}
};
return () => {
window.globalShowToast = originalToast;
};
}, [showToast]);
// Sync state to ref
React.useEffect(() => {
if(gameType) gameTypeRef.current = gameType;
}, [gameType]);
// Báo hiệu trạng thái chơi cho App (để ẩn BottomNav)
React.useEffect(() => {
if (setIsGamePlaying) setIsGamePlaying(gameState === 'playing');
return () => { if (setIsGamePlaying) setIsGamePlaying(false); };
}, [gameState, setIsGamePlaying]);
// Cleanup Effect khi thoát hẳn màn hình (Hủy ID Session)
React.useEffect(() => {
if (gameState !== 'playing') {
activeSessionIdRef.current = null;
}
}, [gameState]);
// --- NAVIGATION HANDLERS ---
const handleSelectQuiz = () => setGameState('quiz_setup');
const handleStartMatch = (aiMode = false) => setGameState('match_setup');
const handleStartScramble = () => setGameState('scramble_setup');
// Hàm bắt đầu Game Điền Từ (Vào thẳng không qua setup)
const handleStartFillBlank = () => {
handleStartGame('fillblank', {});
};
// Hàm bắt đầu Game Tìm Lỗi Sai (Vào thẳng, tự bật AI nếu có Key)
const handleStartSpotMistake = () => {
const hasKey = !!localStorage.getItem(window.STORAGE_KEYS.API_KEY);
handleStartGame('spotmistake', { isAiMode: hasKey });
};
// Hàm khởi động chung cho mọi Game
const handleStartGame = async (type, config = {}) => {
if (!cards || cards.length < 2) {
const msg = t('needMoreCards', { n: 2 }) || 'Cần ít nhất 2 thẻ để chơi';
showToast ? showToast({ text: msg, type: 'error', id: Date.now() }) : alert(msg);
return;
}
if (config.isAiMode && !localStorage.getItem(window.STORAGE_KEYS.API_KEY)) {
onMissingKey();
return;
}
// 1. Cấp ID phiên chơi mới
activeSessionIdRef.current = `sess_${Date.now()}`;
setGameType(type);
gameTypeRef.current = type;
setGameConfig(config);
// 2. Xóa session cũ nếu có (Chơi mới)
if(setGameSessions) {
setGameSessions(prev => {
const next = { ...prev };
if (next[type]) delete next[type];
return next;
});
}
// 3. Chuyển màn hình
setGameSessionId(Date.now());
setGameState('playing');
};
// Hàm nhận dữ liệu từ Game con gửi lên khi tạm dừng (Back)
const handleBack = (childData = null) => {
// Security Check: Nếu phiên chơi đã kết thúc/không hợp lệ -> Không lưu
if (!activeSessionIdRef.current) {
setGameState('menu');
return;
}
if (gameState === 'playing') {
if(setGameSessions) {
const currentType = gameType || gameTypeRef.current;
if (currentType) {
const currentSessionData = {
type: currentType,
timestamp: Date.now(),
config: gameConfig,
...childData
};
setGameSessions(prev => ({ ...prev, [currentType]: currentSessionData }));
}
}
}
setGameState('menu');
};
// Hàm lưu ngầm (Auto-save) từ Game con, không thoát ra Menu
const handleAutoSave = (childData) => {
if (!activeSessionIdRef.current || gameState !== 'playing') return;
if (setGameSessions) {
const currentType = gameType || gameTypeRef.current;
if (currentType) {
const currentSessionData = {
type: currentType,
timestamp: Date.now(),
config: gameConfig,
...childData
};
setGameSessions(prev => ({ ...prev, [currentType]: currentSessionData }));
}
}
};
// Hàm khôi phục Game từ Session
const handleResumeSession = (type) => {
const session = gameSessions?.[type];
if (!session) return;
activeSessionIdRef.current = `sess_${Date.now()}`;
setGameType(session.type);
gameTypeRef.current = session.type;
setGameConfig(session.config || {});
setGameSessionId(Date.now()); // Force Remount
setGameState('playing');
};
// Hàm kết thúc Game
const handleEndGame = (stats = { correct: 0, wrong: 0 }) => {
activeSessionIdRef.current = null; // [LOCK] Chặn lưu dữ liệu ngay lập tức
if (window.speechSynthesis) window.speechSynthesis.cancel();
setFinalStats({
score: stats.correct || 0,
wrong: stats.wrong || 0,
total: (stats.correct || 0) + (stats.wrong || 0)
});
// Xóa Session
const typeToDelete = gameType || gameTypeRef.current;
if(setGameSessions && typeToDelete) {
setGameSessions(prev => {
const next = { ...prev };
if (next[typeToDelete]) delete next[typeToDelete];
return next;
});
}
setGameType(null);
gameTypeRef.current = null;
setGameState('result');
};
return (
<div className="relative w-full h-full flex-1 flex flex-col">
{/* 1. MENU CHỌN GAME */}
{gameState === 'menu' && (
<div className="w-full h-full bg-white flex flex-col items-center justify-center p-6 overflow-hidden z-50">
<div className={`absolute top-[-50px] right-[-50px] w-32 h-32 bg-${mainColor}-100 rounded-full opacity-50`}></div>
<div className={`absolute bottom-[-20px] left-[-20px] w-24 h-24 bg-${mainColor}-100 rounded-full opacity-50`}></div>
<GameMenu
t={t}
mainColor={mainColor}
onSelectQuiz={handleSelectQuiz}
onStartMatch={handleStartMatch}
onStartScramble={handleStartScramble}
onStartFillBlank={handleStartFillBlank}
onStartSpotMistake={handleStartSpotMistake}
onResume={handleResumeSession}
gameSessions={gameSessions}
/>
</div>
)}
{/* 2. CẤU HÌNH QUIZ */}
{gameState === 'quiz_setup' && (
<div className="w-full h-full bg-white flex flex-col items-center justify-center p-6 overflow-hidden z-50">
{SafeQuizSetup && <SafeQuizSetup
t={t}
mainColor={mainColor}
onStart={(type, timerMode, listenMode, aiMode, timeLimit, hardMode) =>
handleStartGame('quiz', { timerMode, listenMode, isAiMode: aiMode, timeLimit, hardMode })
}
onBack={() => setGameState('menu')}
/>}
</div>
)}
{/* 3. CẤU HÌNH SCRAMBLE */}
{gameState === 'scramble_setup' && (
<div className="w-full h-full bg-white flex flex-col items-center justify-center p-6 overflow-hidden z-50">
{SafeScrambleSetup && <SafeScrambleSetup
t={t}
mainColor={mainColor}
onStart={(type, config) => handleStartGame('scramble', { ...config, lang: lang })}
onBack={() => setGameState('menu')}
/>}
</div>
)}
{/* 4. CẤU HÌNH MATCH */}
{gameState === 'match_setup' && (
<div className="w-full h-full bg-white flex flex-col items-center justify-center p-6 overflow-hidden z-50">
{SafeMatchSetup && <SafeMatchSetup
t={t}
mainColor={mainColor}
onStart={(type, config) => handleStartGame('match', config)}
onBack={() => setGameState('menu')}
/>}
</div>
)}
{/* 5. MÀN HÌNH KẾT QUẢ */}
{gameState === 'result' && (
<div className="w-full h-full bg-white flex flex-col items-center justify-center p-6 overflow-hidden z-50">
<div className="w-full h-full bg-white rounded-2xl shadow-xl flex flex-col items-center justify-center p-6 border-2 border-gray-100 animate-in relative overflow-hidden">
<div className={`absolute top-[-50px] right-[-50px] w-32 h-32 bg-${mainColor}-100 rounded-full opacity-50`}></div>
<div className={`absolute bottom-[-20px] left-[-20px] w-24 h-24 bg-${mainColor}-100 rounded-full opacity-50`}></div>
{SafeGameResult && <SafeGameResult
t={t}
mainColor={mainColor}
score={finalStats.score}
sessionTotal={finalStats.total}
correctCount={finalStats.score}
wrongCount={finalStats.wrong}
onBack={() => setGameState('menu')}
/>}
</div>
</div>
)}
{/* 6. MÀN HÌNH CHƠI GAME (PLAYING) */}
{gameState === 'playing' && (
<div className="block w-full h-full">
{gameType === 'match' && SafeMatchGame &&
<SafeMatchGame
key={gameSessionId}
cards={cards}
t={t}
mainColor={mainColor}
isAiMode={gameConfig.isAiMode}
timerMode={gameConfig.timerMode}
timeLimit={gameConfig.timeLimit}
initialDifficulty={gameConfig.hardMode ? 'hard' : 'easy'}
lang={lang}
onBookmark={onBookmark}
notebook={notebook}
onLogWrong={onLogWrong}
onBack={handleBack}
onEndGame={handleEndGame}
onAutoSave={handleAutoSave}
savedState={gameSessions?.['match']}
settings={settings}
/>
}
{gameType === 'scramble' && SafeScrambleGame &&
<SafeScrambleGame
key={gameSessionId}
cards={cards}
t={t}
mainColor={mainColor}
lang={lang}
apiKey={localStorage.getItem(window.STORAGE_KEYS.API_KEY)}
onPlay={onPlay}
onBookmark={onBookmark}
notebook={notebook}
showToast={showToast}
onLogWrong={onLogWrong}
timerMode={gameConfig.timerMode}
timeLimit={gameConfig.timeLimit}
initialDifficulty={gameConfig.hardMode ? 'hard' : 'easy'}
onBack={handleBack}
onEndGame={handleEndGame}
onAutoSave={handleAutoSave}
savedState={gameSessions?.['scramble']}
settings={settings}
/>
}
{gameType === 'quiz' && SafeQuizGame &&
<SafeQuizGame
key={gameSessionId}
cards={cards}
t={t}
mainColor={mainColor}
lang={lang}
timerMode={gameConfig.timerMode}
listenMode={gameConfig.listenMode}
isAiMode={gameConfig.isAiMode}
timeLimit={gameConfig.timeLimit}
hardMode={gameConfig.hardMode}
onPlay={onPlay}
onBookmark={onBookmark}
notebook={notebook}
showToast={showToast}
onLogWrong={onLogWrong}
onMissingKey={onMissingKey}
isLoading={isLoading}
AiModeSwitch={window.AiModeSwitch}
onBack={handleBack}
onEndGame={handleEndGame}
onAutoSave={handleAutoSave}
savedState={gameSessions?.['quiz']}
settings={settings}
/>
}
{gameType === 'fillblank' && SafeFillBlankGame &&
<SafeFillBlankGame
key={gameSessionId}
cards={cards}
mainColor={mainColor}
onFinish={(score, time) => handleEndGame({ correct: score, wrong: 0 })}
onQuit={() => handleBack(null)}
/>
}
{gameType === 'spotmistake' && SafeSpotMistakeGame &&
<SafeSpotMistakeGame
key={gameSessionId}
cards={cards}
t={t}
mainColor={mainColor}
lang={lang}
isAiMode={gameConfig.isAiMode}
apiKey={localStorage.getItem(window.STORAGE_KEYS.API_KEY)}
onFinish={(score, time) => handleEndGame({ correct: score, wrong: 0 })}
onQuit={() => handleBack(null)}
/>
}
</div>
)}
</div>
);
};
// EXPORT TO WINDOW
window.Block5_7_GameMenu = GameMenu;
window.GameMenu = GameMenu;
window.Block5_7_GameView = GameView;
window.GameView = GameView;
// Block5.8: TẦNG 5: TRÒ CHƠI HÓA (FillBlank UI) - Version 1.0 (NEW)
// Last Updated: 2026-03-31 14:25
// Nhiệm vụ: Hiển thị giao diện cho trò chơi Điền Từ (Fill-in-the-Blank).
// Quy tắc: Chỉ đảm nhiệm việc render HTML/CSS. Mọi logic đục lỗ, chấm điểm được lấy từ Hook `window.useFillBlankLogic` (Block 5.9).
// ==================================================================================
const FillBlankGame = ({ cards, onFinish, onQuit, mainColor }) => {
// --- Gọi Logic Hook từ Block 5.9 ---
const fillBlankLogic = window.Block5_9_useFillBlankLogic || window.useFillBlankLogic;
const {
gameCards,
currentIndex,
currentQuestion,
inputBuffer,
setInputBuffer,
checkStatus,
attempts,
time,
score,
combo,
isFinished,
checkAnswer,
handleNext,
handleSkip
} = fillBlankLogic(cards, onFinish);
const Icons = window.Icons;
const Icon = (Name, props) => Icons[Name] ? React.createElement(Icons[Name], props) : null;
// Auto-focus ô nhập liệu
const inputRef = React.useRef(null);
React.useEffect(() => {
// Chỉ focus nếu đang ở trạng thái gõ được
if (checkStatus === 'idle' || checkStatus === 'wrong_retry') {
setTimeout(() => inputRef.current?.focus(), 100);
}
}, [currentIndex, checkStatus]);
// Xử lý phím tắt (Enter)
const handleKeyDown = (e) => {
if (e.key === 'Enter') {
if (checkStatus === 'idle' || checkStatus === 'wrong_retry') {
checkAnswer();
} else if (checkStatus === 'correct' || checkStatus === 'wrong') {
handleNext();
}
}
};
// Lỗi không đủ thẻ
if (!gameCards || gameCards.length === 0) {
return (
<div className="w-full h-full flex flex-col items-center justify-center p-6 bg-gray-50 text-center">
<div className="w-20 h-20 bg-gray-200 text-gray-500 rounded-full flex items-center justify-center mb-4">
{Icon('AlertCircle', { size: 40 })}
</div>
<h2 className="text-xl font-bold text-gray-700 mb-2">Lỗi dữ liệu</h2>
<p className="text-gray-500 mb-6">Không thể khởi tạo Game Điền Từ.</p>
<button onClick={onQuit} className="px-6 py-3 bg-gray-800 text-white font-bold rounded-xl hover:bg-gray-900 transition-colors">
Quay lại
</button>
</div>
);
}
// Màn hình kết thúc game
if (isFinished) {
return (
<div className="w-full h-full flex flex-col items-center justify-center p-6 bg-gray-50 rounded-2xl animate-in fade-in zoom-in duration-300">
<div className="w-24 h-24 bg-blue-100 text-blue-500 rounded-full flex items-center justify-center mb-6 shadow-inner">
{Icon('Sparkles', { size: 48 })}
</div>
<h2 className={`text-3xl font-bold text-${mainColor}-700 mb-2`}>Hoàn thành!</h2>
<p className="text-gray-500 mb-8 text-lg">Bạn đã điền xong các từ vựng.</p>
<div className="grid grid-cols-2 gap-4 w-full max-w-xs mb-8">
<div className="bg-white p-4 rounded-xl border border-gray-100 shadow-sm text-center">
<div className="text-xs text-gray-400 font-bold uppercase mb-1">Thời gian</div>
<div className={`text-2xl font-bold text-${mainColor}-600`}>{time}s</div>
</div>
<div className="bg-white p-4 rounded-xl border border-gray-100 shadow-sm text-center">
<div className="text-xs text-gray-400 font-bold uppercase mb-1">Điểm số</div>
<div className="text-2xl font-bold text-orange-500">{score}</div>
</div>
</div>
<button
onClick={() => onFinish(score, time)}
className={`w-full max-w-xs py-4 rounded-xl bg-${mainColor}-600 text-white font-bold text-lg hover:bg-${mainColor}-700 shadow-lg shadow-${mainColor}-200 transition-all active:scale-95 flex items-center justify-center gap-2`}
>
{Icon('CheckCircle', { size: 24 })} Kết thúc
</button>
</div>
);
}
if (!currentQuestion) return null;
// Xác định màu sắc của ô Input dựa trên trạng thái
let inputColors = "bg-white border-gray-300 text-gray-800 focus:border-blue-500 focus:ring-4 focus:ring-blue-100";
if (checkStatus === 'correct') {
inputColors = "bg-green-50 border-green-500 text-green-700 shadow-lg shadow-green-100";
} else if (checkStatus === 'wrong_retry') {
inputColors = "bg-orange-50 border-orange-500 text-orange-700 animate-[shake_0.4s_ease-in-out]";
} else if (checkStatus === 'wrong') {
inputColors = "bg-red-50 border-red-500 text-red-700 shadow-lg shadow-red-100";
}
// CSS Inline cho animation shake
const shakeKeyframes = `
@keyframes shake {
0%, 100% { transform: translateX(0); }
20%, 60% { transform: translateX(-5px); }
40%, 80% { transform: translateX(5px); }
}
`;
return (
<div className="w-full flex flex-col h-full bg-gray-50 relative overflow-hidden">
<style>{shakeKeyframes}</style>
{/* Thanh Trạng thái */}
<div className="flex justify-between items-center p-4 bg-white border-b border-gray-200 shrink-0 shadow-sm z-10">
<button onClick={onQuit} className="p-2 text-gray-400 hover:bg-red-50 hover:text-red-500 rounded-lg transition-colors" title="Thoát game">
{Icon('X', { size: 24 })}
</button>
<div className="flex items-center gap-4">
<div className="text-sm font-bold text-gray-500 bg-gray-100 px-3 py-1 rounded-full shadow-inner">
{currentIndex + 1} / {gameCards.length}
</div>
<div className={`flex items-center gap-1 font-bold ${combo > 1 ? 'text-orange-500 scale-110' : 'text-gray-400'} transition-all`}>
{Icon('Sparkles', { size: 18 })} x{combo}
</div>
<div className={`text-xl font-mono font-bold ${time > 60 ? 'text-red-500 animate-pulse' : `text-${mainColor}-600`} w-12 text-right`}>
{time}s
</div>
</div>
</div>
{/* Nội dung Game */}
<div className="flex-1 overflow-y-auto p-4 md:p-8 flex flex-col items-center justify-center gap-6 custom-scrollbar relative">
{/* Khu vực Gợi ý (Nghĩa / Dịch) */}
<div className="w-full max-w-3xl bg-white p-6 rounded-2xl shadow-sm border border-gray-100 text-center animate-in slide-in-from-top-4">
<div className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 flex items-center justify-center gap-2">
<span className="w-8 h-px bg-gray-300"></span>
{currentQuestion.type === 'word' ? 'Nghĩa của từ' : 'Ý nghĩa của câu'}
<span className="w-8 h-px bg-gray-300"></span>
</div>
<div className="text-lg md:text-xl font-medium text-gray-700 leading-relaxed">
{currentQuestion.hint}
</div>
</div>
{/* Câu hỏi đục lỗ (Chỉ hiện khi là câu văn) */}
{currentQuestion.type === 'sentence' && (
<div className="w-full max-w-3xl text-center px-4 animate-in fade-in">
<p className="text-2xl md:text-3xl font-bold text-gray-800 leading-relaxed">
{currentQuestion.displaySentence}
</p>
</div>
)}
{/* Khu vực Nhập liệu (Input) */}
<div className="w-full max-w-lg mt-4 relative">
<input
ref={inputRef}
type="text"
value={inputBuffer}
onChange={(e) => setInputBuffer(e.target.value)}
onKeyDown={handleKeyDown}
disabled={checkStatus === 'correct' || checkStatus === 'wrong'}
placeholder="Gõ từ còn thiếu vào đây..."
autoComplete="off"
autoCorrect="off"
autoCapitalize="none"
spellCheck="false"
className={`w-full p-5 md:p-6 text-center text-2xl md:text-3xl font-bold border-4 rounded-2xl outline-none transition-all duration-200 ${inputColors}`}
/>
{/* Hiển thị lỗi / Số lượt thử */}
{checkStatus === 'wrong_retry' && (
<div className="absolute -bottom-8 left-0 right-0 text-center text-orange-500 font-bold text-sm animate-in slide-in-from-top-1">
Sai rồi! Bạn còn {3 - attempts} lượt thử.
</div>
)}
</div>
{/* Hiển thị đáp án đúng nếu đã sai quá 3 lần */}
{checkStatus === 'wrong' && (
<div className="w-full max-w-lg mt-2 p-4 border-2 border-green-400 bg-green-50 rounded-xl flex flex-col items-center justify-center animate-in zoom-in shadow-sm">
<span className="text-xs font-bold text-green-600 uppercase tracking-wider mb-2 flex items-center gap-1">
<Icons.CheckCircle size={14}/> Đáp án chính xác là
</span>
<span className="text-2xl font-bold text-green-900 tracking-wider">
{currentQuestion.targetWord}
</span>
</div>
)}

// Block5.9: TẦNG 5: TRÒ CHƠI HÓA (FillBlank Logic) - Version 1.1
// Last Updated: 2026-03-31 15:10
// Nhiệm vụ: Động cơ xử lý State, Thuật toán "Đục lỗ" (Cloze Test), chấm điểm và tự động chuyển câu (Auto-next) cho Game Điền Từ.
// ==================================================================================
const useFillBlankLogic = (cards, onFinish) => {
const [gameCards, setGameCards] = React.useState([]);
const [currentIndex, setCurrentIndex] = React.useState(0);
const [currentQuestion, setCurrentQuestion] = React.useState(null);
const [inputBuffer, setInputBuffer] = React.useState("");
const [checkStatus, setCheckStatus] = React.useState('idle'); // 'idle', 'correct', 'wrong', 'wrong_retry'
const [attempts, setAttempts] = React.useState(0);
const [time, setTime] = React.useState(0);
const [score, setScore] = React.useState(0);
const [combo, setCombo] = React.useState(1);
const [isFinished, setIsFinished] = React.useState(false);
const timerRef = React.useRef(null);
const autoNextRef = React.useRef(null); // [NEW] Ref quản lý thời gian chờ chuyển câu tự động
// --- THUẬT TOÁN SMART CLOZE (ĐỤC LỖ) ---
const generateClozeTest = (card) => {
const term = card.term;
const isSentence = window.Utils && window.Utils.detectSentence ? window.Utils.detectSentence(term) : term.includes(' ');
if (!isSentence) {
// Chế độ đánh vần từ đơn (Spelling Mode)
return {
origin: card,
type: 'word',
targetWord: term,
displaySentence: '[__________]',
hint: card.definition // Hiển thị nghĩa để gợi ý
};
}
// Chế độ điền khuyết câu văn (Cloze Mode)
// Tập hợp các từ dừng (Stop words) không nên đục lỗ
const stopWords = ['a', 'an', 'the', 'in', 'on', 'at', 'to', 'for', 'of', 'with', 'by', 'and', 'or', 'but', 'is', 'am', 'are', 'was', 'were', 'be', 'been', 'being', 'it', 'this', 'that', 'he', 'she', 'they', 'we', 'you', 'i', 'my', 'his', 'her', 'their', 'our', 'your', 'has', 'have', 'had', 'do', 'does', 'did', 'can', 'could', 'will', 'would', 'should', 'may', 'might', 'must'];
// Tách từ (giữ nguyên dấu câu) để phân tích
const words = term.split(/[\s]+/).filter(w => w.trim().length > 0);
// Tìm các ứng viên tiềm năng (loại bỏ stop words và từ có chứa ký tự đặc biệt liền kề khó xử lý)
let candidates = words.filter(w => {
const cleanWord = w.toLowerCase().replace(/[^a-z0-9]/g, '');
return cleanWord.length > 2 && !stopWords.includes(cleanWord);
});
if (candidates.length === 0) {
candidates = words.filter(w => w.length > 0); // Fallback: Lấy tất cả nếu toàn từ ngắn
}
// Ưu tiên chọn từ dài nhất làm Target Word (Thường là từ khóa học thuật/IELTS)
candidates.sort((a, b) => b.length - a.length);
let rawTarget = candidates[0];
// Loại bỏ dấu câu dính liền ở Target Word (VD: "environment." -> "environment")
const cleanTarget = rawTarget.replace(/^[^\w\s]+|[^\w\s]+$/g, '');
// Dùng Regex tạo câu đục lỗ một cách an toàn
const regex = new RegExp(`\\b${cleanTarget}\\b`, 'i');
const displaySentence = term.replace(regex, '[__________]');
return {
origin: card,
type: 'sentence',
targetWord: cleanTarget,
displaySentence: displaySentence,
hint: card.definition
};
};
// 1. Khởi tạo Game và Cleanup Timers
React.useEffect(() => {
if (!cards || cards.length === 0) return;
// Xáo trộn 10 thẻ ngẫu nhiên
const shuffledCards = window.Utils ? window.Utils.shuffleArray([...cards]).slice(0, 10) : cards.slice(0, 10);
setGameCards(shuffledCards);
setCurrentIndex(0);
setIsFinished(false);
setScore(0);
setCombo(1);
setTime(0);
timerRef.current = setInterval(() => {
setTime(prev => prev + 1);
}, 1000);
return () => {
if (timerRef.current) clearInterval(timerRef.current);
if (autoNextRef.current) clearTimeout(autoNextRef.current);
};
}, [cards]);
// 2. Load Câu hỏi hiện tại
React.useEffect(() => {
if (gameCards.length > 0 && currentIndex < gameCards.length) {
const card = gameCards[currentIndex];
const clozeData = generateClozeTest(card);
setCurrentQuestion(clozeData);
setInputBuffer("");
setCheckStatus('idle');
setAttempts(0);
} else if (gameCards.length > 0 && currentIndex >= gameCards.length) {
if (timerRef.current) clearInterval(timerRef.current);
setIsFinished(true);
}
}, [currentIndex, gameCards]);
// 4. Hàm Chuyển câu (Clear timeout nếu người dùng tự bấm)
const handleNext = () => {
if (autoNextRef.current) clearTimeout(autoNextRef.current);
setCurrentIndex(prev => prev + 1);
};
// 3. Logic Chấm điểm (Fuzzy Matching & Auto Next)
const checkAnswer = () => {
if (!currentQuestion || checkStatus !== 'idle') return;
if (inputBuffer.trim() === "") return;
// Chuẩn hóa cả Target và Input: Đưa về chữ thường, bỏ dấu câu thừa, bỏ khoảng trắng thừa
const normalize = (str) => {
let s = str.toLowerCase();
// Nếu có hàm nâng cao thì dùng, không thì tự replace
if (window.Utils && window.Utils.advancedNormalize) {
s = window.Utils.advancedNormalize(s, 'en'); // Mặc định xử lý kiểu tiếng Anh cho bài điền từ
} else {
s = s.replace(/[^a-z0-9]/g, '');
}
return s.trim();
};
const targetClean = normalize(currentQuestion.targetWord);
const inputClean = normalize(inputBuffer);
if (targetClean === inputClean) {
// ĐÚNG
setCheckStatus('correct');
setScore(prev => prev + (15 * combo));
setCombo(prev => prev + 1);
if (window.globalShowToast) window.globalShowToast("Chính xác!", "success");
// [NEW] Tự động chuyển câu sau 2 giây
if (autoNextRef.current) clearTimeout(autoNextRef.current);
autoNextRef.current = setTimeout(() => {
handleNext();
}, 2000);
} else {
// SAI
const newAttempts = attempts + 1;
setAttempts(newAttempts);
setCombo(1); // Mất combo
setScore(prev => Math.max(0, prev - 5));
if (newAttempts >= 3) {
setCheckStatus('wrong'); // Chốt kết quả sai
if (window.globalShowToast) window.globalShowToast("Đã hết lượt! Xem đáp án nhé.", "error");
// [NEW] Tự động chuyển câu sau 2 giây
if (autoNextRef.current) clearTimeout(autoNextRef.current);
autoNextRef.current = setTimeout(() => {
handleNext();
}, 2000);
} else {
// Sai nhưng còn lượt -> Báo lỗi tạm thời
setCheckStatus('wrong_retry');
if (window.globalShowToast) window.globalShowToast("Chưa đúng, hãy thử lại!", "warning");
setTimeout(() => {
// Tránh ghi đè nếu người dùng gõ quá nhanh
setCheckStatus(prev => prev === 'wrong_retry' ? 'idle' : prev);
}, 1000);
}
}
};
const handleSkip = () => {
if (checkStatus === 'idle' || checkStatus === 'wrong_retry') {
setCombo(1);
setAttempts(3);
setCheckStatus('wrong');
if (window.globalShowToast) window.globalShowToast("Đã bỏ qua!", "error");
// [NEW] Tự động chuyển câu sau 2 giây khi bấm bỏ qua
if (autoNextRef.current) clearTimeout(autoNextRef.current);
autoNextRef.current = setTimeout(() => {
handleNext();
}, 2000);
}
};
return {
gameCards,
currentIndex,
currentQuestion,
inputBuffer,
setInputBuffer,
checkStatus,
attempts,
time,
score,
combo,
isFinished,
checkAnswer,
handleNext,
handleSkip
};
};

// --- 3. ĐỘNG CƠ TẠO LỖI (MISTAKE GENERATOR) ---
const generateOfflineMistake = (card) => {
const term = card.term;
let wrongSentence = term;
let wrongWord = "";
let correction = "";
let explanation = "Lỗi ngữ pháp/từ vựng cơ bản (Hệ thống tự tạo).";
// Tập luật thay thế cơ bản (Offline Rules)
const replacements = [
{ regex: /\bis\b/i, wrong: "are", correct: "is" },
{ regex: /\bare\b/i, wrong: "is", correct: "are" },
{ regex: /\bhas\b/i, wrong: "have", correct: "has" },
{ regex: /\bhave\b/i, wrong: "has", correct: "have" },
{ regex: /\bin\b/i, wrong: "on", correct: "in" },
{ regex: /\bon\b/i, wrong: "in", correct: "on" },
{ regex: /\bat\b/i, wrong: "in", correct: "at" },
{ regex: /\bwas\b/i, wrong: "were", correct: "was" },
{ regex: /\bwere\b/i, wrong: "was", correct: "were" },
{ regex: /\bdoes\b/i, wrong: "do", correct: "does" },
{ regex: /\bdo\b/i, wrong: "does", correct: "do" },
{ regex: /\bcan\b/i, wrong: "can to", correct: "can" }
];
let matched = false;
for (const rule of replacements) {
const match = term.match(rule.regex);
if (match) {
const originalWord = match[0];
// [FIX 2] Kiểm tra xem từ gốc có viết hoa chữ cái đầu không
const isCap = /^[A-Z]/.test(originalWord);
let finalWrong = rule.wrong;
let finalCorrect = rule.correct;
// Phục hồi trạng thái viết hoa cho từ lỗi
if (isCap) {
finalWrong = finalWrong.charAt(0).toUpperCase() + finalWrong.slice(1);
finalCorrect = finalCorrect.charAt(0).toUpperCase() + finalCorrect.slice(1);
}
wrongSentence = term.replace(rule.regex, finalWrong);
wrongWord = finalWrong;
correction = finalCorrect;
matched = true;
break;
}
}
// Nếu không khớp luật nào, chọn ngẫu nhiên 1 từ dài > 3 ký tự và thêm 's'
if (!matched) {
const words = term.split(' ');
const validIndices = words.map((w, i) => w.replace(/[^\w]/g, '').length > 3 ? i : -1).filter(i => i !== -1);
if (validIndices.length > 0) {
const targetIdx = validIndices[Math.floor(Math.random() * validIndices.length)];
correction = words[targetIdx].replace(/[.,?!;:]/g, ''); // Bỏ dấu câu
const isCap = /^[A-Z]/.test(correction);
wrongWord = correction + "s";
if (isCap) {
wrongWord = wrongWord.charAt(0).toUpperCase() + wrongWord.slice(1);
}
words[targetIdx] = words[targetIdx].replace(correction, wrongWord);
wrongSentence = words.join(' ');
} else {
wrongWord = term + "s";
correction = term;
wrongSentence = wrongWord;
}
}
return { wrongSentence, wrongWord, correction, explanation, origin: card, isAiGenerated: false };
};
const fetchMistakeData = async (idx) => {
const card = cards[idx];
if (!card) return null;
if (questionCache.current.has(card.term)) return questionCache.current.get(card.term);
if (pendingFetchesRef.current.has(card.term)) return pendingFetchesRef.current.get(card.term);
const fetchTask = (async () => {
const isSentence = window.Utils && window.Utils.detectSentence ? window.Utils.detectSentence(card.term) : card.term.includes(' ');
if (isAiMode && apiKey && isSentence && window.Utils && window.Utils.callGeminiApi) {
try {
const prompt = `Bạn là giám khảo IELTS. Dựa vào câu đúng sau: "${card.term}".
Hãy tạo ra một phiên bản SAI ngữ pháp, SAI giới từ hoặc SAI dạng từ của câu này (chỉ làm sai đúng 1 từ duy nhất, không thay đổi các từ khác).
Trả về JSON nguyên bản không chứa markdown:`;
const schema = {
type: "OBJECT",
properties: {
wrongSentence: { type: "STRING" },
wrongWord: { type: "STRING", description: "Từ bị sai" },
correction: { type: "STRING", description: "Từ đúng" },
explanation: { type: "STRING", description: "Giải thích bằng tiếng Việt ngắn gọn" }
},
required: ["wrongSentence", "wrongWord", "correction", "explanation"]
};
const aiPromise = window.Utils.callGeminiApi(prompt, schema, apiKey);
const timeoutPromise = new Promise((_, r) => setTimeout(() => r(new Error("AI Timeout (20s)")), 20000));
const res = await Promise.race([aiPromise, timeoutPromise]);
const parsed = window.Utils.parseAiJson(res.text);
if (!parsed || !parsed.wrongSentence || !parsed.wrongWord || !parsed.correction) {
throw new Error("AI trả về JSON thiếu các trường dữ liệu bắt buộc.");
}
if (res.tokenMetadata) {
const used = res.tokenMetadata.totalTokenCount || 0;
const currentTotal = parseInt(localStorage.getItem('fc_total_tokens') || '0', 10);
localStorage.setItem('fc_total_tokens', currentTotal + used);
}
const result = { ...parsed, origin: card, isAiGenerated: true };
questionCache.current.set(card.term, result);
return result;
} catch (e) {
console.warn("AI SpotMistake Fallback:", e.message);
}
}
const fallbackResult = generateOfflineMistake(card);
questionCache.current.set(card.term, fallbackResult);
return fallbackResult;
})();
pendingFetchesRef.current.set(card.term, fetchTask);
try { return await fetchTask; } finally { pendingFetchesRef.current.delete(card.term); }
};
// --- 4. QUẢN LÝ HÀNG ĐỢI (QUEUE MANAGEMENT) ---
const getNextCardIndex = () => {
if (deckRef.current.length === 0) {
let validIndices = cards.map((c, i) => ({ c, i }))
.filter(({ c }) => window.Utils && window.Utils.detectSentence ? window.Utils.detectSentence(c.term) : c.term.includes(' '))
.map(({ i }) => i);
if (validIndices.length === 0) validIndices = cards.map((_, i) => i);
if (validIndices.length === 0) return undefined;
deckRef.current = window.Utils && window.Utils.shuffleArray ? window.Utils.shuffleArray(validIndices) : validIndices.sort(() => Math.random() - 0.5);
}
return deckRef.current.shift();
};
const maintainQueue = async () => {
if (isPreloadingRef.current) return;
isPreloadingRef.current = true;
try {
while (endlessQueueRef.current.length < 2 && isGameActiveRef.current) {
const nextIdx = getNextCardIndex();
if (nextIdx !== undefined) {
endlessQueueRef.current.push(nextIdx);
if (!questionCache.current.has(cards[nextIdx].term)) {
await fetchMistakeData(nextIdx).catch(e => console.warn("Preload error:", e));
}
} else {
break;
}
}
} finally {
isPreloadingRef.current = false;
}
};
// --- 5. LUỒNG TRÒ CHƠI (GAME FLOW) ---
// Hàm trợ giúp Regex an toàn
const escapeRegExp = (string) => {
return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
};
const setupQuestion = (data) => {
setCurrentQuestion(data);
let wordChunks = [];
const sentence = data.wrongSentence || "";
const wrong = data.wrongWord || "";
if (wrong && sentence) {
// [FIX 1] Smart Chunking: Cố gắng tìm vị trí chính xác của cụm từ sai trong câu
const regex = new RegExp(escapeRegExp(wrong), 'i');
const match = sentence.match(regex);
if (match) {
const index = match.index;
const before = sentence.substring(0, index);
const matchedText = sentence.substring(index, index + wrong.length);
const after = sentence.substring(index + wrong.length);
// Cắt phần Before bằng khoảng trắng
const beforeChunks = before.split(' ').filter(w => w.trim().length > 0).map((text, idx) => ({
id: `chunk-b-${idx}-${Date.now()}`, text, isTarget: false
}));
// Gạch mục tiêu (Được đúc thành 1 viên gạch duy nhất dù có chứa khoảng trắng)
const matchChunk = {
id: `chunk-m-${Date.now()}`, text: matchedText, isTarget: true
};
// Cắt phần After bằng khoảng trắng
const afterChunks = after.split(' ').filter(w => w.trim().length > 0).map((text, idx) => ({
id: `chunk-a-${idx}-${Date.now()}`, text, isTarget: false
}));
wordChunks = [...beforeChunks, matchChunk, ...afterChunks];
} else {
// Fallback nếu không match được chuỗi con
wordChunks = sentence.split(' ').filter(w => w.trim().length > 0).map((text, idx) => ({
id: `chunk-${idx}-${Date.now()}`,
text: text,
isTarget: text.toLowerCase().includes(wrong.toLowerCase())
}));
}
} else {
// An toàn nếu data rỗng
wordChunks = sentence.split(' ').map((text, idx) => ({ id: `chunk-${idx}-${Date.now()}`, text, isTarget: false }));
}
setChunks(wordChunks);
setStage('spot');
setSelectedIndex(null);
setInputBuffer("");
setCheckStatus('idle');
setAttempts(0);
};
const startNewGame = async () => {
if (!cards || cards.length === 0) return;
setIsGenerating(true);
endlessQueueRef.current = [];
deckRef.current = [];
setPlayedCount(0);
setScore(0);
setCombo(1);
setTime(0);
const firstIdx = getNextCardIndex();
if (isAiMode) {
setAiCountdown(20);
let count = 20;
const timer = setInterval(() => {
count--;
if (isGameActiveRef.current) setAiCountdown(count);
if (count <= 0) clearInterval(timer);
}, 1000);
const dataPromise = fetchMistakeData(firstIdx);
dataPromise.then(() => { if (isGameActiveRef.current) maintainQueue(); });
await Promise.race([new Promise(r => setTimeout(r, 20000)), dataPromise]);
const data = await dataPromise;
clearInterval(timer);
if (isGameActiveRef.current && data) {
setupQuestion(data);
setIsGenerating(false);
setAiCountdown(0);
}
} else {
const data = await fetchMistakeData(firstIdx);
if (isGameActiveRef.current && data) {
setupQuestion(data);
setIsGenerating(false);
maintainQueue();
}
}
timerRef.current = setInterval(() => {
setTime(prev => prev + 1);
}, 1000);
};
const nextRound = async () => {
if (autoNextRef.current) clearTimeout(autoNextRef.current);
const currentTotalPlayed = playedCount + 1;
setPlayedCount(currentTotalPlayed);
if (currentTotalPlayed >= 10) {
if (timerRef.current) clearInterval(timerRef.current);
setIsFinished(true);
return;
}
let nextIdx = endlessQueueRef.current.length > 0 ? endlessQueueRef.current.shift() : getNextCardIndex();
if (nextIdx === undefined) {
setIsFinished(true);
return;
}
if (!questionCache.current.has(cards[nextIdx]?.term)) {
setIsGenerating(true);
}
const data = await fetchMistakeData(nextIdx);
if (isGameActiveRef.current && data) {
setupQuestion(data);
setIsGenerating(false);
maintainQueue();
}
};
const triggerAutoNext = (delay = 3000) => {
if (autoNextRef.current) clearTimeout(autoNextRef.current);
autoNextRef.current = setTimeout(() => {
if (isGameActiveRef.current) nextRound();
}, delay);
};
// --- 6. XỬ LÝ TƯƠNG TÁC (INTERACTIONS) ---
// GIAI ĐOẠN 1: CHẠM TỪ SAI
const handleSpotClick = (idx) => {
if (stage !== 'spot' || checkStatus === 'failed' || checkStatus === 'success') return;
const clickedChunk = chunks[idx];
// Nhờ Smart Chunking, chỉ cần kiểm tra cờ isTarget
if (clickedChunk.isTarget) {
setStage('correct');
setSelectedIndex(idx);
setCheckStatus('correct_spot');
setScore(p => p + (10 * combo));
safeShowToast("Phát hiện chuẩn xác! Hãy sửa lại cho đúng.", "success");
setAttempts(0);
} else {
const newAttempts = attempts + 1;
setAttempts(newAttempts);
setCombo(1);
setScore(p => Math.max(0, p - 5));
if (newAttempts >= 3) {
setCheckStatus('failed');
safeShowToast("Đã hết lượt tìm lỗi!", "error");
if (onLogWrong) onLogWrong(currentQuestion.origin);
triggerAutoNext(10000); // Tăng lên 10s để có thời gian đọc giải thích
} else {
setCheckStatus('wrong_spot');
safeShowToast(`Chưa đúng! Còn ${3 - newAttempts} lượt.`, "warning");
setTimeout(() => {
setCheckStatus(prev => prev === 'wrong_spot' ? 'idle' : prev);
}, 1000);
}
}
};
// GIAI ĐOẠN 2: GÕ TỪ SỬA LẠI
const handleCorrectionSubmit = () => {
if (stage !== 'correct' || !inputBuffer.trim()) return;
// [FIX 3] Cải tiến Normalize: Loại bỏ dấu câu nhưng GIỮ LẠI khoảng trắng để bảo vệ Cụm từ
const normalize = (str) => {
if (!str) return "";
if (window.Utils && window.Utils.advancedNormalize) {
// Nếu system có hàm advancedNormalize (thường xóa sạch khoảng trắng), ta tự tùy chỉnh lại cho riêng game này
return str.toLowerCase().replace(/[.,?!;:"'()[\]{}]/g, "").replace(/\s+/g, " ").trim();
}
return str.toLowerCase().replace(/[.,?!;:"'()[\]{}]/g, "").replace(/\s+/g, " ").trim();
};
const normalizedInput = normalize(inputBuffer);
const normalizedCorrection = normalize(currentQuestion.correction);
if (normalizedInput === normalizedCorrection) {
setCheckStatus('success');
setScore(p => p + (20 * combo));
setCombo(p => p + 1);
safeShowToast("Tuyệt vời! Bạn đã sửa đúng.", "success");
triggerAutoNext(6000); // Tăng lên 6s
} else {
const newAttempts = attempts + 1;
setAttempts(newAttempts);
setCombo(1);
setScore(p => Math.max(0, p - 5));
if (newAttempts >= 3) {
setCheckStatus('failed');
safeShowToast("Sai quá 3 lần. Xem đáp án nhé!", "error");
if (onLogWrong) onLogWrong(currentQuestion.origin);
triggerAutoNext(10000); // Tăng lên 10s để có thời gian đọc giải thích
} else {
setCheckStatus('wrong_correct');
safeShowToast(`Sai rồi! Còn ${3 - newAttempts} lượt.`, "warning");
setTimeout(() => {
setCheckStatus(prev => prev === 'wrong_correct' ? 'correct_spot' : prev);
}, 1000);
}
}
};
const handleSkip = () => {
if (checkStatus === 'success' || checkStatus === 'failed') return;
setCombo(1);
setCheckStatus('failed');
safeShowToast("Đã bỏ qua!", "error");
if (onLogWrong && currentQuestion) onLogWrong(currentQuestion.origin);
triggerAutoNext(10000); // Tăng lên 10s để có thời gian đọc giải thích
};
React.useEffect(() => {
isGameActiveRef.current = true;
startNewGame();
return () => {
isGameActiveRef.current = false;
if (timerRef.current) clearInterval(timerRef.current);
if (autoNextRef.current) clearTimeout(autoNextRef.current);
};
}, []);
return {
currentQuestion,
chunks,
stage,
selectedIndex,
inputBuffer,
setInputBuffer,
checkStatus,
attempts,
score,
combo,
playedCount,
time,
isFinished,
isGenerating,
aiCountdown,
handleSpotClick,
handleCorrectionSubmit,
handleSkip,
nextRound
};
};

// Nhiệm vụ: Cung cấp hook useAiLogic xử lý tự động phát (Auto-Play) và giao tiếp với AI Gemini (Làm giàu thẻ, giải thích ngữ pháp).
// Quy tắc: Tách biệt hoàn toàn logic chạy ngầm khỏi App Component chính.

const useAiLogic = (core, latestStateRef, callbacks) => {
const { speak, handleNext } = callbacks;
const {
isAutoPlaying, currentCardIndex, setIsFlipped, setIsContentHidden,

// Cờ báo hiệu vòng lặp đang chạy
const isLoopRunning = useRef(false);
// ==================================================================================
// 1. LOGIC AUTO-PLAY (STABLE VERSION)
// ==================================================================================
// Hàm đợi an toàn
const wait = (ms) => new Promise(resolve => {
if (autoPlayTimeoutRef.current) clearTimeout(autoPlayTimeoutRef.current);
autoPlayTimeoutRef.current = setTimeout(resolve, ms);
});
const runAutoPlay = useCallback(async () => {
if (isLoopRunning.current) return;
if (!latestStateRef.current.isAutoPlaying) return;
isLoopRunning.current = true;
try {
const { cards, currentCardIndex: idx, settings } = latestStateRef.current;
const card = cards[idx];
if (!card) return;
// --- KIỂM TRA SRS ---
if (settings.srsEnabled !== false && card.srs_due && card.srs_due > Date.now()) {
await wait(2000);
if (latestStateRef.current.isAutoPlaying) handleNext();
return;
}
const textToSpeak = card.term;
const repeatCount = Math.max(1, settings.repeatCount || 1);
// --- VÒNG LẶP LẠI ---
for (let i = 0; i < repeatCount; i++) {
if (!latestStateRef.current.isAutoPlaying) break;
// 1. Reset mặt trước
setIsContentHidden(false);
if (latestStateRef.current.isFlipped) {
setIsFlipped(false);
await wait(600);
}
if (!latestStateRef.current.isAutoPlaying) break;
// 2. Đọc (Speak)
const minTimePromise = wait(1500);
const speakPromise = new Promise(resolve => speak(textToSpeak, null, null, resolve));
// Tính toán thời gian động dựa trên độ dài văn bản (150ms/ký tự, tối thiểu 10 giây)
const dynamicTimeoutMs = Math.max(10000, (textToSpeak ? textToSpeak.length : 0) * 150);
const timeoutPromise = new Promise(resolve => setTimeout(() => resolve('timeout'), dynamicTimeoutMs));
await Promise.all([
Promise.race([speakPromise, timeoutPromise]),
minTimePromise
]);
if (!latestStateRef.current.isAutoPlaying) break;
await wait(settings.delayAfterRead || 1000);
if (!latestStateRef.current.isAutoPlaying) break;
// 3. Lật ra sau
if (!latestStateRef.current.isFlipLocked) {
setIsFlipped(true);
await wait(600);
await wait(settings.delayFlip || 2000);
} else {
await wait(settings.delayFlip || 2000);
}
// 4. Nghỉ giữa các lần lặp
if (i < repeatCount - 1) {
if (!latestStateRef.current.isAutoPlaying) break;
if (!latestStateRef.current.isFlipLocked) {
setIsFlipped(false);
await wait(600);
}
await wait(800);
}
}
// --- CHUYỂN THẺ ---
if (latestStateRef.current.isAutoPlaying) {
if (latestStateRef.current.isFlipped) {
setIsFlipped(false);
await wait(600);
}
await wait(settings.delayNext || 1500);
isLoopRunning.current = false;
handleNext();
}
} catch (e) {
console.error("AutoPlay Error:", e);
isLoopRunning.current = false;
} finally {
if (!latestStateRef.current.isAutoPlaying) {
isLoopRunning.current = false;
}
}
}, [speak, handleNext, latestStateRef, setIsFlipped, setIsContentHidden, autoPlayTimeoutRef]);
// [EFFECT MASTER]
useEffect(() => {
if (autoPlayTimeoutRef.current) clearTimeout(autoPlayTimeoutRef.current);
if (isAutoPlaying) {
runAutoPlay();
} else {
isLoopRunning.current = false;
setIsContentHidden(false);
callbacks.stopSpeaking();
}
return () => {
if (autoPlayTimeoutRef.current) clearTimeout(autoPlayTimeoutRef.current);
};
}, [isAutoPlaying, currentCardIndex]);
// ==================================================================================
// 2. CÁC LOGIC KHÁC (AI QUEUE)

const processAiQueue = async () => {
if (isAiQueueProcessing.current) return;
isAiQueueProcessing.current = true;
while (aiQueueRef.current.length > 0) {
const term = aiQueueRef.current[0];
const currentApiKey = localStorage.getItem(window.STORAGE_KEYS.API_KEY);
if (!currentApiKey) { aiQueueRef.current.shift(); continue; }
try {
const currentNotebook = latestStateRef.current.notebook;
const noteCard = currentNotebook.find(n => n.term === term);
const requiredFields = ['pronunciation', 'definition', 'sinoViet', 'example', 'image'];
const missingFields = noteCard ? requiredFields.filter(field => {
const val = noteCard[field] ? noteCard[field].toString().trim() : "";
if (field === 'image') return !val.startsWith('http');
return val === "";
}) : requiredFields;
if (missingFields && missingFields.length === 0) { aiQueueRef.current.shift(); continue; }
let res;
try { res = await window.Utils.fillCardWithAi(term, core.lang, currentApiKey, missingFields); }
catch (err) { await new Promise(r => setTimeout(r, 2000)); res = await window.Utils.fillCardWithAi(term, core.lang, currentApiKey, missingFields); }
if (missingFields.includes('image')) {
if (!res.image || !res.image.startsWith('http')) {
const fallbackQuery = noteCard && noteCard.image && noteCard.image.trim() !== "" ? noteCard.image : term;
res.image = `https://tse4.mm.bing.net/th?q=${encodeURIComponent(fallbackQuery)}&w=300&h=300&c=7&rs=1&p=0`;
}
}
if (res) {
if (res._tokenUsage) {
const newTotal = parseInt(localStorage.getItem('fc_total_tokens') || '0', 10) + (res._tokenUsage.totalTokenCount || 0);
localStorage.setItem('fc_total_tokens', newTotal);
setTotalTokens(newTotal);
}
setNotebook(prev => {
const newData = prev.map(item => item.term === term ? { ...item, ...res, ai_explanation: res.example || item.example || "Enriched" } : item);
window.Utils.safeLocalStorageSet(window.CONFIG_SAMPLES[core.lang].noteKey, newData);
return newData;
});
}
} catch (e) { console.warn(`Auto-fill skipped for ${term}:`, e); }
aiQueueRef.current.shift();
if (aiQueueRef.current.length > 0) await new Promise(r => setTimeout(r, 5000));
}
isAiQueueProcessing.current = false;
};
// ==================================================================================
// 3. LOGIC ENRICH CARD (Làm giàu thẻ học hiện tại)
// ==================================================================================
// Xử lý tham số đầu vào linh hoạt (index, card object, hoặc Event)
const handleAiEnrichCard = async (indexOrCardOrEvent, silent = false) => {
if (!apiKey) { if (!silent) callbacks.showToast("Chưa có API Key!", "error"); return; }
let cardTerm = null;
// Logic xác định từ khóa cần tra cứu
if (typeof indexOrCardOrEvent === 'number') {
// Trường hợp 1: Truyền index
cardTerm = latestStateRef.current.cards[indexOrCardOrEvent]?.term;
} else if (indexOrCardOrEvent && typeof indexOrCardOrEvent === 'object' && indexOrCardOrEvent.term) {
cardTerm = indexOrCardOrEvent.term;
} else {
const idx = latestStateRef.current.currentCardIndex;
cardTerm = latestStateRef.current.cards[idx]?.term;
}
if (!cardTerm) {
if (!silent) callbacks.showToast("Không xác định được từ vựng!", "error");
return;
}
if (processingCardsRef.current.has(cardTerm)) {
if (!silent) callbacks.showToast("Đang xử lý từ này...", "info");
return;
}
processingCardsRef.current.add(cardTerm);
if (!silent) setIsAiLoading(true);
try {
const currentCard = latestStateRef.current.cards.find(c => c.term === cardTerm);
const missingFields = ['pronunciation', 'definition', 'sinoViet', 'example', 'image'].filter(f => !currentCard?.[f] || (f==='image' && !currentCard[f].startsWith('http')));
if (!silent && !missingFields.length) { callbacks.showToast("Thẻ đã đầy đủ!", "success"); return; }
if (silent && !missingFields.length) return;
const enriched = await window.Utils.fillCardWithAi(cardTerm, core.lang, apiKey, missingFields);
if (missingFields.includes('image') && (!enriched.image || !enriched.image.startsWith('http'))) {
const q = (currentCard?.image && currentCard.image.trim()) || cardTerm;
enriched.image = `https://tse4.mm.bing.net/th?q=${encodeURIComponent(q)}&w=300&h=300&c=7&rs=1&p=0`;
}
setCards(prev => {
const idx = prev.findIndex(c => c.term === cardTerm);
if (idx === -1) return prev;
const next = [...prev];
next[idx] = { ...next[idx], ...enriched, ai_explanation: enriched.example || next[idx].example || "Enriched", is_enriched: true };
window.Utils.safeLocalStorageSet(window.CONFIG_SAMPLES[core.lang].dataKey, next);
return next;
});
if (enriched._tokenUsage) {
const newTotal = parseInt(localStorage.getItem('fc_total_tokens') || '0', 10) + (enriched._tokenUsage.totalTokenCount || 0);
setTotalTokens(newTotal); localStorage.setItem('fc_total_tokens', newTotal);
}
if (!silent) callbacks.showToast("Đã bổ sung thông tin!", "success");
} catch (e) { if (!silent) callbacks.showToast("Lỗi AI: " + e.message, "error"); }
finally { processingCardsRef.current.delete(cardTerm); if (!silent) setIsAiLoading(false); }
};
const handleExplainGrammar = async (index) => {
if (!apiKey) { callbacks.showToast("Cần API Key!", "warning"); return; }
const cardTerm = latestStateRef.current.cards[index]?.term;
if (!cardTerm) return;
setIsAiLoading(true);
try {
const result = await window.Utils.fillCardWithAi(cardTerm, core.lang, apiKey, ['analysis']);
if (result?.analysis) {
setCards(prev => {
const idx = prev.findIndex(c => c.term === cardTerm);
if (idx === -1) return prev;
const next = [...prev];
next[idx] = { ...next[idx], analysis: result.analysis };
window.Utils.safeLocalStorageSet(window.CONFIG_SAMPLES[core.lang].dataKey, next);
return next;
});
if (result._tokenUsage) {
const newTotal = parseInt(localStorage.getItem('fc_total_tokens') || '0', 10) + (result._tokenUsage.totalTokenCount || 0);
setTotalTokens(newTotal); localStorage.setItem('fc_total_tokens', newTotal);
}
callbacks.showToast("Phân tích xong!", "success");
}
} catch (e) { callbacks.showToast("Lỗi AI: " + e.message, "error"); }
finally { setIsAiLoading(false); }
};
const handleManualAiFill = async (term) => {
if (!apiKey) { callbacks.showToast("Cần API Key!", "warning"); return; }

try { return await window.Utils.fillCardWithAi(term, core.lang, apiKey); }
catch (e) { callbacks.showToast(e.message, "error"); return null; }

// Effect: Batch Enrich
useEffect(() => {

if (!active) return;

}, [core.currentCardIndex, core.isAiModeLearn, core.viewMode, apiKey]);

// Block6.3: TẦNG 6: LOGIC ỨNG DỤNG (Data Management Logic) - Version 1.1
// Last Updated: 2026-03-31 11:55
// Nhiệm vụ: Xử lý toàn bộ logic liên quan đến dữ liệu: Import/Export, Sổ tay, Thẻ đã thuộc, Thuật toán SRS và Dọn rác (Garbage Collection).
// Quy tắc: Trả về các hàm thao tác dữ liệu độc lập để App Component sử dụng. Không chứa UI.
// ==================================================================================
const useDataLogic = (core, latestStateRef, callbacks) => {
const { t, showToast, handleNext } = callbacks;
const { lang } = core;
// ==================================================================================
// [NEW v1.2] HỆ THỐNG DỌN RÁC BỘ NHỚ (GARBAGE COLLECTION)
// ==================================================================================
useEffect(() => {
const runGarbageCollector = () => {
try {
const now = Date.now();
const THREE_DAYS = 3 * 24 * 60 * 60 * 1000;
let hasChanges = false;
// 1. Tính toán tổng dung lượng localStorage hiện tại
let totalSize = 0;
for (let i = 0; i < localStorage.length; i++) {
const key = localStorage.key(i);
totalSize += (localStorage.getItem(key) || '').length;
}
// Nếu vượt 4MB (chars) -> Bật cảnh báo khẩn cấp
const isEmergency = totalSize > 4 * 1024 * 1024;
// 2. Dọn dẹp Game Sessions (fc_game_sessions)
const sessionsStr = localStorage.getItem('fc_game_sessions');
if (sessionsStr) {
let sessions = JSON.parse(sessionsStr);
let sessionChanged = false;
if (isEmergency) {
sessions = {}; // Xóa sạch nếu khẩn cấp
sessionChanged = true;
} else {
Object.keys(sessions).forEach(langKey => {
const langSessions = sessions[langKey];
Object.keys(langSessions).forEach(gameType => {
const session = langSessions[gameType];
// Xóa nếu quá 3 ngày
if (now - session.timestamp > THREE_DAYS) {
delete langSessions[gameType];
sessionChanged = true;
}
});
// Dọn luôn object ngôn ngữ nếu rỗng
if (Object.keys(langSessions).length === 0) {
delete sessions[langKey];
sessionChanged = true;
}
});
}
if (sessionChanged) {
localStorage.setItem('fc_game_sessions', JSON.stringify(sessions));
hasChanges = true;
}
}
// 3. Dọn dẹp Lịch sử Chat AI (fc_ai_chat_history)
const chatStr = localStorage.getItem('fc_ai_chat_history');
if (chatStr) {
let chatHistory = JSON.parse(chatStr);
if (isEmergency) {
chatHistory = chatHistory.slice(-1); // Giữ đúng 1 tin nhắn cuối
localStorage.setItem('fc_ai_chat_history', JSON.stringify(chatHistory));
hasChanges = true;
} else if (chatHistory.length > 20) {
chatHistory = chatHistory.slice(-20); // Cắt tỉa giữ lại 20 tin
localStorage.setItem('fc_ai_chat_history', JSON.stringify(chatHistory));
hasChanges = true;
}
}
if (isEmergency && hasChanges) {
console.warn("[Garbage Collector] KÍCH HOẠT KHẨN CẤP: Đã dọn dẹp do bộ nhớ vượt ngưỡng 4MB.");
} else if (hasChanges) {
console.log("[Garbage Collector] Đã dọn dẹp rác hệ thống thành công.");
}
} catch (e) {
console.error("Garbage Collector Failed:", e);
}
};
// Chạy ngầm dọn rác 2 giây sau khi App vừa khởi động xong (tránh nghẽn UI)
const gcTimer = setTimeout(() => {
runGarbageCollector();
}, 2000);
return () => clearTimeout(gcTimer);
}, []); // Chỉ chạy 1 lần khi mount
// --- HÀM HỖ TRỢ COPY AN TOÀN (SAFE COPY HELPER) ---
// [NEW] Khắc phục lỗi copy trên môi trường không bảo mật (http/file)
const secureCopy = (text) => {
// Cách 1: Thử dùng API hiện đại (nếu có HTTPS/Localhost)
if (navigator.clipboard && window.isSecureContext) {
navigator.clipboard.writeText(text)
.then(() => showToast(t('syncSuccess')))
.catch(() => fallbackCopy(text)); // Nếu lỗi thì chuyển sang cách 2
} else {
// Cách 2: Fallback cho file:// hoặc http thường
fallbackCopy(text);
}
};
const fallbackCopy = (text) => {
try {
const textArea = document.createElement("textarea");
textArea.value = text;
// Đảm bảo textarea không làm vỡ giao diện khi xuất hiện
textArea.style.position = "fixed";
textArea.style.left = "-9999px";
textArea.style.top = "0";
document.body.appendChild(textArea);
textArea.focus();
textArea.select();
const successful = document.execCommand('copy');
document.body.removeChild(textArea);
if (successful) {
showToast(t('syncSuccess'));
} else {
showToast("Trình duyệt chặn copy. Hãy copy thủ công.", "error");
}
} catch (err) {
showToast("Lỗi copy: " + err, "error");
}

// [NEW v1.2] Hàm tạo âm thanh Ting nhẹ (4% Volume)
const playTing = () => {
try {
const AudioContext = window.AudioContext || window.webkitAudioContext;
if (!AudioContext) return;
const ctx = new AudioContext();
const osc = ctx.createOscillator();
const gain = ctx.createGain();
osc.type = 'sine';
osc.frequency.setValueAtTime(30, ctx.currentTime); // Tần số cao (Tiếng chuông)
osc.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.5); // Hạ tone nhẹ
// [UPDATED] Khống chế Volume cố định 0.04 (4%)
gain.gain.setValueAtTime(0.04, ctx.currentTime);
// [UPDATED] Fade out xuống 0.001 để đường cong dốc hơn, tạo cảm giác dứt khoát và nhỏ hơn
gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5); // Fade out
osc.connect(gain);
gain.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime + 0.3);
} catch (e) {
console.warn("Audio Context Error:", e);
}
};
